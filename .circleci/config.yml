version: "2.1"

executors:
    python311:
        docker:
            - image: cimg/python:3.11
        resource_class: medium
        environment:
            PIP_DISABLE_PIP_VERSION_CHECK: "1"
            PIP_NO_PYTHON_VERSION_WARNING: "1"
            PYTHONDONTWRITEBYTECODE: "1"
            PYTHONUNBUFFERED: "1"

commands:
    restore-pip-cache:
        steps:
            - restore_cache:
                  keys:
                      - pip-v1-{{ checksum "requirements-dev.txt" }}-{{ checksum "requirements.txt" }}
                      - pip-v1-{{ checksum "requirements-dev.txt" }}-
                      - pip-v1-

    save-pip-cache:
        steps:
            - save_cache:
                  key: pip-v1-{{ checksum "requirements-dev.txt" }}-{{ checksum "requirements.txt" }}
                  paths:
                      - ~/.cache/pip

    install-dev-deps:
        steps:
            - run:
                  name: Install Python dependencies
                  command: |
                      python -m pip install --upgrade pip
                      pip install -r requirements-dev.txt

jobs:
    lint:
        executor: python311
        steps:
            - checkout
            - restore-pip-cache
            - install-dev-deps
            - save-pip-cache
            - run:
                  name: ruff
                  command: python -m ruff check tests shared scripts apps/aria/server.py
            - run:
                  name: black (check)
                  command: python -m black --check tests shared scripts apps/aria/server.py

    type-check:
        executor: python311
        steps:
            - checkout
            - restore-pip-cache
            - install-dev-deps
            - save-pip-cache
            - run:
                  name: mypy (advisory)
                  command: python -m mypy shared scripts function_app.py || true

    pre-commit:
        executor: python311
        steps:
            - checkout
            - restore-pip-cache
            - install-dev-deps
            - save-pip-cache
            - restore_cache:
                  keys:
                      - pre-commit-v1-{{ checksum ".pre-commit-config.yaml" }}
                      - pre-commit-v1-
            - run:
                  name: pre-commit on changed files
                  command: |
                      if git rev-parse HEAD^ >/dev/null 2>&1; then
                        CHANGED=$(git diff --name-only --diff-filter=ACMRT HEAD^ HEAD --)
                      else
                        CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD)
                      fi
                      if [ -z "$CHANGED" ]; then
                        echo "No changed files; skipping."
                        exit 0
                      fi
                      pre-commit run --files $CHANGED --show-diff-on-failure --color=always
            - save_cache:
                  key: pre-commit-v1-{{ checksum ".pre-commit-config.yaml" }}
                  paths:
                      - ~/.cache/pre-commit

    unit-test:
        executor: python311
        parallelism: 2
        steps:
            - checkout
            - run: echo "Running example step, please edit this file"
version: "2.1"
