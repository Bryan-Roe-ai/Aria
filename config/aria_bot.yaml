# Aria-Bot — self-modifying codebase configuration.
#
# This file documents the operating envelope for the deterministic
# self-improvement loop. The Python package also enforces a hard-coded set
# of protected paths (see aria_bot/risk_manager.py) which CANNOT be
# disabled from this YAML — narrowing them here is allowed, widening is
# silently ignored.

# ---------------------------------------------------------------------------
# Throughput limits
# ---------------------------------------------------------------------------

# Maximum number of improvement plans applied in a single cycle.
# Keep low to ensure incremental, reviewable progress.
max_plans: 5

# Maximum bytes a single plan may change across all affected files.
# 8 KiB keeps diffs human-reviewable; raise cautiously.
max_plan_delta_bytes: 4096

# Maximum size of a source file the analyzer will read into memory.
# Files larger than this are skipped to prevent runaway memory usage.
max_file_bytes: 262144 # 256 KiB — reduced to limit memory overhead

# ---------------------------------------------------------------------------
# Analyzer scope
# ---------------------------------------------------------------------------

# File suffixes the analyzer is allowed to consider. Add entries here to
# expand scope; remove entries to narrow it.
suffixes:
    - .py
    - .md
    - .yaml
    - .yml
    - .txt
    - .toml
    - .cfg

# ---------------------------------------------------------------------------
# Protected paths
# ---------------------------------------------------------------------------

# Paths that must never be modified by the self-improvement loop.
# Hard-coded defaults in aria_bot/risk_manager.py are ALWAYS merged with
# this list — narrowing is respected, widening is silently ignored.
protected_prefixes:
    - .git/
    - .github/
    - .github/agents/
    - config/
    - datasets/
    - data_out/
    - secrets/
    - AI/
    - node_modules/
    - .venv/
    - venv/
    - __pycache__/
    - dist/
    - build/
    - .tox/
    - .mypy_cache/
    - .ruff_cache/
    - .pytest_cache/
    - htmlcov/
    - coverage/
    - logs/
    - tests/fixtures/

# Hard-coded protected file names (enforced in code, not configurable here):
# `.env`, `.env.local`, `local.settings.json`, `id_rsa`, `id_ed25519`.

# ---------------------------------------------------------------------------
# Behaviour flags
# ---------------------------------------------------------------------------

# Whether to apply plans to disk. The CLI flag --apply overrides this.
# Set to true only in a fully-automated pipeline with appropriate guards.
apply: false

# Whether to commit applied changes via git. The CLI flag --commit overrides
# this. Requires apply: true to have any effect.
commit: false
