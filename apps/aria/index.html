<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Aria — Interactive AI character demo: natural-language commands, object interaction, and animated avatar." />
  <meta name="theme-color" content="#87CEEB" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='48'%3E%F0%9F%8E%AD%3C/text%3E%3C/svg%3E">
  <title>Aria — Interactive AI Character</title>
  <style>
    :root{
      --bg-primary:#f0f4f8;
      --bg-stage: linear-gradient(180deg,#87CEEB 0%,#B0E0E6 40%,#98D8A0 85%,#7BC47F 100%);
      --text-primary:#1a2332;
      --accent:#667eea;
      --radius:14px;
      --transition:0.25s cubic-bezier(0.4,0,0.2,1);
    }

    [data-theme="dark"]{
      --bg-primary:#0f1219;
      --bg-stage: linear-gradient(180deg,#1a2744 0%,#1e3050 40%,#1a3328 85%,#1a3a28 100%);
      --text-primary:#e4e8f0;
    }

    /* Core layout reset */
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, 'Segoe UI', system-ui, -apple-system, sans-serif;
      background:var(--bg-primary);
      color:var(--text-primary);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:16px;
      transition:background var(--transition),color var(--transition)
    }

    .container{width:100%;max-width:1280px;}

    header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
    .brand{display:flex;flex-direction:column}
    h1{font-size:1.6rem;margin:0;line-height:1}
    .subtitle{font-size:0.9rem;color:rgba(0,0,0,0.54)}

    .layout{display:grid;grid-template-columns:1fr 380px;gap:16px}
    @media (max-width:980px){
      .layout{grid-template-columns:1fr}
    }

    .panel{background:rgba(255,255,255,0.95);border-radius:var(--radius);padding:16px;box-shadow:0 8px 32px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.06)}

    /* Stage */
    .stage{position:relative;height:min(60vh,640px);border-radius:12px;background:var(--bg-stage);overflow:hidden;border:1px solid rgba(0,0,0,0.06);perspective:1200px}
    .stage .stage-info{position:absolute;left:12px;top:12px;background:rgba(255,255,255,0.8);padding:8px;border-radius:8px;font-size:0.85rem}

    /* Engine switcher */
    .engine-switcher{position:absolute;right:12px;top:12px;display:flex;gap:8px}
    .engine-btn{background:rgba(255,255,255,0.9);border:1px solid rgba(0,0,0,0.06);padding:6px 10px;border-radius:8px;cursor:pointer;font-weight:600}
    .engine-btn[aria-pressed="true"]{background:linear-gradient(135deg,#c06070 0%,var(--accent) 50%,#a78bfa 100%);color:#fff;border-color:var(--accent)}

    /* Objects */
    .object{position:absolute;font-size:32px;cursor:grab;user-select:none;transition:transform 0.18s ease,filter 0.18s ease,left 0.3s ease,bottom 0.3s ease}
    .object:hover{transform:scale(1.08)}
    .object.grabbed{cursor:grabbing;z-index:100}
    .object.held{filter:drop-shadow(0 0 6px var(--accent)) brightness(1.1)}

    /* Synced avatar marker (server-driven position) */
    .aria-avatar{position:absolute;font-size:56px;transform:translateX(-50%);transition:left 0.35s ease,bottom 0.35s ease;pointer-events:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.25));z-index:50}

    /* Preset chips */
    .chip{background:rgba(102,126,234,0.12);border:1px solid rgba(102,126,234,0.35);color:var(--accent);padding:4px 10px;border-radius:999px;cursor:pointer;font-size:0.82rem;font-weight:600}
    .chip:hover{background:rgba(102,126,234,0.22)}
    [data-theme="dark"] .panel{background:rgba(24,28,40,0.95)}
    [data-theme="dark"] .chip{color:#a9b6ff}

    /* eyes tracking via custom properties */
    .aria-eye::before,.aria-eye::after{transition:transform 0.12s linear}

    /* Accessibility helpers */
    .visually-hidden{position:absolute!important;height:1px;width:1px;overflow:hidden;clip:rect(1px,1px,1px,1px);white-space:nowrap;border:0;padding:0;margin:-1px}

    /* responsive control panel */
    .control-panel{max-height:75vh;overflow:auto}

    /* small, non-invasive noscript message */
    noscript{display:block;background:#ffefef;color:#2a1212;padding:10px;border-radius:8px;margin-bottom:12px}

    /* Respect user's reduced motion preference */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
    }

  </style>
</head>

<body>
  <a class="visually-hidden" href="#main">Skip to main content</a>
  <div class="container">
    <header>
      <div class="brand">
        <h1>Aria — Interactive AI Character</h1>
        <div class="subtitle">Use natural language: "move left", "wave", "pickup ball"</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="themeToggle" class="engine-btn" aria-pressed="false" title="Toggle theme">Toggle theme</button>
        <a href="/api/aria/state" class="engine-btn" style="text-decoration:none">API</a>
      </div>
    </header>

    <main id="main" class="layout" role="main">
      <section class="panel" aria-label="Stage container">
        <div class="stage" id="stage" role="region" aria-label="Aria stage">
          <div class="stage-info" aria-hidden="true">Stage • Click objects to interact</div>

          <div class="engine-switcher" role="toolbar" aria-label="Engine switcher">
            <button class="engine-btn" data-engine="local" aria-pressed="true">Local</button>
            <button class="engine-btn" data-engine="openai" aria-pressed="false">OpenAI</button>
            <button class="engine-btn" data-engine="azure" aria-pressed="false">Azure</button>
          </div>

          <!-- interactive objects (examples) -->
          <div id="apple" class="object" style="bottom:28%;left:55%" role="button" tabindex="0" aria-label="Apple">🍎</div>
          <div id="book" class="object" style="bottom:28%;left:48%" role="button" tabindex="0" aria-label="Book">📚</div>
          <div id="cup" class="object" style="bottom:28%;left:62%" role="button" tabindex="0" aria-label="Cup">☕</div>

          <!-- visually-represented simplified character (state machine element) -->
          <div id="aria" class="aria-character" aria-hidden="true" style="left:50%;bottom:30%;width:160px;height:260px;visibility:hidden;pointer-events:none"></div>

        </div>
      </section>

      <aside class="panel control-panel" aria-label="Control panel">
        <h3 style="margin-top:0">Command Aria</h3>
        <form id="commandForm" autocomplete="off" style="margin:8px 0">
          <label for="commandInput" class="visually-hidden">Natural language command</label>
          <div style="display:flex;gap:8px">
            <input id="commandInput" name="commandInput" type="text" maxlength="500"
              placeholder='Try: "wave", "move left", "pick up apple"'
              style="flex:1;padding:8px;border-radius:6px;border:1px solid rgba(0,0,0,0.08)" />
            <button id="runCommandBtn" type="submit" class="engine-btn">Run</button>
          </div>
          <div style="margin-top:8px;display:flex;align-items:center;gap:6px">
            <label style="display:flex;align-items:center;gap:6px;font-size:0.9rem">
              <input id="autoExecuteToggle" type="checkbox" /> Auto-execute actions
            </label>
          </div>
          <div id="presetChips" role="group" aria-label="Command presets"
            style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
        </form>

        <hr style="margin:12px 0" />

        <h3 style="margin-top:0">Object Manager</h3>
        <div style="margin:8px 0">
          <label for="providerSelect" style="display:block;font-weight:600;margin-bottom:6px">Provider</label>
          <select id="providerSelect" name="providerSelect" style="width:100%;padding:8px;border-radius:6px;border:1px solid rgba(0,0,0,0.08)">
            <option value="auto">Auto</option>
            <option value="local">Local</option>
            <option value="openai">OpenAI</option>
            <option value="azure">Azure</option>
            <option value="quantum-llm">Quantum LLM</option>
          </select>
          <label for="modelInput" style="display:block;font-weight:600;margin-top:8px">Model / Path</label>
          <input id="modelInput" name="modelInput" placeholder="model name or path" style="width:100%;padding:8px;border-radius:6px;border:1px solid rgba(0,0,0,0.08)" />
          <div style="margin-top:8px"><label><input id="useLlmToggle" type="checkbox" /> Use LLM</label></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <button class="object-btn" data-add="apple">Add Apple</button>
          <button class="object-btn" data-add="book">Add Book</button>
          <button class="object-btn" data-add="cup">Add Cup</button>
        </div>

        <hr style="margin:12px 0" />

        <section aria-live="polite" aria-atomic="true" id="log" style="background:rgba(0,0,0,0.03);padding:10px;border-radius:8px;font-size:0.9rem;max-height:40vh;overflow:auto">
          <strong>Activity</strong>
          <div id="logMessages"></div>
        </section>

        <noscript>Some interactive features require JavaScript. Please enable JavaScript for full functionality.</noscript>
      </aside>
    </main>

    <footer style="margin-top:16px;text-align:center;color:rgba(0,0,0,0.5)">Built with ❤️ — Aria Project</footer>
  </div>

  <script>
    // Theme persistence and prefers-color-scheme fallback
    (function(){
      try{
        const root=document.documentElement;
        const stored=localStorage.getItem('aria:theme');
        if(stored){root.setAttribute('data-theme',stored)}
        else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches){root.setAttribute('data-theme','dark')}

        const toggle=document.getElementById('themeToggle');
        toggle.addEventListener('click',()=>{
          const current=root.getAttribute('data-theme')||'light';
          const next=current==='dark'?'light':'dark';
          root.setAttribute('data-theme',next);
          localStorage.setItem('aria:theme',next);
          toggle.setAttribute('aria-pressed', String(next==='dark'));
        });
      }catch(e){console.warn('Theme init failed',e)}
    })();

    // Engine switcher keyboard/accessibility handling
    (function(){
      const toolbar=document.querySelector('.engine-switcher');
      if(!toolbar) return;
      toolbar.addEventListener('click', (e)=>{
        const btn=e.target.closest('button[data-engine]');
        if(!btn) return;
        [...toolbar.querySelectorAll('button[data-engine]')].forEach(b=>b.setAttribute('aria-pressed','false'));
        btn.setAttribute('aria-pressed','true');
        log('Engine set to: '+btn.dataset.engine);
      });
      toolbar.addEventListener('keydown', (e)=>{
        if(e.key==='Enter' || e.key===' ') { e.preventDefault(); e.target.click(); }
      });
    })();

    // Eye tracking — sets CSS custom properties used by .aria-eye pseudo elements
    (function(){
      const stage=document.getElementById('stage');
      if(!stage) return;
      const eyes = Array.from(document.querySelectorAll('.aria-eye'));
      const clamp = (v,min,max)=>Math.max(min,Math.min(max,v));
      let rafPending=false;
      let lastEvent=null;

      function updateEyes(ev){
        const rect=stage.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height*0.25; // eyes placed upper
        const dx = (ev.clientX - cx)/rect.width; // -0.5..0.5
        const dy = (ev.clientY - cy)/rect.height;
        const px = clamp(dx*16, -8, 8)+'px';
        const py = clamp(dy*16, -6, 6)+'px';
        eyes.forEach(el=>{ el.style.setProperty('--px',px); el.style.setProperty('--py',py); });
        rafPending=false;
      }

      stage.addEventListener('pointermove', (ev)=>{
        lastEvent=ev;
        if(!rafPending){ rafPending=true; requestAnimationFrame(()=>updateEyes(lastEvent)); }
      }, { passive:true });

      // reset on leave
      stage.addEventListener('pointerleave', ()=>{ eyes.forEach(el=>{ el.style.setProperty('--px','0px'); el.style.setProperty('--py','0px'); })});
    })();

    // Simple logging helper
    function log(msg){
      const container=document.getElementById('logMessages');
      if(!container) return;
      const d=document.createElement('div');
      d.textContent=(new Date()).toLocaleTimeString()+ ' — ' + msg;
      container.prepend(d);
    }

    // Make .object elements keyboard and click interactive (basic example for demo)
    (function(){
      document.querySelectorAll('.object').forEach(o=>{
        o.addEventListener('click', ()=>{ log('Clicked '+(o.getAttribute('aria-label')||o.id)); o.classList.toggle('grabbed'); });
        o.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' ') { e.preventDefault(); o.click(); } });
      });
    })();

    // ---------------------------------------------------------------------
    // Server integration: client API + natural-language command bar.
    // These functions are intentionally global so automated UI tests and
    // the console can drive the stage (addObject/pickUpObject/dropObject).
    // ---------------------------------------------------------------------

    const EMOJI_BY_NAME = { apple:'🍎', book:'📚', cup:'☕', ball:'⚽', star:'⭐', toy:'🧸' };
    const stageEl = document.getElementById('stage');

    function readControls(){
      const provider = (document.getElementById('providerSelect')||{}).value || 'auto';
      const model = (document.getElementById('modelInput')||{}).value || '';
      const useLlm = !!(document.getElementById('useLlmToggle')||{}).checked;
      return { provider, model: model.trim() || null, use_llm: useLlm };
    }

    async function postJSON(path, body){
      const res = await fetch(path, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      let data = null;
      try { data = await res.json(); } catch(_) { data = null; }
      if(!res.ok){
        const msg = (data && (data.error || data.message)) || ('HTTP '+res.status);
        throw new Error(msg);
      }
      return data;
    }

    // Place (or create) a DOM node for an object at server coordinates {x,y}
    // where x,y are 0-100. x maps to left%, y maps to bottom%.
    function renderObjectNode(id, position, opts){
      opts = opts || {};
      let node = document.getElementById(id);
      if(!node){
        node = document.createElement('div');
        node.id = id;
        node.className = 'object';
        node.setAttribute('role','button');
        node.setAttribute('tabindex','0');
        node.setAttribute('aria-label', id);
        node.textContent = opts.emoji || EMOJI_BY_NAME[id] || '🔶';
        node.addEventListener('click', ()=>{ log('Clicked '+id); node.classList.toggle('grabbed'); });
        node.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); node.click(); } });
        if(stageEl) stageEl.appendChild(node);
      }
      if(opts.emoji) node.textContent = opts.emoji;
      const x = position && typeof position.x === 'number' ? position.x : 50;
      const y = position && typeof position.y === 'number' ? position.y : 28;
      node.style.left = Math.max(0,Math.min(100,x)) + '%';
      node.style.bottom = Math.max(0,Math.min(100,y)) + '%';
      if(opts.held) node.classList.add('held'); else node.classList.remove('held');
      return node;
    }

    async function addObject(name, emoji){
      const id = String(name||'').trim();
      if(!id){ log('addObject: missing name'); return null; }
      const position = { x: 40 + Math.round(Math.random()*20), y: 28 };
      renderObjectNode(id, position, { emoji });
      try{
        const data = await postJSON('/api/aria/object', {
          action:'add',
          object:{ id, position, state:'on_stage' }
        });
        log('Added object "'+id+'" ('+(data && data.status||'ok')+')');
        return data;
      }catch(err){
        log('⚠️ addObject failed: '+err.message);
        return null;
      }
    }

    async function pickUpObject(name){
      const id = String(name||'').trim();
      if(!id) return null;
      const node = document.getElementById(id);
      if(node) node.classList.add('held');
      try{
        const data = await postJSON('/api/aria/object', {
          action:'update',
          object:{ id, state:'held' }
        });
        log('Picked up "'+id+'"');
        return data;
      }catch(err){
        log('⚠️ pickUpObject failed: '+err.message);
        return null;
      }
    }

    async function dropObject(name){
      const id = String(name||'').trim();
      if(!id) return null;
      const node = document.getElementById(id);
      const position = { x: 50, y: 28 };
      if(node){ node.classList.remove('held'); renderObjectNode(id, position); }
      try{
        const data = await postJSON('/api/aria/object', {
          action:'update',
          object:{ id, state:'on_stage', position }
        });
        log('Dropped "'+id+'"');
        return data;
      }catch(err){
        log('⚠️ dropObject failed: '+err.message);
        return null;
      }
    }

    async function removeObject(name){
      const id = String(name||'').trim();
      if(!id) return null;
      const node = document.getElementById(id);
      if(node && node.parentNode) node.parentNode.removeChild(node);
      try{
        const data = await postJSON('/api/aria/object', { action:'remove', object:{ id } });
        log('Removed "'+id+'"');
        return data;
      }catch(err){
        log('⚠️ removeObject failed: '+err.message);
        return null;
      }
    }

    // Reflect the server's authoritative stage state onto the DOM.
    async function refreshState(){
      try{
        const res = await fetch('/api/aria/state');
        if(!res.ok) throw new Error('HTTP '+res.status);
        const state = await res.json();
        const objects = (state && state.objects) || {};
        Object.keys(objects).forEach(id=>{
          const o = objects[id] || {};
          renderObjectNode(id, o.position, { held: o.state === 'held' });
        });
        // Render Aria's position as a visible avatar marker.
        const aria = (state && state.aria) || {};
        const pos = aria.position || {};
        if(typeof pos.x === 'number' || typeof pos.y === 'number'){
          let avatar = document.getElementById('aria-avatar');
          if(!avatar){
            avatar = document.createElement('div');
            avatar.id = 'aria-avatar';
            avatar.className = 'aria-avatar';
            avatar.setAttribute('aria-hidden','true');
            avatar.textContent = '🧍';
            if(stageEl) stageEl.appendChild(avatar);
          }
          avatar.style.left = Math.max(0,Math.min(100, pos.x ?? 50)) + '%';
          avatar.style.bottom = Math.max(0,Math.min(100, pos.y ?? 30)) + '%';
        }
        return state;
      }catch(err){
        log('⚠️ refreshState failed: '+err.message);
        return null;
      }
    }

    function describeActions(actions){
      if(!Array.isArray(actions) || !actions.length) return '';
      return actions.map(a=>{
        if(!a || typeof a !== 'object') return String(a);
        if(a.type === 'say' && a.text) return 'say "'+a.text+'"';
        if(a.type === 'move' && a.target) return 'move→'+JSON.stringify(a.target);
        if(a.type === 'gesture' && a.name) return 'gesture:'+a.name;
        return a.type || JSON.stringify(a);
      }).join(', ');
    }

    async function sendCommand(command){
      const text = String(command||'').trim();
      if(!text){ log('Enter a command first.'); return null; }
      const controls = readControls();
      const autoExecute = !!(document.getElementById('autoExecuteToggle')||{}).checked;
      const path = autoExecute ? '/api/aria/execute' : '/api/aria/command';
      const body = Object.assign({ command: text }, controls);
      if(autoExecute) body.auto_execute = true;
      log('▶ '+(autoExecute?'Executing':'Parsing')+': "'+text+'"');
      try{
        const data = await postJSON(path, body);
        const tags = (data && data.tags) || [];
        const actions = (data && data.actions) || [];
        if(tags.length) log('  tags: '+tags.join(' '));
        const desc = describeActions(actions);
        if(desc) log('  actions: '+desc);
        if(data && data.message) log('  '+data.message);
        if(!tags.length && !desc && !(data && data.message)) log('  (no actionable output)');
        await refreshState();
        return data;
      }catch(err){
        log('⚠️ command failed: '+err.message);
        return null;
      }
    }

    // Wire the command form.
    (function(){
      const form = document.getElementById('commandForm');
      const input = document.getElementById('commandInput');
      if(!form || !input) return;
      form.addEventListener('submit', (e)=>{
        e.preventDefault();
        const v = input.value;
        sendCommand(v);
        input.value = '';
        input.focus();
      });
    })();

    // Wire the existing Add Apple/Book/Cup buttons to the server.
    (function(){
      document.querySelectorAll('.object-btn[data-add]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const name = btn.getAttribute('data-add');
          addObject(name, EMOJI_BY_NAME[name]);
        });
      });
    })();

    // Load command presets for quick discovery of supported phrases.
    (function(){
      const container = document.getElementById('presetChips');
      const input = document.getElementById('commandInput');
      if(!container) return;
      fetch('/api/aria/presets').then(r=>r.ok?r.json():null).then(data=>{
        if(!data || !Array.isArray(data.presets)) return;
        const seen = new Set();
        data.presets.forEach(group=>{
          (group.commands||[]).forEach(cmd=>{
            if(seen.has(cmd) || cmd.startsWith('[')) return; // skip raw-tag presets
            seen.add(cmd);
            if(seen.size > 12) return; // keep the chip row compact
            const chip = document.createElement('button');
            chip.type = 'button';
            chip.className = 'chip';
            chip.textContent = cmd;
            chip.addEventListener('click', ()=>{ if(input){ input.value = cmd; input.focus(); } });
            container.appendChild(chip);
          });
        });
      }).catch(()=>{ /* presets are optional */ });
    })();

    // Initial sync so the stage reflects server truth on load.
    if(document.readyState !== 'loading') refreshState();
    else document.addEventListener('DOMContentLoaded', refreshState);

  </script>
</body>

</html>
