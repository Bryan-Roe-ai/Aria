<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Aria — AGI Panel</title>
        <style>
            :root {
                --bg: #f0f4f8;
                --panel: #fff;
                --text: #1a2332;
                --muted: #5a6577;
                --accent: #667eea;
                --border: rgba(0, 0, 0, 0.08);
                --radius: 12px;
            }

            [data-theme="dark"] {
                --bg: #0f1219;
                --panel: #1a1f2e;
                --text: #e4e8f0;
                --muted: #8892a4;
                --accent: #7b8ff0;
                --border: rgba(255, 255, 255, 0.08);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Segoe UI", system-ui, sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                padding: 16px;
            }

            .sr-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
                border: 0;
            }

            .skip-link {
                position: absolute;
                left: 16px;
                top: 12px;
                z-index: 1000;
                padding: 10px 14px;
                border-radius: 10px;
                background: var(--text);
                color: var(--panel);
                text-decoration: none;
                transform: translateY(-160%);
                transition: transform 0.2s ease;
            }

            .skip-link:focus {
                transform: translateY(0);
            }

            .container {
                max-width: 960px;
                margin: 0 auto;
            }

            .top-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 16px;
            }

            .top-bar a {
                color: var(--accent);
                text-decoration: none;
                font-weight: 500;
            }

            a:focus-visible,
            button:focus-visible,
            input:focus-visible,
            select:focus-visible,
            textarea:focus-visible {
                outline: 3px solid rgba(102, 126, 234, 0.35);
                outline-offset: 3px;
            }

            h1 {
                font-size: 1.4rem;
                margin-bottom: 8px;
            }

            .panel {
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 16px;
                margin-bottom: 16px;
            }

            label {
                display: block;
                font-size: 0.85rem;
                color: var(--muted);
                margin-bottom: 6px;
            }

            input,
            textarea,
            select {
                width: 100%;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 10px 12px;
                background: transparent;
                color: var(--text);
                margin-bottom: 12px;
            }

            textarea {
                min-height: 96px;
                resize: vertical;
            }

            button {
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 8px;
                padding: 10px 16px;
                cursor: pointer;
                font-weight: 600;
                margin-right: 8px;
            }

            button.secondary {
                background: transparent;
                color: var(--accent);
                border: 1px solid var(--border);
            }

            pre,
            .output {
                background: rgba(0, 0, 0, 0.04);
                border-radius: 8px;
                padding: 12px;
                overflow: auto;
                font-size: 0.85rem;
                white-space: pre-wrap;
                word-break: break-word;
            }

            .status-pill {
                display: inline-block;
                padding: 4px 10px;
                border-radius: 999px;
                font-size: 0.8rem;
                background: rgba(102, 126, 234, 0.15);
                color: var(--accent);
            }

            .agi-error {
                color: #ef4444;
            }
        </style>
        <script src="./agi_stream_utils.js"></script>
    </head>

    <body>
        <a href="#agi-main" class="skip-link">Skip to main content</a>
        <div class="container">
            <header class="top-bar">
                <div>
                    <h1>🧠 AGI Panel</h1>
                    <p style="color: var(--muted); font-size: 0.9rem">
                        Analyze, reason, and stream via Azure Functions AGI API.
                    </p>
                </div>
                <nav aria-label="Aria page navigation">
                    <a href="./index.html">← Stage</a>
                    <a href="./agi.html" aria-current="page">AGI</a>
                    <a href="./auto-execute.html" style="margin-left: 12px"
                        >Auto-Execute</a
                    >
                </nav>
            </header>

            <main id="agi-main">
                <section class="panel" aria-labelledby="agi-status-heading">
                    <h2 id="agi-status-heading" class="sr-only">
                        AGI status and persistence
                    </h2>
                    <label for="apiBase">Functions API base</label>
                    <input
                        id="apiBase"
                        type="text"
                        value="http://localhost:7071"
                    />
                    <button type="button" id="refreshStatus">
                        Refresh Status
                    </button>
                    <span
                        id="statusPill"
                        class="status-pill"
                        style="margin-left: 8px"
                        role="status"
                        aria-live="polite"
                        aria-atomic="true"
                        >unknown</span
                    >
                    <pre
                        id="statusOutput"
                        style="margin-top: 12px"
                        aria-live="polite"
                    >
Loading…</pre>
                    <label for="persistenceOutput" style="margin-top: 12px"
                        >Persistence</label
                    >
                    <pre id="persistenceOutput" aria-live="polite">
Loading…</pre>
                </section>

                <section class="panel" aria-labelledby="agi-query-heading">
                    <h2 id="agi-query-heading" class="sr-only">
                        Run AGI query
                    </h2>
                    <label for="query">Query</label>
                    <textarea
                        id="query"
                        placeholder="Ask the AGI provider…"
                        aria-describedby="query-help"
                    >
What is a qubit?</textarea>
                    <p id="query-help" class="sr-only">
                        Enter a prompt for the AGI provider. Press Control plus
                        Enter or Command plus Enter to run.
                    </p>
                    <label for="mode">Mode</label>
                    <select id="mode">
                        <option value="analyze">Analyze</option>
                        <option value="reason">Reason</option>
                        <option value="stream">Stream (SSE)</option>
                    </select>
                    <button type="button" id="runBtn">Run</button>
                    <button type="button" id="clearBtn" class="secondary">
                        Clear Output
                    </button>
                    <div
                        id="output"
                        class="output"
                        style="margin-top: 12px"
                        role="log"
                        aria-live="polite"
                        aria-relevant="additions text"
                        tabindex="-1"
                    >
                        Ready.
                    </div>
                </section>
            </main>
        </div>

        <script>
            ;(function () {
                var apiBaseInput = document.getElementById("apiBase")
                var statusOutput = document.getElementById("statusOutput")
                var persistenceOutput =
                    document.getElementById("persistenceOutput")
                var statusPill = document.getElementById("statusPill")
                var output = document.getElementById("output")

                function focusOutput() {
                    output.focus()
                }

                function apiUrl(path) {
                    return apiBaseInput.value.replace(/\/$/, "") + path
                }

                async function refreshStatus() {
                    statusPill.textContent = "checking…"
                    try {
                        var res = await fetch(apiUrl("/api/agi/status"))
                        var text = await res.text()
                        statusOutput.textContent = text
                        statusPill.textContent = res.ok
                            ? "online"
                            : "error " + res.status

                        if (persistenceOutput) {
                            var persistenceRes = await fetch(
                                apiUrl("/api/agi/persistence"),
                            )
                            persistenceOutput.textContent =
                                await persistenceRes.text()
                        }
                    } catch (err) {
                        statusOutput.textContent = String(err)
                        if (persistenceOutput) {
                            persistenceOutput.textContent = String(err)
                        }
                        statusPill.textContent = "offline"
                    }
                }

                async function loadPersistence() {
                    try {
                        var res = await fetch(apiUrl("/api/agi/persistence"))
                        if (res.ok) {
                            var data = await res.json()
                            output.textContent = JSON.stringify(data, null, 2)
                        }
                    } catch (err) {
                        console.warn("Persistence endpoint unavailable:", err)
                    }
                }

                async function runAnalyzeOrReason(endpoint) {
                    var query = document.getElementById("query").value.trim()
                    if (!query) return
                    output.textContent = "Running…"
                    output.setAttribute("aria-busy", "true")
                    var res = await fetch(apiUrl(endpoint), {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ query: query }),
                    })
                    var text = await res.text()
                    output.textContent = text
                    output.setAttribute("aria-busy", "false")
                    focusOutput()
                }

                async function runStream() {
                    var query = document.getElementById("query").value.trim()
                    if (!query) return
                    output.innerHTML = ""
                    output.setAttribute("aria-busy", "true")
                    var res = await fetch(apiUrl("/api/agi/stream"), {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ query: query }),
                    })
                    var text = await res.text()
                    if (window.AGIStreamUtils) {
                        var deltas = window.AGIStreamUtils.parseSSEText(text)
                        var html = deltas
                            .map(window.AGIStreamUtils.prettyPrintDelta)
                            .join("")
                        if (html) {
                            output.innerHTML = html
                        } else {
                            output.textContent = text
                        }
                    } else {
                        output.textContent = text
                    }
                    output.setAttribute("aria-busy", "false")
                    focusOutput()
                }

                document
                    .getElementById("refreshStatus")
                    .addEventListener("click", refreshStatus)
                document
                    .getElementById("clearBtn")
                    .addEventListener("click", function () {
                        output.textContent = "Ready."
                        focusOutput()
                    })
                document
                    .getElementById("query")
                    .addEventListener("keydown", function (event) {
                        if (
                            (event.ctrlKey || event.metaKey) &&
                            event.key === "Enter"
                        ) {
                            event.preventDefault()
                            document.getElementById("runBtn").click()
                        }
                    })
                document
                    .getElementById("runBtn")
                    .addEventListener("click", function () {
                        var mode = document.getElementById("mode").value
                        if (mode === "stream")
                            return runStream().catch(function (e) {
                                output.textContent = String(e)
                                output.setAttribute("aria-busy", "false")
                                focusOutput()
                            })
                        var endpoint =
                            mode === "reason"
                                ? "/api/agi/reason"
                                : "/api/agi/analyze"
                        runAnalyzeOrReason(endpoint).catch(function (e) {
                            output.textContent = String(e)
                            output.setAttribute("aria-busy", "false")
                            focusOutput()
                        })
                    })

                refreshStatus()
            })()
        </script>
    </body>
</html>
