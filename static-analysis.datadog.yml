schema-version: v1
ignore:
    # Ignore editor/runtime dependencies outside the repository to avoid false positives
    # (for example, Pylance bundled typeshed stubs under /home/vscode/.vscode-server/extensions).
    - /home/vscode/.vscode-server/extensions/**
rulesets:
    - javascript-best-practices
    - javascript-browser-security
    - javascript-code-style
    - javascript-common-security
    - javascript-express
    - javascript-inclusive
    - javascript-node-security
    - jsx-react
    - csharp-best-practices
    - csharp-code-style
    - csharp-security
    - csharp-inclusive
    - python-best-practices
    - python-code-style
    - python-django
    - python-flask
    - python-inclusive
    - python-pandas
    - python-security
