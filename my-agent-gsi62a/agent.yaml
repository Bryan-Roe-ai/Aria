# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

name: my-agent-gsi62a
kind: hosted
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: ""
    memory: ""
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    - name: AZURE_AI_EMBEDDING_DEPLOYMENT_NAME
      value: ${AZURE_AI_EMBEDDING_DEPLOYMENT_NAME}
description: >
    A personal coach agent that remembers your training goals, preferences, and constraints across sessions. Uses
    FoundryMemoryProvider for per-user-private memory grounded in a Foundry Memory store.
metadata:
    tags:
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Agent Framework
        - Foundry Memory
        - RAG
