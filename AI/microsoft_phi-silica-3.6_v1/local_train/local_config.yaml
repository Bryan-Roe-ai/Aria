# Local LoRA fine-tuning configuration
# Optimized for consumer hardware (single GPU or CPU)

# Model
model_id: "microsoft/Phi-3.5-mini-instruct"  # or "microsoft/Phi-3-mini-4k-instruct"

# Data files (relative to data directory)
train_file: "train.json"
eval_file: "test.json"

# Output
output_dir: "outputs"

# Training hyperparameters
num_epochs: 3
batch_size: 1
gradient_accumulation_steps: 4  # Effective batch size = batch_size * gradient_accumulation_steps
learning_rate: 0.0002
max_seq_length: 512  # Reduce for limited VRAM
warmup_steps: 100

# LoRA configuration
lora_r: 16  # Rank (higher = more parameters, better quality, slower)
lora_alpha: 32  # Scaling factor (usually 2*r)
lora_dropout: 0.05

# Optimization flags
use_fp16: false  # Use FP16 (for older GPUs)
use_bf16: true  # Use BF16 (recommended for modern GPUs)
gradient_checkpointing: true  # Save VRAM at cost of speed
use_8bit: false  # 8-bit quantization (saves VRAM)
use_4bit: false  # 4-bit quantization (QLoRA - saves even more VRAM)

# Logging and checkpointing
logging_steps: 10
eval_steps: 50
save_steps: 100
save_total_limit: 3  # Keep only N best checkpoints

# Random seed
seed: 42
