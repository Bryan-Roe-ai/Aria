# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

name: my-agent-0b2avt
kind: hosted
protocols:
  - protocol: responses
    version: 2.0.0
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: MEMORY_STORE_NAME
    value: ${MEMORY_STORE_NAME}
description: >
  An Agent Framework agent with persistent semantic memory backed by an Azure AI Foundry Memory Store. Uses
  FoundryMemoryProvider to retrieve and store memories around each model invocation, allowing the agent to remember
  facts about a user across sessions.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Foundry Memory
resources:
  cpu: ""
  memory: ""
