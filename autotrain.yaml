version: 1

# Define one or more training jobs. Jobs run sequentially when invoked.
# Runners:
#   - hf:    Uses Hugging Face stack via AI/microsoft_phi-silica-3.6_v1/scripts/train_lora.py
#   - local: Uses the streamlined local runner scripts/run_local_lora_training.py

jobs:
  - name: phi36_mixed_chat
    runner: hf
    # Paths are relative to repo root unless absolute
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/mixed_chat
    save_dir: data_out/lora_training
    # Training overrides (optional)
    epochs: 1
    max_train_samples: 64
    max_eval_samples: 16
    learning_rate: 0.0002
    lora_dropout: 0.1
    # For full control over base model id
    # hf_model_id: microsoft/Phi-3.5-mini-instruct

  # Example of using the local runner (QLoRA-friendly, simple)
  # - name: local_quickstart
  #   runner: local
  #   config: AI/microsoft_phi-silica-3.6_v1/local_train/local_config.yaml
  #   epochs: 1
  #   max_train_samples: 10
  #   reinstall: false   # set true to force re-install of venv deps
