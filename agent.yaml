# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
# ------------------------------------------------------------------------------

schemaVersion: "1.0" # Explicit schema versioning

name: Aria
description: Aria agent runtime configuration.
version: "1.0.0"

metadata:
  maintainers:
    - name: "Bryan-Roe"
      email: "bryan@example.com"
      github: "Bryan-Roe"
  labels:
    app: "aria"
    component: "agent"
    tier: "backend"
    environment: "production"
    team: "ai-platform"
    immutable: "true"

build:
  context: "./"
  dockerfile_path: Dockerfile
  # target: production
  args:
    # EXAMPLE_ARG: "default" # Add useful build arguments here with descriptions

platforms:
  - linux/amd64
  - linux/arm64 # Optional: for multi-arch builds

image: ghcr.io/bryan-roe/aria:1.0.0
imagePullPolicy: IfNotPresent

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "3500m"
    memory: "7Gi"

restartPolicy: OnFailure

ports:
  - name: http
    containerPort: 8080
    protocol: TCP
  # - name: metrics
  #   containerPort: 9090

healthcheck:
  # Compatibility check: simple container-level health command
  command: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
  interval: "30s"
  timeout: "5s"
  retries: 3
  startPeriod: "10s"

# Prefer explicit Kubernetes-style probes when supported by the orchestrator.
readinessProbe:
  httpGet:
    path: /health/ready
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

livenessProbe:
  httpGet:
    path: /health/live
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/startup
    port: 8080
    scheme: HTTP
  periodSeconds: 10
  failureThreshold: 30
  timeoutSeconds: 5

lifecycle:
  preStop:
    exec:
      command: ["sh", "-c", "sleep 10"]

env:
  - name: LOG_LEVEL
    value: "${LOG_LEVEL:-info}"
  - name: AGENT_NAME
    value: "Aria"
  - name: AGENT_VERSION
    value: "1.0.0"
  - name: HTTP_PORT
    value: "8080"
  # - name: DB_PASSWORD
  #   valueFrom: secret/db-password  # Example secret reference

security:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  privileged: false
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile: "RuntimeDefault"
  procMount: "default"
  noNewPrivileges: true

logging:
  driver: "json-file"
  level: "info"
  options:
    max-size: "10m"
    max-file: "3"
