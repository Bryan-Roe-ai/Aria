azure:
  location: eastus
  resource_group: rg-quantum-ai
  storage_account: quantumstorage
  subscription_id: ''
  workspace_name: quantum-ai-workspace
logging:
  level: INFO
  results_dir: ./results
  save_results: true
ml:
  data:
    feature_dimension: 4
    train_test_split: 0.8
  model:
    entanglement: full
    n_layers: 2
    n_qubits: 4
  training:
    batch_size: 64
    epochs: 25
    learning_rate: 0.005
    validation_split: 0.2
quantum:
  hardware:
    optimization_level: 2
    shots: 500
  provider: ionq
  simulator:
    backend: default.qubit
    shots: 1024
