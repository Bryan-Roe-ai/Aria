# GitHub Secret Scanning configuration
# https://docs.github.com/en/code-security/secret-scanning/configuring-secret-scanning-for-your-repositories
#
# This file controls which paths GitHub Secret Scanning (including the
# AI-powered generic password / credential detection) will ignore.
# Reducing noise from test fixtures and example files ensures that real
# credential leaks are surfaced clearly in the Security tab.
#
# Notes:
# - The "paths-ignore" list applies to ALL secret scanning patterns
#   (partner patterns, custom patterns, and AI-detected secrets).
# - Gitleaks (gitleaks-action in secrets-scan.yml) performs the
#   authoritative, history-wide scan; this file governs the lighter-weight
#   GitHub-native scan that runs continuously on push.

paths-ignore:
    # ── Test fixtures & example configs ────────────────────────────────────────
    - "tests/**"
    - "**/*.example"
    - "**/*.example.*"
    - "**/*.sample"
    - "**/*.sample.*"
    - "**/*.template"
    - "**/*.template.*"
    - "**/*.dist"
    - "**/local.settings.json.example"

    # ── Documentation ──────────────────────────────────────────────────────────
    - "docs/**"
    - "**/*.md"
    - "**/*.rst"

    # ── Generated / output directories ─────────────────────────────────────────
    # Training outputs, evaluation results, and quantum cache never contain
    # source secrets — only model weights and numeric data.
    - "data_out/**"
    - "datasets/**"
    - "ai-projects/quantum-ml/results/**"
    - "ai-projects/quantum-ml/cache/**"
    - "generated_tools/**"
    - "generated_sites/**"

    # ── Dependency trees ────────────────────────────────────────────────────────
    - "**/node_modules/**"
    - "**/.venv/**"
    - "**/venv/**"
    - "**/.python_packages/**"

    # ── Binary / compiled artifacts ─────────────────────────────────────────────
    - "**/*.pyc"
    - "**/*.pyo"
    - "**/*.whl"
    - "**/*.egg-info/**"
    - "**/*.safetensors"
    - "**/*.ckpt"
    - "**/*.pt"
    - "**/*.bin"
    - "**/*.onnx"
    - "**/*.pkl"
    - "**/*.joblib"
    - "**/*.npz"

    # ── Build artifacts ──────────────────────────────────────────────────────────
    - "**/dist/**"
    - "**/build/**"
    - "**/coverage/**"
    - "apps/*/dist/**"
    - "apps/*/build/**"
    - ".python_packages/**"
    - "bin/**"
    - "obj/**"

    # ── Caches ───────────────────────────────────────────────────────────────────
    - "**/__pycache__/**"
    - "**/.pytest_cache/**"
    - "**/.mypy_cache/**"
    - "**/.ruff_cache/**"
    - "**/.pnpm-store/**"
