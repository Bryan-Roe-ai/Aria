name: Dependency Review

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, edited]
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '**/npm-shrinkwrap.json'
      - '**/yarn.lock'
      - '**/pnpm-lock.yaml'
      - '**/pyproject.toml'
      - '**/poetry.lock'
      - '**/requirements.txt'
      - '**/requirements-*.txt'
      - '**/Pipfile'
      - '**/Pipfile.lock'
      - '**/setup.py'
      - '**/go.mod'
      - '**/go.sum'
      - '**/Gemfile'
      - '**/Gemfile.lock'
      - '**/pom.xml'
      - '**/build.gradle'
      - '**/build.gradle.kts'
      - '**/gradle.lockfile'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/composer.json'
      - '**/composer.lock'
      - '**/packages.lock.json'

permissions:
  contents: read
  # Needed only because comment-summary-in-pr is enabled:
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    # Optional: skip draft PRs to reduce noise/cost
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9
        with:
          comment-summary-in-pr: on-failure
          deny-licenses: AGPL-1.0-only, AGPL-1.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later
          fail-on-severity: high
