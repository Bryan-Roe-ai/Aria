disable-default-queries: false

queries:
  - uses: security-extended
  - uses: security-and-quality

paths-ignore:
  - "**/node_modules/**"
  - "**/vendor/**"
  - "**/.venv/**"
  - "**/venv/**"
  - "**/env/**"
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/*.pyo"
  - "**/*.whl"
  - "**/*.egg-info/**"
  - "**/.pytest_cache/**"
  - "**/.mypy_cache/**"
  - "**/.ruff_cache/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/coverage/**"
  - "**/test_data/**"
  - "**/fixtures/**"
  - "**/generated/**"
  - ".git/**"
  - "docs/**"
  - "**/*.md"
  - "**/*.rst"
