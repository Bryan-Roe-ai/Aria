name: "Hardened CodeQL"

# Specify languages explicitly to avoid auto-detection issues in monorepos
language:
  - python
  - javascript
  - typescript

queries:
  - uses: security-extended
  - uses: security-and-quality

paths-ignore:
  # Dependencies and build artifacts
  - node_modules
  - vendor
  - dist
  - build
  - coverage
  - .venv
  - venv
  - env
  
  # Project-specific: isolated AI subprojects with their own environments
  - ai-projects/quantum-ml/.venv
  - ai-projects/quantum-ml/env
  - ai-projects/chat-cli/.venv
  - ai-projects/chat-cli/env
  - AI/microsoft_phi-silica-3.6_v1/.venv
  - AI/microsoft_phi-silica-3.6_v1/env
  
  # Test fixtures and generated code
  - "**/test_data/**"
  - "**/fixtures/**"
  - "**/generated/**"
  
  # Package managers and lock files (not source)
  - "**/*.lock"
  - "**/*.whl"
  - "**/*.egg-info"
  
  # Documentation and config
  - "**/*.md"
  - ".git"
  - ".github"

# Explicit Python settings for monorepo
python-version: "3.11"
