# CodeQL configuration for Aria.
# Docs:
# https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning#using-a-custom-configuration-file

# NOTE:
# - 'language' is configured in the CodeQL workflow matrix, not here.
# - Python version is configured in the workflow via actions/setup-python.

disable-default-queries: false

queries:
  - uses: security-extended
  - uses: security-and-quality

# Keep scan coverage broad; only exclude non-source, vendored, or generated content.
paths-ignore:
  # Third-party dependencies
  - "**/node_modules/**"
  - "**/vendor/**"

  # Python virtual environments
  - "**/.venv/**"
  - "**/venv/**"
  - "**/env/**"

  # Python caches and packaging artifacts
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/*.pyo"
  - "**/*.whl"
  - "**/*.egg-info/**"
  - "**/.pytest_cache/**"
  - "**/.mypy_cache/**"
  - "**/.ruff_cache/**"

  # Frontend / build artifacts
  - "**/dist/**"
  - "**/build/**"
  - "**/coverage/**"
  - "apps/*/dist/**"
  - "apps/*/build/**"
  - "**/.pnpm-store/**"

  # Azure Functions artifacts
  - ".python_packages/**"
  - "bin/**"
  - "obj/**"

  # ML model binaries and training outputs (not source code)
  - "data_out/**"
  - "**/*.safetensors"
  - "**/*.ckpt"
  - "**/*.pt"
  - "**/*.bin"
  - "**/*.onnx"
  - "**/*.pkl"
  - "**/*.joblib"
  - "**/*.npz"

  # Datasets (read-only data, not source code)
  - "datasets/**"

  # Quantum ML results and simulation cache
  - "ai-projects/quantum-ml/results/**"
  - "ai-projects/quantum-ml/cache/**"

  # Generated tools and sites (LLM-generated output)
  - "generated_tools/**"
  - "generated_sites/**"

  # Generated and fixture content
  - "**/test_data/**"
  - "**/fixtures/**"
  - "**/generated/**"

  # Documentation and repository metadata
  - ".git/**"
  - "docs/**"
  - "**/*.md"
  - "**/*.rst"

  # Logs and temporary files
  - "**/*.log"
  - "**/tmp/**"
  - "**/temp/**"
