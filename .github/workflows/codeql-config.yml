name: "Hardened CodeQL"

language:
  - python
  - javascript-typescript

queries:
  - uses: security-extended
  - uses: security-and-quality

paths:
  - "function_app.py"
  - "shared/**"
  - "apps/**"
  - "scripts/**"
  - "ai-projects/**"

paths-ignore:
  - "**/node_modules/**"
  - "**/.venv/**"
  - "**/venv/**"
  - "**/env/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/coverage/**"
  - "**/test_data/**"
  - "**/fixtures/**"
  - "**/generated/**"
  - "**/*.whl"
  - "**/*.egg-info/**"
  - "**/*.md"
  - ".git/**"

python-version: "3.11"
