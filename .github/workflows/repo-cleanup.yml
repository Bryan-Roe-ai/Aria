name: Repository Cleanup Automation

on:
  pull_request:
  push:
    branches:
      - main
      - repo-cleanup-automation
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  repo-health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Validate repository structure
        run: |
          python tools/repo_cleanup/validate_structure.py || true

      - name: Detect runtime artifacts
        run: |
          echo 'Scanning for runtime artifacts...'
          find . -type d -name '__pycache__' || true
          find . -type d -name '.venv*' || true
          find . -type f -name '*.pyc' || true
          find . -type f -name 'coverage*' || true

      - name: Detect oversized Python modules
        run: |
          python - <<'PY'
          import os
          threshold = 5000
          for root, _, files in os.walk('.'):
              for file in files:
                  if file.endswith('.py'):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              lines = sum(1 for _ in f)
                          if lines > threshold:
                              print(f'OVERSIZED MODULE: {path} ({lines} lines)')
                      except Exception:
                          pass
          PY

      - name: Detect duplicate naming patterns
        run: |
          python - <<'PY'
          import os
          dirs = []
          for item in os.listdir('.'):
              if os.path.isdir(item):
                  dirs.append(item.lower().replace('-', '_'))

          seen = {}
          for d in dirs:
              seen[d] = seen.get(d, 0) + 1

          duplicates = [k for k,v in seen.items() if v > 1]
          if duplicates:
              print('Potential duplicate directory naming detected:')
              for dup in duplicates:
                  print('-', dup)
          else:
              print('No duplicate naming patterns found.')
          PY

      - name: Generate cleanup report
        run: |
          mkdir -p docs/reports
          echo '# Repository Cleanup Report' > docs/reports/repo-health.md
          echo '' >> docs/reports/repo-health.md
          echo 'Generated automatically by GitHub Actions.' >> docs/reports/repo-health.md
          echo '' >> docs/reports/repo-health.md
          echo '## Runtime Artifact Scan' >> docs/reports/repo-health.md
          find . -type d -name '__pycache__' >> docs/reports/repo-health.md || true

      - name: Upload cleanup report
        uses: actions/upload-artifact@v4
        with:
          name: repo-health-report
          path: docs/reports/repo-health.md
