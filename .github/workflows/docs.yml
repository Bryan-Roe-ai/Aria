name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      - "docs/requirements.txt"
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      - "docs/requirements.txt"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "docs/requirements.txt"

      - name: Install doc dependencies
        run: python -m pip install --upgrade pip && pip install -r docs/requirements.txt

      - name: Build docs
        run: |
          if [ -f docs/Makefile ]; then
            make -C docs html
          else
            echo "docs/Makefile not found. Add a docs build command here."
            exit 1
          fi
