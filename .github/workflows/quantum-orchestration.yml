name: Quantum Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-quantum:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Run Orchestration
      shell: pwsh
      run: |
        ./azure/quantum_master_orchestration.ps1 -ResourceGroup rg-quantum-ai -WorkspaceName quantum-ai-workspace -Location eastus
        # Or the Logic App variant
        # ./azure/quantum_full_logicapp_orchestration.ps1 -LogicAppUrl $env:LOGIC_APP_URL
      env:
        LOGIC_APP_URL: ${{ secrets.LOGIC_APP_URL }}
