name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
  CONFIGURE_PAGES_SHA: 983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
  JEKYLL_BUILD_PAGES_SHA: 44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1.0.13
  UPLOAD_PAGES_ARTIFACT_SHA: 56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
  DEPLOY_PAGES_SHA: cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Validate generated site bundles
        run: |
          set -euo pipefail
          echo "Validating generated site bundles..."
          python scripts/validate_site_bundles.py --strict-metadata

      - name: Sync generated site bundles into docs
        run: |
          set -euo pipefail
          # Sync only when generated_sites/ has at least one bundle subdirectory.
          if compgen -G 'generated_sites/*/' > /dev/null; then
            mkdir -p docs/generated
            echo "Mirroring generated_sites/ to docs/generated/ and removing stale generated files."
            rsync -a --delete generated_sites/ docs/generated/
          else
            echo "No generated site bundles found; skipping docs/generated sync."
          fi

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
