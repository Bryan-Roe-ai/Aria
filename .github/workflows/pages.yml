name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - copilot/setup-git-pages-3d-world
    paths:
      - 'docs/**'
      - 'aria_web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Verify docs directory
        run: |
          echo "Contents of docs directory:"
          ls -la docs/
          echo "Checking for required files:"
          test -f docs/index.html && echo "✓ index.html found" || echo "✗ index.html missing"
          test -f docs/aria_controller.js && echo "✓ aria_controller.js found" || echo "✗ aria_controller.js missing"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
