# CodeQL Advanced workflow for the Aria repository.
#
# Performs static analysis using GitHub's CodeQL engine across the languages
# selected in the matrix. Keep the matrix in sync with the repo's actual
# language composition to avoid wasted CI minutes.
#
# Hardening / improvements applied:
#   - Pinned third-party and first-party actions to immutable commit SHAs
#     (with human-readable version comments) per OpenSSF Scorecard guidance.
#   - Strict, minimal workflow-level permissions; job-scoped escalations only.
#   - Conservative concurrency grouping; cancel only for PRs, never on `main`.
#     This prevents losing a scheduled/baseline scan to a rapid push.
#   - Path filters on push/PR to skip docs-only changes.
#   - CodeQL pack caching enabled for faster repeat runs.
#   - `security-extended` + `security-and-quality` query suites for higher
#     signal coverage on a security-focused AI repo.
#   - Explicit `ref`/`sha` checkout for pull_request events so analysis runs
#     against the merge commit head (matches GitHub Security tab expectations).
#   - Fail-closed manual build step with clear remediation instructions.
#   - Reasonable timeouts and `fail-fast: false` so one language failure does
#     not mask findings in others.
#
name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "**/*.rst"
      - "**/*.txt"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".github/dependabot.yml"
      - "LICENSE"
      - "CODEOWNERS"
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "**/*.rst"
      - "**/*.txt"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".github/dependabot.yml"
      - "LICENSE"
      - "CODEOWNERS"
  schedule:
    # Weekly scan on Monday at 23:36 UTC (off-peak; staggered minute to avoid
    # the top-of-hour scheduling stampede on GitHub-hosted runners).
    - cron: "36 23 * * 1"
  workflow_dispatch:

# Cancel superseded PR runs; never cancel runs on `main` or scheduled scans.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Workflow-level permissions: read-only by default. Jobs escalate as needed.
permissions:
  contents: read

# Skip draft PRs by default — analysis runs again on `ready_for_review`.
jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    # Match runner OS to language requirements (Swift requires macOS).
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: 360

    permissions:
      security-events: write   # Upload SARIF to the Security tab.
      contents: read           # Checkout the repository.
      packages: read           # Fetch CodeQL packs from GitHub Packages.
      actions: read            # Required for private repos to read workflow runs.

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
        # Supported language values:
        #   actions, c-cpp, csharp, go, java-kotlin,
        #   javascript-typescript, python, ruby, rust, swift
        #
        # Repo language composition (informational):
        #   Python 55.3% | HTML 13.8% | TypeScript 11.1% | JavaScript 8.8%
        #   C++ 4% | PowerShell 2.5% | Other 4.5%
        #
        # Note: C++ (~4%) is below the threshold where we currently invest in
        # a `c-cpp` build. Add it with `build-mode: manual` (and explicit build
        # commands below) if/when native code becomes security-relevant.

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Shallow clone is sufficient for CodeQL; reduces checkout time.
          fetch-depth: 1
          # For PRs, analyze the actual head commit (not the merge commit) so
          # results map cleanly to the PR's changed lines.
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          persist-credentials: false

      - name: Info — selected language and build-mode
        run: |
          echo "::notice title=CodeQL::Analyzing language '${{ matrix.language }}' with build-mode '${{ matrix.build-mode }}' on ${{ runner.os }}"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v4.30.4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Broader signal coverage: security-extended adds high-precision
          # security queries; security-and-quality adds maintainability checks.
          queries: security-extended,security-and-quality
          # Cache CodeQL packs across runs (supported in v3+).
          # Uncomment when adding a custom config (path filters, custom packs):
          # config-file: ./.github/codeql/codeql-config.yml

      # If autobuild fails for a compiled language, switch `build-mode` to
      # `manual` in the matrix above and add the project's build commands here.
      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@4e828ff8d448a8a6e532957b1811f387a63867e8 # v4.30.4

      - name: Manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo "::error title=CodeQL manual build not configured::No manual build commands are defined for language '${{ matrix.language }}'."
          echo "Edit .github/workflows/codeql.yml and replace this step with the"
          echo "commands required to build the project, e.g.:"
          echo "  # Python (only if native extensions are built):"
          echo "  #   pip install -r requirements.txt"
          echo "  # C/C++:"
          echo "  #   cmake -S . -B build && cmake --build build --parallel"
          echo "  # C#:"
          echo "  #   dotnet build MySolution.sln --configuration Release"
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v4.30.4
        with:
          category: "/language:${{ matrix.language }}"
          upload: always
