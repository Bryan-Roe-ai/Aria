# CodeQL Advanced workflow for the Aria repository.
#
# This workflow performs static analysis using GitHub's CodeQL engine across
# all languages used in the project (Actions, C/C++, C#, JS/TS, Python).
#
# Notes for maintainers:
#   - Keep the language matrix in sync with the languages actually present in
#     the repo. Remove entries that no longer apply to avoid wasted CI minutes.
#   - The `security-extended` query suite is enabled for deeper coverage; drop
#     back to the default suite if scan times become problematic.
#   - Concurrency cancels superseded runs on the same ref to save runner time.

name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "LICENSE"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "LICENSE"
  schedule:
    # Weekly scan on Monday at 23:36 UTC.
    - cron: "36 23 * * 1"
  workflow_dispatch:

# Cancel in-progress runs for the same ref/PR when a new commit is pushed.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default minimal permissions for the workflow; jobs may add what they need.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Match runner OS to language requirements (Swift requires macOS).
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: 360

    permissions:
      # Required to upload SARIF results to the Security tab.
      security-events: write
      # Required to fetch internal or private CodeQL packs.
      packages: read
      # Required for workflows in private repositories.
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          # Supported values for 'language':
          #   actions, c-cpp, csharp, go, java-kotlin,
          #   javascript-typescript, python, ruby, rust, swift
          # Docs:
          #   https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning
          #   https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Use the extended security query suite for higher signal coverage.
          # Switch to "security-and-quality" to also include code-quality queries,
          # or remove this line entirely to fall back to the default suite.
          queries: security-extended
          # Uncomment to use a config file for path filters / custom packs:
          # config-file: ./.github/codeql/codeql-config.yml

      # If autobuild fails for a compiled language, switch its 'build-mode' to
      # 'manual' in the matrix and provide explicit build commands here.
      - name: Manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo "::error::No manual build commands configured for language '${{ matrix.language }}'."
          echo "Edit .github/workflows/codeql.yml and replace this step with the"
          echo "commands required to build the project, for example:"
          echo "  make bootstrap"
          echo "  make release"
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: always
