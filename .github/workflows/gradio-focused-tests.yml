name: Gradio Focused Tests

on:
  push:
    paths:
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/gradio-focused-tests.yml'
  pull_request:
    paths:
      - 'tests/**'
      - 'scripts/**'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  gradio-focused:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Python and minimal dependencies
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'
          install-requirements: 'false'
          install-dev-requirements: 'false'
          extra-packages: 'pytest gradio'

      - name: Run focused Gradio tests
        run: pytest -q tests/test_gradio_*.py -q
