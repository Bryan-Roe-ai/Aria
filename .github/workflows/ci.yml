concurrency:
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}
  group: ci-${{ github.workflow }}-${{ github.ref }}

env:
  FORCE_COLOR: '1'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PIP_NO_PYTHON_VERSION_WARNING: '1'
  PYTHON_VERSION: '3.11'
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHONUNBUFFERED: '1'

jobs:
  ci-success:
    if: >-
      always() &&
      (needs.setup-guardrails.result == 'success' || needs.setup-guardrails.result == 'failure') &&
      (needs.lint.result == 'success' || needs.lint.result == 'failure') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'failure') &&
      (needs.type-check.result == 'success' || needs.type-check.result == 'failure' || needs.type-check.result == 'skipped')
    name: CI success
    needs:
      - setup-guardrails
      - lint
      - type-check
      - unit-tests
    runs-on: ubuntu-latest
    steps:
      - env:
          LINT_RESULT: ${{ needs.lint.result }}
          SETUP_RESULT: ${{ needs.setup-guardrails.result }}
          TEST_RESULT: ${{ needs.unit-tests.result }}
          TYPE_RESULT: ${{ needs.type-check.result }}
        name: Verify all required jobs succeeded
        run: |
          set -euo pipefail
          echo "setup-guardrails=$SETUP_RESULT"
          echo "lint=$LINT_RESULT"
          echo "type-check=$TYPE_RESULT"
          echo "unit-tests=$TEST_RESULT"

          if [[ "$SETUP_RESULT" != "success" ]]; then
            echo "::error::Setup guardrails job failed."
            exit 1
          fi

          if [[ "$LINT_RESULT" != "success" ]]; then
            echo "::error::Lint job failed."
            exit 1
          fi

          if [[ "$TEST_RESULT" != "success" ]]; then
            echo "::error::Unit test job failed."
            exit 1
          fi

          if [[ "$TYPE_RESULT" != "success" ]]; then
            echo "::warning::Type check did not pass, but it is currently advisory."
          fi

          echo "All required CI jobs passed."
        shell: bash
    timeout-minutes: 5

  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          cache: pip
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          elif [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install ruff black
        shell: bash

      - name: Run ruff
        run: |
          set -euo pipefail
          python -m ruff check tests shared scripts apps/aria/server.py
        shell: bash

      - name: Run black
        run: |
          set -euo pipefail
          python -m black --check tests shared scripts apps/aria/server.py
        shell: bash
    timeout-minutes: 10

  setup-guardrails:
    name: Setup guardrails (DAB + recursive venv ignore)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          cache: pip
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run setup verification
        uses: ./.github/actions/run-setup-verify
    timeout-minutes: 10

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          cache: pip
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install type-check dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          elif [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install mypy
        shell: bash

      - continue-on-error: true
        name: Run mypy
        run: |
          set -euo pipefail
          python -m mypy shared scripts function_app.py
        shell: bash
    timeout-minutes: 10

  unit-tests:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - if: runner.os == 'Linux'
        name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          cache: pip
          python-version: ${{ env.PYTHON_VERSION }}

      - if: runner.os != 'Windows'
        name: Install test dependencies (Linux)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          elif [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pytest pytest-cov
        shell: bash

      - if: runner.os == 'Windows'
        name: Install test dependencies (Windows)
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements-dev.txt) {
            python -m pip install -r requirements-dev.txt
          } elseif (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          }
          python -m pip install pytest pytest-cov
        shell: pwsh

      - env:
          AZURE_CLIENT_ID: ''
          AZURE_CLIENT_SECRET: ''
          AZURE_TENANT_ID: ''
          CI: 'true'
          OPENAI_API_KEY: ''
        if: runner.os != 'Windows'
        name: Run unit tests (Linux)
        run: |
          set -euo pipefail
          mkdir -p data_out
          python -m pytest tests/ \
            -q --tb=short \
            -m "not slow and not azure and not integration" \
            --ignore=tests/test_ui_playwright.py \
            --ignore=tests/test_ui_pyppeteer.py \
            --ignore=tests/test_ui_selenium.py \
            --maxfail=1 \
            --durations=10 \
            --junitxml=data_out/junit-${{ matrix.os }}.xml \
            --cov=shared --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml:data_out/coverage-${{ matrix.os }}.xml
        shell: bash

      - env:
          AZURE_CLIENT_ID: ''
          AZURE_CLIENT_SECRET: ''
          AZURE_TENANT_ID: ''
          CI: 'true'
          OPENAI_API_KEY: ''
        if: runner.os == 'Windows'
        name: Run unit tests (Windows)
        run: |
          New-Item -ItemType Directory -Path data_out -Force | Out-Null
          python -m pytest tests/ `
            -q --tb=short `
            -m "not slow and not azure and not integration" `
            --ignore=tests/test_ui_playwright.py `
            --ignore=tests/test_ui_pyppeteer.py `
            --ignore=tests/test_ui_selenium.py `
            --maxfail=1 `
            --durations=10 `
            --junitxml=data_out/junit-${{ matrix.os }}.xml `
            --cov=shared --cov=scripts `
            --cov-report=term-missing `
            --cov-report=xml:data_out/coverage-${{ matrix.os }}.xml
        shell: pwsh

      - env:
          CI: 'true'
        if: runner.os != 'Windows'
        name: Run ai-project tests (Linux)
        run: |
          set -euo pipefail
          python scripts/test_runner.py --ai-projects
        shell: bash

      - env:
          CI: 'true'
        if: runner.os == 'Windows'
        name: Run ai-project tests (Windows)
        run: |
          python scripts/test_runner.py --ai-projects
        shell: pwsh

      - if: always()
        name: Upload test results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          if-no-files-found: warn
          name: unit-test-results-${{ matrix.os }}
          path: |
            data_out/junit-${{ matrix.os }}.xml
            data_out/coverage-${{ matrix.os }}.xml
          retention-days: 7
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    timeout-minutes: 20

name: CI

# Canonical PR validation runs through merge-gate.yml.
# This workflow is for branch CI and manual validation runs.
# cspell:words PYTHONDONTWRITEBYTECODE PYTHONUNBUFFERED elif pyppeteer
'on':
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read
