# Aria Autonomous Evolver
# Improved workflow: clearer steps, outputs, conditional dispatch, pinned action versions, concurrency and minimal permissions.

concurrency:
  cancel-in-progress: false
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_SCRIPT_SHA: f28e40c7f34bde8b3046d885e986cb6290c5673b    # v7
  SETUP_NODE_SHA: 49933ea5288caeca8642d1e84afbd3f7d6820020      # v4.4.0

jobs:
  evolve:
    defaults:
      run:
        shell: bash
    if: always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'))
    name: Evaluate & optionally trigger evolution
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - env:
          FITNESS_THRESHOLD: ${{ inputs.fitness_threshold || '60' }}
          FORCE_EVOLUTION: ${{ inputs.force_evolution || 'false' }}
          STABILITY_THRESHOLD: ${{ inputs.stability_threshold || '70' }}
          TELEMETRY_CONCLUSION: ${{ github.event.workflow.run.conclusion }}
        id: evaluate
        name: Evaluate evolution conditions
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            function parseThreshold(value, name) {
              const parsed = Number(value);
              if (!Number.isFinite(parsed) || parsed < 0 || parsed > 100) {
                throw new Error(`Invalid ${name}: ${value}. Must be a number between 0 and 100.`);
              }
              return parsed;
            }

            const fitnessThreshold = parseThreshold(process.env.FITNESS_THRESHOLD, 'FITNESS_THRESHOLD');
            const stabilityThreshold = parseThreshold(process.env.STABILITY_THRESHOLD, 'STABILITY_THRESHOLD');

            const forceEvolutionStr = String(process.env.FORCE_EVOLUTION || 'false').toLowerCase().trim();
            if (!['true', 'false'].includes(forceEvolutionStr)) {
              throw new Error(`Invalid FORCE_EVOLUTION: ${process.env.FORCE_EVOLUTION}. Must be 'true' or 'false'.`);
            }
            const forceEvolution = forceEvolutionStr === 'true';

            const runsResponse = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              branch: 'main',
              status: 'completed',
              per_page: 50
            });

            const telemetryRuns = runsResponse.data.workflow_runs
              .filter((run) => run.name === 'Aria Telemetry Trigger Engine' && run.head_branch === 'main')
              .slice(0, 10);

            const completedRuns = telemetryRuns.filter((run) => typeof run.conclusion === 'string');

            let fitness = 0;
            let stability = 100;
            let telemetryConclusion = process.env.TELEMETRY_CONCLUSION || 'n/a';

            if (completedRuns.length > 0) {
              const successful = completedRuns.filter((run) => run.conclusion === 'success').length;
              const problematic = completedRuns.filter((run) =>
                ['failure', 'cancelled', 'timed_out', 'action_required'].includes(run.conclusion)
              ).length;

              fitness = (successful / completedRuns.length) * 100;
              stability = (problematic / completedRuns.length) * 100;
              telemetryConclusion = completedRuns[0].conclusion || telemetryConclusion;
            } else if (context.eventName === 'workflow_run') {
              telemetryConclusion = process.env.TELEMETRY_CONCLUSION || 'n/a';
              fitness = telemetryConclusion === 'success' ? 100 : 0;
              stability = telemetryConclusion === 'success' ? 0 : 100;
            }

            const triggered = forceEvolution || (fitness > fitnessThreshold && stability < stabilityThreshold);
            const reason = forceEvolution
              ? 'forced'
              : `fitness>${fitnessThreshold} && stability<${stabilityThreshold}`;

            core.info('Evaluating evolution readiness...');
            core.info(`telemetry conclusion: ${telemetryConclusion}`);
            core.info(`fitness: ${fitness.toFixed(2)}`);
            core.info(`stability: ${stability.toFixed(2)}`);
            core.info(`fitness threshold: ${fitnessThreshold}`);
            core.info(`stability threshold: ${stabilityThreshold}`);
            core.info(`evolution triggered: ${triggered}`);
            core.info(`reason: ${reason}`);

            core.setOutput('evolution_triggered', String(triggered));
            core.setOutput('fitness', fitness.toFixed(4));
            core.setOutput('stability', stability.toFixed(4));
            core.setOutput('reason', reason);

      - if: ${{ steps.evaluate.outputs.evolution_triggered != 'true' }}
        name: Log result when no evolution required
        run: |
          echo "No evolution required this cycle."
          echo "fitness=${{ steps.evaluate.outputs.fitness }}"
          echo "stability=${{ steps.evaluate.outputs.stability }}"

      - env:
          FITNESS: ${{ steps.evaluate.outputs.fitness }}
          REASON: ${{ steps.evaluate.outputs.reason }}
          STABILITY: ${{ steps.evaluate.outputs.stability }}
        if: ${{ steps.evaluate.outputs.evolution_triggered == 'true' }}
        name: Trigger experiment fork signal (repository_dispatch)
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.rest.repos.createDispatchEvent({
                owner,
                repo,
                event_type: 'aria-evolution-triggered',
                client_payload: {
                  source_workflow: context.workflow,
                  trigger: 'autonomous-evolver',
                  evaluated: {
                    fitness: process.env.FITNESS || null,
                    stability: process.env.STABILITY || null,
                    reason: process.env.REASON || null
                  }
                }
              });
              core.info('repository_dispatch aria-evolution-triggered sent successfully.');
            } catch (error) {
              const details = {
                message: error?.message || String(error),
                status: error?.status || null
              };
              core.setFailed(`Failed to dispatch aria-evolution-triggered event to ${owner}/${repo}: ${JSON.stringify(details)}`);
            }

  validate-inputs:
    defaults:
      run:
        shell: bash
    if: github.event_name == 'workflow_dispatch'
    name: Validate workflow inputs
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Validate numeric inputs
        run: |
          set -euo pipefail

          validate_threshold() {
            local value=$1
            local name=$2
            if ! [[ "$value" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
              echo "::error::$name must be a valid number: $value"
              exit 1
            fi
            local num
            num=$(echo "$value" | bc 2>/dev/null || echo "$value")
            if (( $(echo "$num < 0" | bc -l 2>/dev/null || echo 0) )); then
              echo "::error::$name must be >= 0: $value"
              exit 1
            fi
            if (( $(echo "$num > 100" | bc -l 2>/dev/null || echo 0) )); then
              echo "::error::$name must be <= 100: $value"
              exit 1
            fi
          }

          validate_threshold "${{ inputs.fitness_threshold }}" "fitness_threshold"
          validate_threshold "${{ inputs.stability_threshold }}" "stability_threshold"
          echo "✓ All inputs validated successfully"

name: Aria Autonomous Evolver

"on":
  workflow_dispatch:
    inputs:
      fitness_threshold:
        default: "60"
        description: "Trigger threshold: fitness must be greater than this value (0-100)"
        required: false
      force_evolution:
        default: "false"
        description: "Force evolution dispatch regardless of computed metrics"
        required: false
      stability_threshold:
        default: "70"
        description: "Trigger threshold: stability must be lower than this value (0-100)"
        required: false
  workflow_run:
    types:
      - completed
    workflows: ["Aria Telemetry Trigger Engine"]

permissions:
  actions: read
  contents: write
