name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Keep pinned SHAs for supply-chain integrity.
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.2
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
  GITHUB_SCRIPT_SHA: 60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1

  # Policy thresholds (single source of truth).
  MIN_DESCRIPTION_LENGTH: '100'
  MIN_TITLE_LENGTH: '12'
  LARGE_FILES_THRESHOLD: '50'
  LARGE_LINES_THRESHOLD: '1000'
  LARGE_DELETIONS_THRESHOLD: '1000'

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Quick Validation
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          extra-packages: 'pyyaml'

      - name: Validate workflow YAML files
        uses: ./.github/actions/validate-workflow-yaml
        with:
          workflows-path: .github/workflows
          require-jobs: 'true'

      - name: Validate Azure Function bindings
        uses: ./.github/actions/validate-function-bindings
        with:
          functions-path: functions
          require-http-route: 'true'

      - name: Validate generated site bundles (strict)
        uses: ./.github/actions/validate-site-bundles
        with:
          strict-metadata: 'true'

      - name: Check for TODO/FIXME in changed files
        uses: ./.github/actions/scan-todo-fixme
        with:
          base-ref: ${{ github.base_ref }}
        continue-on-error: true

      - name: Fast validation
        run: |
          set -euo pipefail
          if [[ -f scripts/fast_validate.py ]]; then
            python scripts/fast_validate.py
          else
            echo "::notice::scripts/fast_validate.py not found, skipping fast validation"
          fi

      - name: Verify setup guardrails (DAB + recursive venv ignore)
        uses: ./.github/actions/run-setup-verify

  description-check:
    name: PR Description Check
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Check PR description is filled in
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          PR_TITLE="${PR_TITLE:-}"
          PR_BODY="${PR_BODY:-}"

          UNFILLED_PATTERNS=(
            "What does this change do"
            "List of user-visible changes"
            "How was this tested"
            "Replace ALL placeholder text"
            "1–3 sentences describing WHAT changed"
            "Do not leave this as the default text"
          )

          FAILED=0
          ERRORS=()
          BODY_LENGTH=0

          # Remove HTML comments from templates before validation.
          CLEAN_BODY="$(printf '%s' "$PR_BODY" | perl -0777 -pe 's/<!--.*?-->//gs')"

          if [[ -z "$(printf '%s' "$CLEAN_BODY" | tr -d '[:space:]')" ]]; then
            ERRORS+=("PR description is empty. Please fill in the PR template.")
            FAILED=1
          else
            for pattern in "${UNFILLED_PATTERNS[@]}"; do
              if grep -qF -- "$pattern" <<<"$CLEAN_BODY"; then
                ERRORS+=("PR description still contains unfilled placeholder: '$pattern'")
                FAILED=1
              fi
            done

            BODY_LENGTH="$(printf '%s' "$CLEAN_BODY" | wc -c | tr -d ' ')"
            if (( BODY_LENGTH < MIN_DESCRIPTION_LENGTH )); then
              ERRORS+=("PR description is too short (${BODY_LENGTH} chars, minimum ${MIN_DESCRIPTION_LENGTH}). Please fill in Summary, Changes, and Testing.")
              FAILED=1
            fi
          fi

          if [[ "$PR_TITLE" =~ ^(fixup!|squash!) ]]; then
            ERRORS+=("PR title starts with 'fixup!' or 'squash!'. Please use a reviewer-friendly title.")
            FAILED=1
          fi

          if (( ${#PR_TITLE} < MIN_TITLE_LENGTH )); then
            ERRORS+=("PR title is too short (${#PR_TITLE} chars, minimum ${MIN_TITLE_LENGTH}).")
            FAILED=1
          fi

          if [[ "$PR_TITLE" =~ ^([Pp]ending\ [Cc]hanges|[Ee]xported\ from\ ([Yy]our\ )?[Cc]odespace|[Cc]odespace[-\ ]|[Uu]ntitled|[Dd]raft|[Ww][Ii][Pp])(:|\ |$) ]]; then
            ERRORS+=("PR title looks like a default/generated name: '${PR_TITLE}'. Please use a descriptive title.")
            FAILED=1
          fi

          if (( FAILED == 1 )); then
            for err in "${ERRORS[@]}"; do
              echo "::error::${err}"
            done
            {
              echo "## ❌ PR description / title check failed"
              echo
              for err in "${ERRORS[@]}"; do
                echo "- ${err}"
              done
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✓ PR description and title look good (${BODY_LENGTH} chars)"
          echo "## ✓ PR description check passed (${BODY_LENGTH} chars)" >> "$GITHUB_STEP_SUMMARY"

  size-check:
    name: PR Size Check
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Check PR size
        id: size
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });

            const filesChanged = files.length;
            const additions = files.reduce((sum, f) => sum + (f.additions || 0), 0);
            const deletions = files.reduce((sum, f) => sum + (f.deletions || 0), 0);

            await core.summary
              .addHeading('PR Size', 2)
              .addTable([
                [{data: 'Metric', header: true}, {data: 'Value', header: true}],
                ['Files changed', String(filesChanged)],
                ['Lines added', String(additions)],
                ['Lines deleted', String(deletions)]
              ])
              .write();

            const largeFilesThreshold = Number(process.env.LARGE_FILES_THRESHOLD || '50');
            const largeLinesThreshold = Number(process.env.LARGE_LINES_THRESHOLD || '1000');
            const largeDeletionsThreshold = Number(process.env.LARGE_DELETIONS_THRESHOLD || '1000');

            if (
              filesChanged > largeFilesThreshold ||
              additions > largeLinesThreshold ||
              deletions > largeDeletionsThreshold
            ) {
              core.warning(`Large PR detected (${filesChanged} files, +${additions}/-${deletions}). Consider splitting it for easier review.`);
              core.setOutput('pr_size', 'large');
            } else {
              core.info('✓ PR size looks good');
              core.setOutput('pr_size', 'normal');
            }

  label-pr:
    name: Auto-label PR
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Label PR based on files changed
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b
        with:
          repo-token: ${{ github.token }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  # Branch protection target: require this single job.
  policy-gate:
    name: PR Policy Gate
    if: always() && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    needs: [validate, description-check, size-check]
    permissions:
      contents: read
    steps:
      - name: Enforce required checks
        run: |
          set -euo pipefail
          echo "validate=${{ needs.validate.result }}"
          echo "description-check=${{ needs.description-check.result }}"
          echo "size-check=${{ needs.size-check.result }}"

          required_results=(
            "${{ needs.validate.result }}"
            "${{ needs.description-check.result }}"
            "${{ needs.size-check.result }}"
          )

          for result in "${required_results[@]}"; do
            if [[ "$result" != "success" ]]; then
              echo "::error::Required check failed or was not successful: $result"
              exit 1
            fi
          done

          echo "✓ All required PR checks passed."
