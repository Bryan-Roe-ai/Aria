# =============================================================================
# Auto Merge — Label-triggered and gate-triggered PR merge automation
# =============================================================================
# Purpose:
#   • enable             — arms GitHub native auto-merge when `auto-merge` or
#                          `autofix` label is present on a same-repo PR.
#   • disable            — disables native auto-merge when the last matching
#                          label is removed.
#   • merge-on-gate-pass — when the `All Gates Passed` check succeeds, evaluates
#                          associated PRs and merges eligible labeled PRs.
#   • bot-approve        — optionally approves allowlisted bot-authored PRs
#                          using a dedicated PAT from a different identity.
#
# Merge strategy : squash
# Fork PRs       : skipped
# Security       : least-privilege job permissions; no embedded credentials
# =============================================================================

name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  check_run:
    types: [completed]

concurrency:
  group: >-
    auto-merge-${{
      github.event.pull_request.number || github.event.check_run.id
    }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  BOT_APPROVE_ALLOWLIST: "github-actions[bot] copilot-swe-agent[bot]"

jobs:
  enable:
    name: Enable Auto-Merge
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      (
        (
          github.event.action == 'labeled' &&
          (github.event.label.name == 'auto-merge' || github.event.label.name == 'autofix')
        ) ||
        (
          github.event.action != 'unlabeled' &&
          (
            contains(github.event.pull_request.labels.*.name, 'auto-merge') ||
            contains(github.event.pull_request.labels.*.name, 'autofix')
          )
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Check if auto-merge already enabled
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          enabled="$(gh pr view "$PR_NUMBER" --json autoMergeRequest --jq '.autoMergeRequest != null')"
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge (squash)
        if: steps.state.outputs.enabled != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge --auto --squash "$PR_NUMBER"
          echo "✅ Auto-merge enabled for PR #$PR_NUMBER"

      - name: Post informational comment
        if: steps.state.outputs.enabled != 'true' && github.event.action == 'labeled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LABEL: ${{ github.event.label.name }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --body \
            "🤖 **Auto-merge armed** (label: \`${LABEL}\`)

          This PR is configured for squash auto-merge and will merge once GitHub's repository merge requirements are satisfied, including required checks, approvals, mergeability, and any branch protection or ruleset requirements.

          Remove the \`auto-merge\` or \`autofix\` label to cancel."

  disable:
    name: Disable Auto-Merge
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.action == 'unlabeled' &&
      (github.event.label.name == 'auto-merge' || github.event.label.name == 'autofix') &&
      !contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Disable auto-merge (no-op safe)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge --disable-auto "$PR_NUMBER" || echo "Auto-merge was already disabled."

  merge-on-gate-pass:
    name: Merge on Gate Pass
    if: >-
      github.event_name == 'check_run' &&
      github.event.check_run.name == 'All Gates Passed' &&
      github.event.check_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Merge eligible PRs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checkRun = context.payload.check_run;
            const prs = checkRun.pull_requests || [];

            if (!prs.length) {
              core.info('No pull requests associated with this check run; skipping.');
              return;
            }

            const summaryRows = [];
            const thisRepo = context.payload.repository.full_name;

            for (const pr of prs) {
              const prNumber = pr.number;
              core.info(`Evaluating PR #${prNumber} for auto-merge.`);

              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              const labelNames = prData.labels.map((label) => label.name);
              const hasAutoMergeLabel =
                labelNames.includes('auto-merge') || labelNames.includes('autofix');

              if (!hasAutoMergeLabel) {
                core.info(`PR #${prNumber}: missing auto-merge label.`);
                summaryRows.push(`| #${prNumber} | ⊘ skipped (no label) |`);
                continue;
              }

              if (prData.draft) {
                core.info(`PR #${prNumber}: draft.`);
                summaryRows.push(`| #${prNumber} | ⊘ skipped (draft) |`);
                continue;
              }

              if (prData.state !== 'open') {
                core.info(`PR #${prNumber}: not open (${prData.state}).`);
                summaryRows.push(`| #${prNumber} | ⊘ skipped (${prData.state}) |`);
                continue;
              }

              if (!prData.head.repo || prData.head.repo.full_name !== thisRepo) {
                const headRepo = prData.head.repo ? prData.head.repo.full_name : '(deleted fork)';
                core.info(`PR #${prNumber}: fork/deleted fork (${headRepo}).`);
                summaryRows.push(`| #${prNumber} | ⊘ skipped (fork) |`);
                continue;
              }

              const mergeable = prData.mergeable;
              const mergeableState = prData.mergeable_state || 'unknown';

              if (mergeable !== true || mergeableState !== 'clean') {
                core.info(`PR #${prNumber}: blocked (${mergeableState}).`);
                summaryRows.push(`| #${prNumber} | ⏳ blocked (${mergeableState}) |`);
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                });

                core.info(`✅ Merged PR #${prNumber}.`);
                summaryRows.push(`| #${prNumber} | ✅ merged |`);

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: '✅ Auto-merged after `All Gates Passed` succeeded and the PR was in a clean mergeable state.',
                });
              } catch (err) {
                const message = err instanceof Error ? err.message : String(err);
                core.error(`Failed to merge PR #${prNumber}: ${message}`);
                summaryRows.push(`| #${prNumber} | ❌ merge failed — ${message} |`);

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `❌ Auto-merge failed: ${message}`,
                });
              }
            }

            const tableHeader = '| PR | Result |\n|-----|--------|';
            const tableBody = summaryRows.length
              ? summaryRows.join('\n')
              : '| — | _No PRs evaluated._ |';

            await core.summary
              .addHeading('Auto-Merge Results', 2)
              .addRaw(`${tableHeader}\n${tableBody}`)
              .write();

  bot-approve:
    name: Bot-Approve PR
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      vars.AUTO_MERGE_BOT_APPROVE == 'true' &&
      (
        contains(github.event.pull_request.labels.*.name, 'auto-merge') ||
        contains(github.event.pull_request.labels.*.name, 'autofix')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Approve if bot-authored PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          BOT_APPROVE_ALLOWLIST: ${{ env.BOT_APPROVE_ALLOWLIST }}
          HAS_APPROVE_TOKEN: ${{ secrets.AUTO_MERGE_APPROVE_TOKEN != '' }}
        with:
          github-token: ${{ secrets.AUTO_MERGE_APPROVE_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const allowlist = (process.env.BOT_APPROVE_ALLOWLIST || '')
              .split(/\s+/)
              .filter(Boolean);

            const author = context.payload.pull_request.user.login;
            const isAllowed = allowlist.includes(author);

            if (!isAllowed) {
              core.info(`PR author '${author}' is not in BOT_APPROVE_ALLOWLIST; skipping.`);
              return;
            }

            const hasToken = process.env.HAS_APPROVE_TOKEN === 'true';
            if (!hasToken) {
              core.warning(
                'AUTO_MERGE_APPROVE_TOKEN secret is not set. ' +
                'A dedicated PAT from a separate identity is required for bot approval. ' +
                'Skipping bot-approve.'
              );
              return;
            }

            const prNumber = context.payload.pull_request.number;

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const alreadyApproved = reviews.some((review) => review.state === 'APPROVED');
            if (alreadyApproved) {
              core.info(`PR #${prNumber} already has an approval; skipping.`);
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'APPROVE',
              body: `🤖 Automated approval for bot-authored PR (author: @${author}).`,
            });

            core.info(`✅ Approved PR #${prNumber} (author: ${author}).`);
