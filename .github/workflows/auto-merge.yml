name: Auto Merge

# =============================================================================
# Auto Merge — Label-triggered and gate-triggered PR merge automation
# =============================================================================
# yamllint disable rule:key-ordering
# Purpose:
#   • a-prepare-github-actions-pr — converts same-repo github-actions[bot] PRs to
#     ready-for-review and ensures they carry the `autofix` label so the existing
#     auto-merge pipeline can take over.
#   • b-enable — arms GitHub native auto-merge when `auto-merge` or `autofix`
#     label is present on a same-repo PR.
#   • bot-approve — optionally approves allowlisted bot-authored PRs using a
#     dedicated PAT from a different identity.
#   • disable — disables native auto-merge when the last matching label is removed.
#   • merge-on-gate-pass — when the `All Gates Passed` check succeeds, evaluates
#     associated PRs and merges eligible labeled PRs.
#   • finish-open-prs — scheduled/manual sweep that merges already-eligible open PRs.
#
# Merge strategy : squash
# Fork PRs       : skipped
# Security       : least-privilege job permissions; no embedded credentials
# =============================================================================

on:
  check_run:
    types: [completed]
  merge_group:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        default: false
        description: "Evaluate eligibility without merging"
        required: false
        type: boolean
      max_prs:
        default: "20"
        description: "Maximum eligible PRs to process this run"
        required: false
        type: number

env:
  AUTO_MERGE_LABELS: auto-merge autofix
  BLOCKED_AUTO_MERGE_LABELS: no-auto-merge blocked needs-manual-review
  BOT_APPROVE_ALLOWLIST: github-actions[bot] copilot-swe-agent[bot]

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.event.check_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  a-prepare-github-actions-pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.action != 'unlabeled'
    name: Prepare github-actions PR
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          allowed-endpoints: >
            api.github.com:443
          disable-sudo: true
          egress-policy: block

      - env:
          AUTO_MERGE_LABELS: ${{ env.AUTO_MERGE_LABELS }}
        name: Ready PR and apply autofix label
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const autoMergeLabels = new Set((process.env.AUTO_MERGE_LABELS || '').split(/\s+/).filter(Boolean));
            const labelNames = (pr.labels || []).map((label) => label.name);
            const hasAutoMergeLabel = labelNames.some((n) => autoMergeLabels.has(n));

            if (!hasAutoMergeLabel) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['autofix'],
              });
              core.info(`Added 'autofix' label to PR #${pr.number}.`);
            }

            if (!pr.draft) {
              core.info(`PR #${pr.number} is already ready for review.`);
              return;
            }

            await github.graphql(
              `
                mutation MarkReadyForReview($pullRequestId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                    pullRequest {
                      number
                      isDraft
                    }
                  }
                }
              `,
              { pullRequestId: pr.node_id },
            );

            core.info(`Marked PR #${pr.number} ready for review.`);

  b-enable:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      (
        (
          github.event.action == 'labeled' &&
          (github.event.label.name == 'auto-merge' || github.event.label.name == 'autofix')
        ) ||
        (
          github.event.action != 'unlabeled' &&
          (
            contains(github.event.pull_request.labels.*.name, 'auto-merge') ||
            contains(github.event.pull_request.labels.*.name, 'autofix')
          )
        )
      )
    name: Enable Auto-Merge
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          allowed-endpoints: >
            api.github.com:443
          disable-sudo: true
          egress-policy: block

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        id: state
        name: Check if auto-merge already enabled
        run: |
          set -euo pipefail
          enabled="$(gh pr view "$PR_NUMBER" --json autoMergeRequest --jq '.autoMergeRequest != null')"
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        if: steps.state.outputs.enabled != 'true'
        name: Enable auto-merge (squash)
        run: |
          set -euo pipefail
          gh pr merge --auto --squash "$PR_NUMBER"
          echo "✅ Auto-merge enabled for PR #$PR_NUMBER"

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL: ${{ github.event.label.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        if: steps.state.outputs.enabled != 'true' && github.event.action == 'labeled'
        name: Post informational comment
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          🤖 **Auto-merge armed** (label: \`${LABEL}\`)

          This PR is configured for squash auto-merge and will merge once GitHub's repository merge requirements are satisfied, including required checks, approvals, mergeability, and any branch protections.

          Remove the \`auto-merge\` or \`autofix\` label to cancel.
          EOF
          )"

  bot-approve:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      vars.AUTO_MERGE_BOT_APPROVE == 'true' &&
      (
        github.event.pull_request.user.login == 'github-actions[bot]' ||
        github.event.pull_request.user.login == 'copilot-swe-agent[bot]'
      ) &&
      (
        contains(github.event.pull_request.labels.*.name, 'auto-merge') ||
        contains(github.event.pull_request.labels.*.name, 'autofix')
      )
    name: Bot-Approve PR
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          allowed-endpoints: >
            api.github.com:443
          disable-sudo: true
          egress-policy: block

      - env:
          BOT_APPROVE_ALLOWLIST: ${{ env.BOT_APPROVE_ALLOWLIST }}
          HAS_APPROVE_TOKEN: ${{ secrets.AUTO_MERGE_APPROVE_TOKEN != '' }}
        name: Approve if bot-authored PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.AUTO_MERGE_APPROVE_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            function latestReviewStates(reviews) {
              const latestByUser = new Map();
              for (const r of reviews || []) {
                const login = r.user?.login;
                if (!login) continue;
                const ts = Date.parse(r.submitted_at || r.updated_at || '') || 0;
                const prev = latestByUser.get(login);
                if (!prev || ts >= prev.ts) latestByUser.set(login, { state: r.state, ts });
              }
              return [...latestByUser.values()].map((x) => x.state);
            }

            const allowlist = (process.env.BOT_APPROVE_ALLOWLIST || '').split(/\s+/).filter(Boolean);
            const author = context.payload.pull_request.user.login;

            if (!allowlist.includes(author)) {
              core.info(`PR author '${author}' is not in BOT_APPROVE_ALLOWLIST; skipping.`);
              return;
            }

            if (process.env.HAS_APPROVE_TOKEN !== 'true') {
              core.warning('AUTO_MERGE_APPROVE_TOKEN secret is not set; skipping bot-approve.');
              return;
            }

            const prNumber = context.payload.pull_request.number;
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const states = latestReviewStates(reviews);

            if (states.includes('CHANGES_REQUESTED')) {
              core.info(`PR #${prNumber}: has active changes requested; not approving.`);
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'APPROVE',
              body: 'Auto-approval for allowlisted bot-authored PR.',
            });

            core.info(`Approved PR #${prNumber}.`);

  disable:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.action == 'unlabeled' &&
      (github.event.label.name == 'auto-merge' || github.event.label.name == 'autofix') &&
      !contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix')
    name: Disable Auto-Merge
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          allowed-endpoints: >
            api.github.com:443
          disable-sudo: true
          egress-policy: block

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        name: Disable auto-merge (no-op safe)
        run: |
          set -euo pipefail
          gh pr merge --disable-auto "$PR_NUMBER" || echo "Auto-merge was already disabled."

  merge-on-gate-pass:
    if: >-
      github.event_name == 'check_run' &&
      github.event.check_run.name == 'All Gates Passed' &&
      github.event.check_run.conclusion == 'success' &&
      github.event.check_run.app.slug == 'github-actions' &&
      github.event.repository.full_name == github.repository
    name: Merge on Gate Pass
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          allowed-endpoints: >
            api.github.com:443
          disable-sudo: true
          egress-policy: block

      - name: Merge eligible PRs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          AUTO_MERGE_LABELS: ${{ env.AUTO_MERGE_LABELS }}
          BLOCKED_AUTO_MERGE_LABELS: ${{ env.BLOCKED_AUTO_MERGE_LABELS }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checkRun = context.payload.check_run;
            const prs = checkRun.pull_requests || [];
            const autoMergeLabels = new Set((process.env.AUTO_MERGE_LABELS || '').split(/\s+/).filter(Boolean));
            const blockedLabels = new Set((process.env.BLOCKED_AUTO_MERGE_LABELS || '').split(/\s+/).filter(Boolean));
            const summaryRows = [];
            const thisRepo = context.payload.repository.full_name;
            let mergedCount = 0;

            function latestReviewStates(reviews) {
              const latestByUser = new Map();
              for (const review of reviews || []) {
                const login = review.user?.login;
                if (!login) continue;
                const ts = Date.parse(review.submitted_at || review.updated_at || '') || 0;
                const prev = latestByUser.get(login);
                if (!prev || ts >= prev.ts) latestByUser.set(login, { state: review.state, ts });
              }
              return [...latestByUser.values()].map((entry) => entry.state);
            }

            function hasAnyLabel(pr, allowedLabels) {
              const names = (pr.labels || []).map((label) => label.name);
              return names.some((name) => allowedLabels.has(name));
            }

            function hasBlockedLabel(pr, blocked) {
              const names = new Set((pr.labels || []).map((label) => label.name));
              return [...blocked].some((name) => names.has(name));
            }

            async function getStableMergeability(prNumber, retries = 3) {
              for (let attempt = 0; attempt < retries; attempt += 1) {
                const { data: prData } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });
                if (prData.mergeable !== null) return prData;
                if (attempt < retries - 1) {
                  await new Promise((resolve) => setTimeout(resolve, 2000));
                }
              }

              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              return prData;
            }

            if (!prs.length) {
              core.info('No pull requests associated with this check run; skipping.');
              return;
            }

            for (const pr of prs) {
              const prNumber = pr.number;
              const prData = await getStableMergeability(prNumber);

              if (!hasAnyLabel(prData, autoMergeLabels)) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (no label) |`);
                continue;
              }

              if (hasBlockedLabel(prData, blockedLabels)) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (blocked label) |`);
                continue;
              }

              if (prData.draft) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (draft) |`);
                continue;
              }

              if (prData.state !== 'open') {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (${prData.state}) |`);
                continue;
              }

              if (!prData.head.repo || prData.head.repo.full_name !== thisRepo) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (fork) |`);
                continue;
              }

              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              const reviewStates = latestReviewStates(reviews);
              if (reviewStates.includes('CHANGES_REQUESTED')) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (changes requested) |`);
                continue;
              }

              const mergeable = prData.mergeable;
              const mergeableState = prData.mergeable_state || 'unknown';
              if (mergeable !== true || mergeableState !== 'clean') {
                summaryRows.push(`| #${prNumber} | ⏳ blocked (${mergeableState}) |`);
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                });
                mergedCount += 1;
                summaryRows.push(`| #${prNumber} | ✅ merged |`);
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                summaryRows.push(`| #${prNumber} | ❌ merge failed — ${message} |`);
                try {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `❌ Scheduled auto-merge failed: ${message}`,
                  });
                } catch (commentErr) {
                  core.warning(`PR #${prNumber}: failure comment failed: ${String(commentErr)}`);
                }
              }
            }

            const header = '| PR  | Result |\n|-----|--------|';
            const body = summaryRows.length ? summaryRows.join('\n') : '| — | _No open PRs reviewed._ |';

            await core.summary
              .addHeading('Finish Open PRs Results', 2)
              .addRaw(`${header}\n${body}`)
              .addRaw(`\n\nMerged: ${mergedCount}`)
              .write();

  finish-open-prs:
    name: Finish Open PRs
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443

      - name: Merge eligible open PRs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          AUTO_MERGE_LABELS: ${{ env.AUTO_MERGE_LABELS }}
          BLOCKED_AUTO_MERGE_LABELS: ${{ env.BLOCKED_AUTO_MERGE_LABELS }}
          MAX_PRS: ${{ inputs.max_prs || '20' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const autoMergeLabels = new Set((process.env.AUTO_MERGE_LABELS || '').split(/\s+/).filter(Boolean));
            const blockedLabels = new Set((process.env.BLOCKED_AUTO_MERGE_LABELS || '').split(/\s+/).filter(Boolean));
            const maxPRs = parseInt(process.env.MAX_PRS, 10);
            const dryRun = process.env.DRY_RUN === 'true';
            const thisRepo = context.payload.repository.full_name;
            const summaryRows = [];
            let mergedCount = 0;

            function latestReviewStates(reviews) {
              const latestByUser = new Map();
              for (const review of reviews || []) {
                const login = review.user?.login;
                if (!login) continue;
                const ts = Date.parse(review.submitted_at || review.updated_at || '') || 0;
                const prev = latestByUser.get(login);
                if (!prev || ts >= prev.ts) latestByUser.set(login, { state: review.state, ts });
              }
              return [...latestByUser.values()].map((entry) => entry.state);
            }

            function hasAnyLabel(pr, allowedLabels) {
              const names = (pr.labels || []).map((label) => label.name);
              return names.some((name) => allowedLabels.has(name));
            }

            function hasBlockedLabel(pr, blocked) {
              const names = new Set((pr.labels || []).map((label) => label.name));
              return [...blocked].some((name) => names.has(name));
            }

            async function getStableMergeability(prNumber, retries = 3) {
              for (let attempt = 0; attempt < retries; attempt += 1) {
                const { data: prData } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });
                if (prData.mergeable !== null) return prData;
                if (attempt < retries - 1) {
                  await new Promise((resolve) => setTimeout(resolve, 2000));
                }
              }

              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              return prData;
            }

            const { data: openPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: Math.min(maxPRs, 100),
            });

            if (!openPRs.length) {
              core.info('No open pull requests found; skipping.');
              return;
            }

            for (const prData of openPRs.slice(0, maxPRs)) {
              const prNumber = prData.number;

              if (!hasAnyLabel(prData, autoMergeLabels)) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (no label) |`);
                continue;
              }

              if (hasBlockedLabel(prData, blockedLabels)) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (blocked label) |`);
                continue;
              }

              if (prData.draft) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (draft) |`);
                continue;
              }

              if (!prData.head.repo || prData.head.repo.full_name !== thisRepo) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (fork) |`);
                continue;
              }

              const fullPR = await getStableMergeability(prNumber);

              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              const reviewStates = latestReviewStates(reviews);
              if (reviewStates.includes('CHANGES_REQUESTED')) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (changes requested) |`);
                continue;
              }

              const mergeable = fullPR.mergeable;
              const mergeableState = fullPR.mergeable_state || 'unknown';
              if (mergeable !== true || mergeableState !== 'clean') {
                summaryRows.push(`| #${prNumber} | ⏳ blocked (${mergeableState}) |`);
                continue;
              }

              if (dryRun) {
                summaryRows.push(`| #${prNumber} | 🔍 eligible (dry-run) |`);
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                });
                mergedCount += 1;
                summaryRows.push(`| #${prNumber} | ✅ merged |`);
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                summaryRows.push(`| #${prNumber} | ❌ merge failed — ${message} |`);
                try {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `❌ Scheduled auto-merge failed: ${message}`,
                  });
                } catch (commentErr) {
                  core.warning(`PR #${prNumber}: failure comment failed: ${String(commentErr)}`);
                }
              }
            }

            const header = '| PR  | Result |\n|-----|--------|';
            const body = summaryRows.length ? summaryRows.join('\n') : '| — | _No open PRs reviewed._ |';

            await core.summary
              .addHeading('Finish Open PRs Results', 2)
              .addRaw(`${header}\n${body}`)
              .addRaw(`\n\nMerged: ${mergedCount}${dryRun ? ' (dry-run)' : ''}`)
              .write();
