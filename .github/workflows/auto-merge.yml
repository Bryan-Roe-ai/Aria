# =============================================================================
# Auto Merge — Label-triggered and gate-triggered PR merge automation
# =============================================================================
# yamllint disable rule:key-ordering
# Purpose:
#   • prepare-github-actions-pr — converts same-repo github-actions[bot] PRs to
#                                 ready-for-review and ensures they carry the
#                                 `autofix` label so the existing auto-merge
#                                 pipeline can take over.
#   • enable             — arms GitHub native auto-merge when `auto-merge` or
#                          `autofix` label is present on a same-repo PR.
#   • disable            — disables native auto-merge when the last matching
#                          label is removed.
#   • merge-on-gate-pass — when the `All Gates Passed` check succeeds, evaluates
#                          associated PRs and merges eligible labeled PRs.
#   • bot-approve        — optionally approves allowlisted bot-authored PRs
#                          using a dedicated PAT from a different identity.
#
# Merge strategy : squash
# Fork PRs       : skipped
# Security       : least-privilege job permissions; no embedded credentials
# =============================================================================

name: Auto Merge

on: # yamllint disable-line rule:truthy
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  check_run:
    types: [completed]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      max_prs:
        description: "Maximum eligible PRs to process this run"
        default: "20"
        required: false
        type: number
      dry_run:
        description: "Evaluate eligibility without merging"
        default: false
        required: false
        type: boolean

concurrency:
  cancel-in-progress: false
  group: >-
    auto-merge-${{
      github.event.pull_request.number || github.event.check_run.id || github.run_id
    }}

permissions:
  contents: read

env:
  AUTO_MERGE_LABELS: "auto-merge autofix"
  BOT_APPROVE_ALLOWLIST: "github-actions[bot] copilot-swe-agent[bot]"

jobs:
  prepare-github-actions-pr:
    # FIX 1: removed the stray empty `if: >-` line that preceded `name:`,
    # which caused "Map keys must be unique" / "'if' is already defined".
    name: Prepare github-actions PR
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.action != 'unlabeled'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443

      - env:
          AUTO_MERGE_LABELS: ${{ env.AUTO_MERGE_LABELS }}
        name: Ready PR and apply autofix label
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const autoMergeLabels = new Set((process.env.AUTO_MERGE_LABELS || '').split(/\s+/).filter(Boolean));
            const labelNames = (pr.labels || []).map((label) => label.name);
            const hasAutoMergeLabel = labelNames.some((n) => autoMergeLabels.has(n));

            if (!hasAutoMergeLabel) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['autofix'],
              });
              core.info(`Added 'autofix' label to PR #${pr.number}.`);
            }

            if (!pr.draft) {
              core.info(`PR #${pr.number} is already ready for review.`);
              return;
            }

            await github.graphql(
              `
                mutation MarkReadyForReview($pullRequestId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                    pullRequest {
                      number
                      isDraft
                    }
                  }
                }
              `,
              { pullRequestId: pr.node_id },
            );

            core.info(`Marked PR #${pr.number} ready for review.`);

  enable:
    name: Enable Auto-Merge
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      (
        (
          github.event.action == 'labeled' &&
          (github.event.label.name == 'auto-merge' || github.event.label.name == 'autofix')
        ) ||
        (
          github.event.action != 'unlabeled' &&
          (
            contains(github.event.pull_request.labels.*.name, 'auto-merge') ||
            contains(github.event.pull_request.labels.*.name, 'autofix')
          )
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # FIX #5: issues: write removed — gh pr merge/comment only needs pull-requests: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
          disable-sudo: true

      - name: Check if auto-merge already enabled
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          enabled="$(gh pr view "$PR_NUMBER" --json autoMergeRequest --jq '.autoMergeRequest != null')"
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge (squash)
        if: steps.state.outputs.enabled != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge --auto --squash "$PR_NUMBER"
          echo "✅ Auto-merge enabled for PR #$PR_NUMBER"

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL: ${{ github.event.label.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        if: steps.state.outputs.enabled != 'true' && github.event.action == 'labeled'
        name: Post informational comment
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --body \
            "🤖 **Auto-merge armed** (label: \`${LABEL}\`)

          This PR is configured for squash auto-merge and will merge once GitHub's repository merge requirements are satisfied, including required checks, approvals, mergeability, and any branch protections.

          Remove the \`auto-merge\` or \`autofix\` label to cancel."
        timeout-minutes: 5

  disable:
    name: Disable Auto-Merge
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.action == 'unlabeled' &&
      (github.event.label.name == 'auto-merge' || github.event.label.name == 'autofix') &&
      !contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # FIX #6: issues: write removed
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          allowed-endpoints: >
            api.github.com:443
          egress-policy: block

      - name: Disable auto-merge (no-op safe)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge --disable-auto "$PR_NUMBER" || echo "Auto-merge was already disabled."
    timeout-minutes: 5

  merge-on-gate-pass:
    name: Merge on Gate Pass
    if: >-
      github.event_name == 'check_run' &&
      github.event.check_run.name == 'All Gates Passed' &&
      github.event.check_run.conclusion == 'success' &&
      github.event.check_run.app.slug == 'github-actions' &&
      github.event.check_run.check_suite.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          allowed-endpoints: >
            api.github.com:443
          disable-sudo: true
          egress-policy: block

      - name: Merge eligible PRs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checkRun = context.payload.check_run;
            const prs = checkRun.pull_requests || [];
            const autoMergeLabels = new Set((process.env.AUTO_MERGE_LABELS || '').split(/\s+/).filter(Boolean));
            const summaryRows = [];
            const thisRepo = context.payload.repository.full_name;
            let mergedCount = 0;

            function latestReviewStates(reviews) {
              const latestByUser = new Map();
              for (const r of reviews || []) {
                const login = r.user?.login;
                if (!login) continue;
                const ts = Date.parse(r.submitted_at || r.updated_at || '') || 0;
                const prev = latestByUser.get(login);
                if (!prev || ts >= prev.ts) latestByUser.set(login, { state: r.state, ts });
              }
              return [...latestByUser.values()].map((x) => x.state);
            }

            if (!prs.length) {
              core.info('No pull requests associated with this check run; skipping.');
              return;
            }

            for (const pr of prs) {
              const prNumber = pr.number;

              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              const labelNames = (prData.labels || []).map((label) => label.name);
              const hasAutoMergeLabel = labelNames.some((n) => autoMergeLabels.has(n));
              if (!hasAutoMergeLabel) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (no label) |`);
                continue;
              }

              if (prData.draft) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (draft) |`);
                continue;
              }

              if (prData.state !== 'open') {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (${prData.state}) |`);
                continue;
              }

              if (!prData.head.repo || prData.head.repo.full_name !== thisRepo) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (fork) |`);
                continue;
              }

              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              const reviewStates = latestReviewStates(reviews);
              if (reviewStates.includes('CHANGES_REQUESTED')) {
                summaryRows.push(`| #${prNumber} | ⊘ skipped (changes requested) |`);
                continue;
              }

              const mergeable = prData.mergeable;
              const mergeableState = prData.mergeable_state || 'unknown';
              if (mergeable !== true || mergeableState !== 'clean') {
                summaryRows.push(`| #${prNumber} | ⏳ blocked (${mergeableState}) |`);
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                });
                mergedCount += 1;
                summaryRows.push(`| #${prNumber} | ✅ merged |`);
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                summaryRows.push(`| #${prNumber} | ❌ merge failed — ${message} |`);
                try {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `❌ Scheduled auto-merge failed: ${message}`,
                  });
                } catch (commentErr) {
                  core.warning(`PR #${prNumber}: failure comment failed: ${String(commentErr)}`);
                }
              }
            }

            const header = '| PR  | Result |\n|-----|--------|';
            const body = summaryRows.length ? summaryRows.join('\n') : '| — | _No open PRs reviewed._ |';

            await core.summary
              .addHeading('Finish Open PRs Results', 2)
              .addRaw(`${header}\n${body}`)
              .addRaw(`\n\nMerged: ${mergedCount}`)
              .write();
    timeout-minutes: 15

  bot-approve:
    name: Bot-Approve PR
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      vars['AUTO_MERGE_BOT_APPROVE'] == 'true' &&
      (
        github.event.pull_request.user.login == 'github-actions[bot]' ||
        github.event.pull_request.user.login == 'copilot-swe-agent[bot]'
      ) &&
      (
        contains(github.event.pull_request.labels.*.name, 'auto-merge') ||
        contains(github.event.pull_request.labels.*.name, 'autofix')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443

      - name: Approve if bot-authored PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          BOT_APPROVE_ALLOWLIST: ${{ env.BOT_APPROVE_ALLOWLIST }}
          HAS_APPROVE_TOKEN: ${{ secrets.AUTO_MERGE_APPROVE_TOKEN != '' }}
        with:
          github-token: ${{ secrets.AUTO_MERGE_APPROVE_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            function latestReviewStates(reviews) {
              const latestByUser = new Map();
              for (const r of reviews || []) {
                const login = r.user?.login;
                if (!login) continue;
                const ts = Date.parse(r.submitted_at || r.updated_at || '') || 0;
                const prev = latestByUser.get(login);
                if (!prev || ts >= prev.ts) latestByUser.set(login, { state: r.state, ts });
              }
              return [...latestByUser.values()].map((x) => x.state);
            }

            const allowlist = (process.env.BOT_APPROVE_ALLOWLIST || '').split(/\s+/).filter(Boolean);
            const author = context.payload.pull_request.user.login;

            if (!allowlist.includes(author)) {
              core.info(`PR author '${author}' is not in BOT_APPROVE_ALLOWLIST; skipping.`);
              return;
            }

            if (process.env.HAS_APPROVE_TOKEN !== 'true') {
              core.warning('AUTO_MERGE_APPROVE_TOKEN secret is not set; skipping bot-approve.');
              return;
            }

            const prNumber = context.payload.pull_request.number;
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const states = latestReviewStates(reviews);

            if (states.includes('CHANGES_REQUESTED')) {
              core.info(`PR #${prNumber}: has active changes requested; not approving.`);
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'APPROVE',
              body: 'Auto-approval for allowlisted bot-authored PR.',
            });

            core.info(`Approved PR #${prNumber}.`);
