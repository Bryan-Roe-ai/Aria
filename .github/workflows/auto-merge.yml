# =============================================================================
# Auto Merge — Label-triggered and gate-triggered PR merge automation
# =============================================================================
# Purpose:
#   • enable             — arms GitHub native auto-merge when `auto-merge` or
#                          `autofix` label is added; posts an informational
#                          comment explaining what must pass before merge fires.
#   • disable            — disables native auto-merge when the last matching
#                          label is removed.
#   • merge-on-gate-pass — fires when `Merge Gate / All Gates Passed` check
#                          succeeds; for each associated PR with the label and
#                          a clean eligibility check, calls the merge API.
#   • bot-approve        — if the `AUTO_MERGE_BOT_APPROVE` repository variable
#                          is 'true', approves PRs authored by bot accounts in
#                          BOT_APPROVE_ALLOWLIST using a dedicated PAT so they
#                          clear the required-reviewer gate. Human-authored PRs
#                          always require a real human approval.
#
# Merge strategy : squash (consistent with dependabot-automerge.yml).
# Fork PRs       : always skipped — GITHUB_TOKEN is read-only for forks.
# Defaults       : clarifying-question defaults used where not explicitly set:
#                  bot-approve scope = bot actors only; merge strategy = squash;
#                  fork PRs = skip; merge queue = enabled in ruleset JSON.
# =============================================================================

name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  check_run:
    types: [completed]

# Use PR number for pull_request events; check_run ID for check_run events.
# cancel-in-progress: false prevents a late enable/disable from clobbering a
# concurrent merge attempt.
concurrency:
  group: >-
    auto-merge-${{
      github.event.pull_request.number != '' && github.event.pull_request.number
      || github.event.check_run.id
    }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  AUTO_MERGE_LABEL: auto-merge
  AUTOFIX_LABEL: autofix
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0  # step-security/harden-runner v2.12.2
  GITHUB_SCRIPT_SHA: 60a0d83039c74a4aee543508d2ffcb1c3799cdea  # actions/github-script v7.0.1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Space-separated list of bot login names eligible for automated approval.
  # Only used when AUTO_MERGE_BOT_APPROVE variable == 'true'.
  BOT_APPROVE_ALLOWLIST: "github-actions[bot] copilot-swe-agent[bot]"

jobs:
  # ---------------------------------------------------------------------------
  # Job A — Arm GitHub native auto-merge when a label is added
  # ---------------------------------------------------------------------------
  enable:
    name: Enable Auto-Merge
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      (
        (
          github.event.action == 'labeled' &&
          (github.event.label.name == 'auto-merge' || github.event.label.name == 'autofix')
        ) ||
        (
          github.event.action != 'unlabeled' &&
          (
            contains(github.event.pull_request.labels.*.name, 'auto-merge') ||
            contains(github.event.pull_request.labels.*.name, 'autofix')
          )
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Check if auto-merge already enabled
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          enabled="$(gh pr view "$PR_NUMBER" --json autoMergeRequest --jq '.autoMergeRequest != null')"
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge (squash)
        if: steps.state.outputs.enabled != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge --auto --squash "$PR_NUMBER"
          echo "✅ Auto-merge enabled for PR #$PR_NUMBER"

      - name: Post informational comment
        if: steps.state.outputs.enabled != 'true' && github.event.action == 'labeled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LABEL: ${{ github.event.label.name }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --body \
            "🤖 **Auto-merge armed** (label: \`${LABEL}\`)

          This PR will be squash-merged automatically once all of the following are true:
          - ✅ \`Merge Gate / All Gates Passed\` check succeeds
          - ✅ Required reviewer approval is obtained
          - ✅ No unresolved review threads remain
          - ✅ No merge conflicts

          Remove the \`auto-merge\` or \`autofix\` label to cancel."

  # ---------------------------------------------------------------------------
  # Job B — Disable auto-merge when the last matching label is removed
  # ---------------------------------------------------------------------------
  disable:
    name: Disable Auto-Merge
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.action == 'unlabeled' &&
      (github.event.label.name == 'auto-merge' || github.event.label.name == 'autofix') &&
      !contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Disable auto-merge (no-op safe)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge --disable-auto "$PR_NUMBER" || echo "Auto-merge was already disabled."

  # ---------------------------------------------------------------------------
  # Job C — Merge labeled PRs when the canonical merge gate passes
  # ---------------------------------------------------------------------------
  merge-on-gate-pass:
    name: Merge on Gate Pass
    if: >-
      github.event_name == 'check_run' &&
      github.event.check_run.name == 'All Gates Passed' &&
      github.event.check_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Merge eligible PRs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checkRun = context.payload.check_run;
            const prs = checkRun.pull_requests || [];

            if (!prs.length) {
              core.info('No pull requests associated with this check run; skipping.');
              return;
            }

            const summaryRows = [];

            for (const pr of prs) {
              const prNumber = pr.number;
              core.info(`Evaluating PR #${prNumber} for auto-merge.`);

              // Fetch full PR data (labels, state, merge flags, head repo).
              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              // --- Eligibility checks ---

              const labelNames = prData.labels.map(l => l.name);
              const hasLabel = labelNames.includes('auto-merge') || labelNames.includes('autofix');
              if (!hasLabel) {
                core.info(`PR #${prNumber}: no auto-merge/autofix label — skipping.`);
                summaryRows.push(`| #${prNumber} | ⊘ skipped (no label) |`);
                continue;
              }

              if (prData.draft) {
                core.info(`PR #${prNumber}: draft — skipping.`);
                summaryRows.push(`| #${prNumber} | ⊘ skipped (draft) |`);
                continue;
              }

              if (prData.state !== 'open') {
                core.info(`PR #${prNumber}: not open (${prData.state}) — skipping.`);
                summaryRows.push(`| #${prNumber} | ⊘ skipped (${prData.state}) |`);
                continue;
              }

              // Guard against fork PRs — GITHUB_TOKEN cannot merge across forks.
              // prData.head.repo is null when the fork has been deleted.
              const thisRepo = context.repo.owner + '/' + context.repo.repo;
              if (!prData.head.repo || prData.head.repo.full_name !== thisRepo) {
                const headRepo = prData.head.repo ? prData.head.repo.full_name : '(deleted fork)';
                core.info(`PR #${prNumber}: fork or deleted-fork PR (${headRepo}) — skipping.`);
                summaryRows.push(`| #${prNumber} | ⊘ skipped (fork) |`);
                continue;
              }

              // mergeable can be null (still calculating) or false (conflict/behind).
              // Only proceed when explicitly true to avoid merging in an unknown state.
              if (prData.mergeable !== true) {
                if (prData.mergeable === false) {
                  core.info(`PR #${prNumber}: not mergeable (conflicts or branch behind) — skipping.`);
                  summaryRows.push(`| #${prNumber} | ❌ not mergeable |`);
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: '⚠️ Auto-merge gate passed but the PR cannot be merged (merge conflict or branch behind base). Please resolve conflicts and re-run checks.',
                  });
                } else {
                  // null — GitHub is still calculating mergeability; skip this run.
                  core.info(`PR #${prNumber}: mergeability unknown (still calculating) — skipping.`);
                  summaryRows.push(`| #${prNumber} | ⏳ mergeability pending |`);
                }
                continue;
              }

              // Check for blocking/approved reviews.
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              // Build latest review state per reviewer (COMMENTED doesn't update decision).
              // Sort by submission time to ensure later reviews overwrite earlier ones.
              const sortedReviews = [...reviews].sort(
                (a, b) => new Date(a.submitted_at).getTime() - new Date(b.submitted_at).getTime()
              );
              const latestByReviewer = {};
              for (const review of sortedReviews) {
                if (review.state !== 'COMMENTED') {
                  latestByReviewer[review.user.login] = review.state;
                }
              }
              const reviewStates = Object.values(latestByReviewer);
              const hasChangesRequested = reviewStates.some(s => s === 'CHANGES_REQUESTED');
              const hasApproval = reviewStates.some(s => s === 'APPROVED');

              if (hasChangesRequested) {
                core.info(`PR #${prNumber}: CHANGES_REQUESTED review present — skipping.`);
                summaryRows.push(`| #${prNumber} | ❌ changes requested |`);
                continue;
              }

              if (!hasApproval) {
                core.info(`PR #${prNumber}: no approved review yet — skipping.`);
                summaryRows.push(`| #${prNumber} | ⏳ awaiting approval |`);
                continue;
              }

              // Attempt the squash merge.
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                });
                core.info(`✅ Merged PR #${prNumber}.`);
                summaryRows.push(`| #${prNumber} | ✅ merged |`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: '✅ Auto-merged via `Merge Gate / All Gates Passed` gate.',
                });
              } catch (err) {
                core.error(`Failed to merge PR #${prNumber}: ${err}`);
                summaryRows.push(`| #${prNumber} | ❌ merge failed — ${err.message} |`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `❌ Auto-merge failed: ${err.message}`,
                });
              }
            }

            // Write step summary.
            const tableHeader = '| PR | Result |\n|-----|--------|';
            const tableBody = summaryRows.length ? summaryRows.join('\n') : '| — | _No PRs evaluated._ |';
            await core.summary
              .addHeading('Auto-Merge Results', 2)
              .addRaw(`${tableHeader}\n${tableBody}`)
              .write();

  # ---------------------------------------------------------------------------
  # Job D — Approve bot-authored PRs (gated by AUTO_MERGE_BOT_APPROVE variable)
  # ---------------------------------------------------------------------------
  bot-approve:
    name: Bot-Approve PR
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      vars.AUTO_MERGE_BOT_APPROVE == 'true' &&
      (
        contains(github.event.pull_request.labels.*.name, 'auto-merge') ||
        contains(github.event.pull_request.labels.*.name, 'autofix')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Approve if bot-authored PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          BOT_APPROVE_ALLOWLIST: ${{ env.BOT_APPROVE_ALLOWLIST }}
          # AUTO_MERGE_APPROVE_TOKEN must be a PAT with pull-requests:write scope
          # issued by an identity different from the PR author so the approval
          # is not self-approved. GITHUB_TOKEN cannot approve its own PRs.
          HAS_APPROVE_TOKEN: ${{ secrets.AUTO_MERGE_APPROVE_TOKEN != '' }}
        with:
          github-token: ${{ secrets.AUTO_MERGE_APPROVE_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const allowlist = (process.env.BOT_APPROVE_ALLOWLIST || '').split(/\s+/).filter(Boolean);
            const author = context.payload.pull_request.user.login;

            const isAllowed = allowlist.some(entry => entry === author);
            if (!isAllowed) {
              core.info(`PR author '${author}' is not in BOT_APPROVE_ALLOWLIST; skipping.`);
              return;
            }

            const hasToken = process.env.HAS_APPROVE_TOKEN === 'true';
            if (!hasToken) {
              core.warning(
                'AUTO_MERGE_APPROVE_TOKEN secret is not set. ' +
                'A dedicated PAT is required to approve PRs from a separate identity. ' +
                'Skipping bot-approve.'
              );
              return;
            }

            const prNumber = context.payload.pull_request.number;

            // Check if already approved to avoid duplicate review events.
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const alreadyApproved = reviews.some(r => r.state === 'APPROVED');
            if (alreadyApproved) {
              core.info(`PR #${prNumber} already has an approval; skipping.`);
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'APPROVE',
              body: `🤖 Automated approval for bot-authored PR (author: @${author}).`,
            });
            core.info(`✅ Approved PR #${prNumber} (author: ${author}).`);
