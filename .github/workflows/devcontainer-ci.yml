name: Devcontainer CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  DEVCONTAINERS_CI_SHA: b63b30de439b47a52267f241112c5b453b673db5 # v0.3

concurrency:
  group: devcontainer-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Build and test devcontainer
        uses: step-security/devcontainers-ci@0094b8e872472da5a2e1cb8ce3c59c66fff26175 # v0.3.1900000450
        with:
          runCmd: "python scripts/test_runner.py --unit"
