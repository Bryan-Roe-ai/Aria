name: Copilot setup validation
run-name: Copilot setup validation (${{ github.event_name }}${{ github.event_name == 'workflow_dispatch' && format(', include_all={0}', inputs.include_all) || '' }})
on:
  pull_request:
    paths:
      - '.github/**'
      - 'README.md'
  push:
    paths:
      - '.github/**'
      - 'README.md'
  workflow_dispatch:
    inputs:
      include_all:
        description: Force linting of all repository Markdown/YAML targets
        required: false
        type: boolean
        default: false
permissions:
  contents: read
concurrency:
  cancel-in-progress: true
  group: copilot-setup-check-${{ github.event.pull_request.number || github.ref }}
env:
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0
  SETUP_NODE_SHA: 49933ea5288caeca8642d1e84afbd3f7d6820020
  SETUP_PYTHON_SHA: a26af69be951a213d495a4c3e4e4022e16d87065
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
jobs:
  validate-setup:
    defaults:
      run:
        shell: bash
    name: Validate Copilot setup files & linters
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            registry.npmjs.org:443

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 50
          persist-credentials: false
          clean: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: .github/workflows/copilot-setup-steps.yml

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .github/workflows/copilot-setup-steps.yml

      - name: Install linters
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install --disable-pip-version-check yamllint==1.35.1

      - name: Select lint targets
        id: targets
        env:
          INCLUDE_ALL: ${{ inputs.include_all }}
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          YAML_LIST_FILE="${RUNNER_TEMP}/yaml_files.txt"
          MD_LIST_FILE="${RUNNER_TEMP}/markdown_files.txt"
          NULL_SHA="0000000000000000000000000000000000000000"
          : > "$YAML_LIST_FILE"
          : > "$MD_LIST_FILE"

          candidate_files=()

          is_markdown_target() {
            local file="$1"

            if [ "$file" = "README.md" ]; then
              return 0
            fi

            case "$file" in
              .github/*)
                local rel="${file#.github/}"
                case "$rel" in
                  */*)
                    return 1
                    ;;
                esac

                case "$(basename "$file")" in
                  COPILOT*.md|copilot-*.md)
                    return 0
                    ;;
                esac
                ;;
            esac

            return 1
          }

          load_default_targets() {
            while IFS= read -r -d '' file; do
              candidate_files+=("$file")
            done < <(find .github -maxdepth 1 -type f \( -name 'COPILOT*.md' -o -name 'copilot-*.md' \) -print0 | sort -z)
            while IFS= read -r -d '' file; do
              candidate_files+=("$file")
            done < <(find .github -type f \( -iname '*.yml' -o -iname '*.yaml' \) -print0 | sort -z)
            [ -f "README.md" ] && candidate_files+=("README.md")
          }

          load_changed_targets() {
            local base_sha="$1"
            local head_sha="$2"
            local diff_file="${RUNNER_TEMP}/changed_files.txt"

            if ! git diff --name-only --diff-filter=ACMR -z "$base_sha" "$head_sha" > "$diff_file"; then
              echo "Unable to diff ${base_sha}...${head_sha}; falling back to default lint targets."
              return 1
            fi

            mapfile -d '' -t candidate_files < "$diff_file"
          }

          if [ "${INCLUDE_ALL}" = "true" ]; then
            load_default_targets
          elif [ "${EVENT_NAME}" = "pull_request" ] && [ -n "${PR_BASE_SHA}" ] && [ -n "${PR_HEAD_SHA}" ]; then
            load_changed_targets "${PR_BASE_SHA}" "${PR_HEAD_SHA}" || load_default_targets
          elif [ "${EVENT_NAME}" = "push" ] \
            && [ -n "${PUSH_BEFORE_SHA}" ] \
            && [ "${PUSH_BEFORE_SHA}" != "${NULL_SHA}" ]; then
            load_changed_targets "${PUSH_BEFORE_SHA}" "${HEAD_SHA}" || load_default_targets
          else
            load_default_targets
          fi

          # Requires bash 4+ for associative arrays.
          declare -A seen=()

          for file in "${candidate_files[@]}"; do
            [ -f "$file" ] || continue
            if [ "${seen[$file]+x}" = "x" ]; then
              continue
            fi
            seen["$file"]=1

            case "$file" in
              .github/*.yml|.github/*.yaml)
                printf '%s\0' "$file" >> "$YAML_LIST_FILE"
                ;;
            esac

            is_markdown_target "$file" && printf '%s\0' "$file" >> "$MD_LIST_FILE"
          done

          echo "yaml_list_file=$YAML_LIST_FILE" >> "$GITHUB_OUTPUT"
          echo "md_list_file=$MD_LIST_FILE" >> "$GITHUB_OUTPUT"

      - name: Lint YAML workflow files
        id: yamllint
        continue-on-error: true
        run: |
          set -euo pipefail

          YAML_LIST_FILE="${{ steps.targets.outputs.yaml_list_file }}"

          if [ -z "$YAML_LIST_FILE" ] || [ ! -f "$YAML_LIST_FILE" ] || [ ! -s "$YAML_LIST_FILE" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "No matching YAML files selected for yamllint."
            exit 0
          fi

          mapfile -d '' -t yaml_files < "$YAML_LIST_FILE"
          printf "Found %d YAML files to lint\n" "${#yaml_files[@]}"
          printf '%s\n' "${yaml_files[@]}"

          yamllint -c .github/yamllint.yml "${yaml_files[@]}"

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Lint Copilot and Markdown files
        id: mdlint
        continue-on-error: true
        run: |
          set -euo pipefail

          MD_LIST_FILE="${{ steps.targets.outputs.md_list_file }}"

          if [ -z "$MD_LIST_FILE" ] || [ ! -f "$MD_LIST_FILE" ] || [ ! -s "$MD_LIST_FILE" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "No matching markdown files selected for markdownlint."
            exit 0
          fi

          mapfile -d '' -t md_targets_unique < "$MD_LIST_FILE"

          printf 'Linting markdown targets:\n'
          printf ' - %s\n' "${md_targets_unique[@]}"

          npx --yes markdownlint-cli@0.33.0 "${md_targets_unique[@]}"

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Basic content checks for Copilot docs
        id: checks
        run: |
          set -euo pipefail

          REPORT="${RUNNER_TEMP}/copilot_setup_report.txt"
          {
            echo "Copilot Setup Report - $(date -u)"
            echo
          } > "$REPORT"
          exec 3>>"$REPORT"

          files_to_check=(
            .github/copilot-instructions.full.md
            .github/copilot-instructions.md
            .github/COPILOT.md
            .github/copilot.yml
          )

          for f in "${files_to_check[@]}"; do
            if [ -f "$f" ]; then
              echo "FOUND: $f" >&3
            else
              echo "MISSING: $f" >&3
            fi
          done

          echo >&3

          MAIN=".github/copilot-instructions.full.md"
          if [ -f "$MAIN" ]; then
            echo "Checking header and length of $MAIN..." >&3
            head -n 10 "$MAIN" >&3
            echo "----" >&3
            wc -l "$MAIN" >&3
            echo >&3

            if grep -qi "last updated" "$MAIN"; then
              echo "OK: contains 'Last updated' entry" >&3
            else
              echo "WARN: consider adding a 'Last updated:' date near the top of $MAIN" >&3
            fi

            if grep -qi "copilot" "$MAIN"; then
              echo "OK: file references Copilot" >&3
            else
              echo "WARN: $MAIN does not mention 'Copilot' — ensure the guide is Copilot-specific" >&3
            fi
          else
            echo "SKIP: $MAIN not present for deep checks" >&3
          fi

          exec 3>&-

          echo "report_path=$REPORT" >> "$GITHUB_OUTPUT"

          {
            echo "## Copilot Setup Summary"
            echo
            sed -n '1,200p' "$REPORT"
          } >> "$GITHUB_STEP_SUMMARY"

          cat "$REPORT"

      - name: Upload report artifact
        if: ${{ always() && steps.checks.outputs.report_path != '' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: copilot-setup-report
          path: ${{ steps.checks.outputs.report_path }}
          if-no-files-found: warn
          retention-days: 7

      - name: Fail if validation failed
        if: always()
        env:
          YAML_OUTCOME: ${{ steps.yamllint.outcome }}
          MD_OUTCOME: ${{ steps.mdlint.outcome }}
        run: |
          set -euo pipefail

          echo "yamllint outcome: $YAML_OUTCOME"
          echo "markdownlint outcome: $MD_OUTCOME"

          if [ "$YAML_OUTCOME" = "failure" ] || [ "$MD_OUTCOME" = "failure" ]; then
            echo "One or more lint checks failed."
            exit 1
          fi
    timeout-minutes: 10
