name: Code Quality

on:
  push:
    branches: [ main, dev, develop, linux ]
  pull_request:
    branches: [ main, dev, develop, linux ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f dev-requirements.txt ]; then pip install -r dev-requirements.txt; fi

      - name: "Run flake8 (blocking: syntax and undefined names)"
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: "Run flake8 style report (blocking: E,W,F)"
        run: |
          flake8 . --count --max-line-length=120 --select=E,W,F --statistics --exclude=venv,venv_*,__pycache__,.git,data_out,mount,__blobstorage__,__queuestorage__

      - name: Check code formatting with black (blocking)
        run: |
          black --check --diff --line-length=120 --exclude="(venv|venv_.*|__pycache__|\.git|data_out|mount|__blobstorage__|__queuestorage__)" .

      - name: Check import sorting with isort (blocking)
        run: |
          isort --check-only --diff --profile=black --line-length=120 --skip-glob="venv*" --skip-glob="data_out*" --skip-glob="mount*" .

      - name: Type check with mypy (optional)
        run: |
          mypy --install-types --non-interactive --ignore-missing-imports --exclude="(venv|venv_.*|data_out|mount)" .
        continue-on-error: true

  security-check:
    name: Security Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install safety
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f dev-requirements.txt ]; then pip install -r dev-requirements.txt; fi
          pip install safety

      - name: Check dependencies for vulnerabilities
        run: |
          set +e
          safety check --json > safety-report.json
          SAFETY_EXIT=$?
          if [ "$SAFETY_EXIT" -ne 0 ]; then
            echo "Security check reported findings (advisory mode)."
          fi
          exit 0
        continue-on-error: true

      - name: Upload safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            safety-report.json
          if-no-files-found: ignore
