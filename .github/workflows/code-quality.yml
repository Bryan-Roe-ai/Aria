# cspell:words PYTHONDONTWRITEBYTECODE
concurrency:
  cancel-in-progress: true
  group: quality-${{ github.workflow }}-${{ github.ref }}

defaults:
  run:
    shell: bash

env:
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.2
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PYTHON_UNBUFFERED: '1'
  PYTHONDONTWRITEBYTECODE: '1'
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0

jobs:
  autofix:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    name: Auto-fix (black + isort + autopep8)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          extra-packages: 'black isort autopep8'
          install-requirements: 'false'

      - name: Apply formatting fixes
        run: |
          set -euo pipefail
          black --exclude="(venv|venv_.*|__pycache__|\.git|data_out|mount|__blobstorage__|__queuestorage__)" .
          isort --skip-glob="venv*" --skip-glob="data_out*" --skip-glob="mount*" .
          autopep8 --in-place --recursive --select=E,W . \
            --exclude venv,venv_*,__pycache__,.git,data_out,mount,__blobstorage__,__queuestorage__

      - name: Create patch artifact
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No auto-fixes were needed." > autofix-summary.txt
          else
            git diff > autofix.patch
            {
              echo "Auto-fix generated changes."
              echo ""
              echo "Apply locally with:"
              echo "  git apply autofix.patch"
            } > autofix-summary.txt
          fi

      - if: always()
        name: Upload autofix patch
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          if-no-files-found: ignore
          name: autofix-patch
          path: |
            autofix.patch
            autofix-summary.txt
          retention-days: 14
    timeout-minutes: 10

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          extra-packages: 'flake8 black isort mypy'
          install-requirements: 'false'

      - name: Run flake8 (blocking — syntax errors)
        run: |
          set -euo pipefail
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - continue-on-error: true
        name: Run flake8 (advisory — style warnings)
        run: |
          set -euo pipefail
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,venv_*,__pycache__,.git,data_out,mount,__blobstorage__,__queuestorage__

      - continue-on-error: true
        name: Check code formatting with black
        run: |
          set -euo pipefail
          black --check --diff --exclude="(venv|venv_.*|__pycache__|\.git|data_out|mount|__blobstorage__|__queuestorage__)" .

      - continue-on-error: true
        name: Check import sorting with isort
        run: |
          set -euo pipefail
          isort --check-only --diff --skip-glob="venv*" --skip-glob="data_out*" --skip-glob="mount*" .

      - continue-on-error: true
        name: Type check with mypy (optional)
        run: |
          set -euo pipefail
          mypy --install-types --non-interactive --ignore-missing-imports --exclude="(venv|venv_.*|data_out|mount)" . || echo "MyPy check completed with warnings"
    timeout-minutes: 12

  security-check:
    name: Security Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          extra-packages: 'pip-audit'

      - continue-on-error: true
        name: Check dependencies for vulnerabilities
        run: |
          set -euo pipefail
          pip-audit --format json --output safety-report.json || echo "Vulnerability check completed with findings"

      - if: always()
        name: Generate security summary
        run: |
          set -euo pipefail
          {
            echo "## Security Check Results"
            if [ -f safety-report.json ]; then
              echo '```json'
              head -100 safety-report.json
              echo ''
              echo '```'
            else
              echo "pip-audit did not produce a report (check job logs)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - if: always()
        name: Upload safety report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          if-no-files-found: ignore
          name: security-report
          path: safety-report.json
          retention-days: 14
    timeout-minutes: 10

name: Code Quality

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
