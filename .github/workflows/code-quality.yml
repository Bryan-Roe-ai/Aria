name: Code Quality

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.2
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
  PYTHON_UNBUFFERED: '1'
  PYTHONDONTWRITEBYTECODE: '1'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'
          extra-packages: 'flake8 black isort mypy'

      - name: Run flake8 (blocking — syntax errors)
        run: |
          set -euo pipefail
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run flake8 (advisory — style warnings)
        run: |
          set -euo pipefail
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,venv_*,__pycache__,.git,data_out,mount,__blobstorage__,__queuestorage__
        continue-on-error: true

      - name: Check code formatting with black
        run: |
          set -euo pipefail
          black --check --diff --exclude="(venv|venv_.*|__pycache__|\.git|data_out|mount|__blobstorage__|__queuestorage__)" .
        continue-on-error: true

      - name: Check import sorting with isort
        run: |
          set -euo pipefail
          isort --check-only --diff --skip-glob="venv*" --skip-glob="data_out*" --skip-glob="mount*" .
        continue-on-error: true

      - name: Type check with mypy (optional)
        run: |
          set -euo pipefail
          mypy --install-types --non-interactive --ignore-missing-imports --exclude="(venv|venv_.*|data_out|mount)" . || echo "MyPy check completed with warnings"
        continue-on-error: true

  security-check:
    name: Security Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          extra-packages: 'pip-audit'

      - name: Check dependencies for vulnerabilities
        run: |
          set -euo pipefail
          pip-audit --format json --output safety-report.json || echo "Vulnerability check completed with findings"
        continue-on-error: true

      - name: Generate security summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Security Check Results"
            if [ -f safety-report.json ]; then
              echo '```json'
              head -100 safety-report.json
              echo ''
              echo '```'
            else
              echo "pip-audit did not produce a report (check job logs)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload safety report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: security-report
          path: safety-report.json
          if-no-files-found: ignore
          retention-days: 14
