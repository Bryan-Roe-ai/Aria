# =============================================================================
# E2E + Integration Tests - Quick Aria regression testing
# =============================================================================
# Purpose: Fast regression tests for Aria character system
# Triggers: Any push/PR to main (no path filtering)
# Jobs:
#   - integration: Quick unit & integration tests
#   - e2e_playwright: Playwright E2E tests
#   - containerized_chrome: Pyppeteer containerized tests
# Note: Faster subset of aria-tests.yml, runs on all changes
# =============================================================================

name: E2E + Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Harden runner and checkout pins
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
  PYTHON_UNBUFFERED: "1"
  # cspell:ignore PYTHONDONTWRITEBYTECODE
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHON_VERSION: "3.11"

defaults:
  run:
    shell: bash

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Unit & Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'
          extra-packages: 'pytest requests pytest-asyncio'
      - name: Start server and run integration tests
        run: |
          python3 aria_web/server.py > /tmp/aria_server.log 2>&1 &
          READY=0
          for _ in $(seq 1 50); do
            if curl -sSf http://127.0.0.1:8080/api/aria/state >/dev/null; then
              READY=1
              break
            fi
            sleep 0.25
          done
          if [ "$READY" -ne 1 ]; then
            echo "Aria server did not become ready in integration job" >&2
            tail -n 100 /tmp/aria_server.log || true
            exit 1
          fi
          pytest -q tests/test_aria_server.py tests/test_object_api_integration.py

  core_monitor:
    name: Core Runtime Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'
      - name: Monitor aria-bot/core runtime
        id: core_monitor
        run: |
          set -euo pipefail
          mkdir -p data_out/core_automation
          python scripts/automate_core_files.py --json > data_out/core_automation/status-monitor.json
          test -f data_out/core_automation/status-monitor.json
          python -m json.tool data_out/core_automation/status-monitor.json >/dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path('data_out/core_automation/status-monitor.json')
          data = json.loads(p.read_text(encoding='utf-8'))
          assert isinstance(data, dict), 'status-monitor.json must be a JSON object'
          for key in ('passed', 'compile_failed', 'python_files_total'):
              assert key in data, f'status-monitor.json missing required key: {key}'
          assert data['passed'] is True, 'core automation monitor must pass'
          print(f"core automation monitor: {data['python_files_total']} python files, compile_failed={data['compile_failed']}")
          PY

      - name: Upload core monitor artifact
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: core-monitor-${{ github.run_number }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            data_out/core_automation/status-monitor.json

      - name: Summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Core Runtime Monitor"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.core_monitor.outcome }}" = "success" ]; then
            {
              echo "| automating core files | ✅ passed |"
              echo "| core monitor artifact | \`data_out/core_automation/status-monitor.json\` |"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "| automating core files | ❌ failed |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  e2e_playwright:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          # Playwright --with-deps installs browser system packages via apt (sudo).
          disable-sudo: false
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'
          extra-packages: 'pytest playwright pytest-asyncio requests'
      - name: Install Playwright browsers
        run: python -m playwright install chromium
      - name: Start server and run Playwright tests
        run: |
          python3 aria_web/server.py > /tmp/aria_server.log 2>&1 &
          READY=0
          for _ in $(seq 1 60); do
            if curl -sSf http://127.0.0.1:8080/api/aria/state >/dev/null; then
              READY=1
              break
            fi
            sleep 0.25
          done
          if [ "$READY" -ne 1 ]; then
            echo "Aria server did not become ready in Playwright job" >&2
            tail -n 100 /tmp/aria_server.log || true
            exit 1
          fi
          pytest -q tests/test_ui_playwright.py

  containerized_chrome:
    name: Containerized Chrome (pyppeteer)
    runs-on: ubuntu-latest
    container:
      image: python:3.11-bullseye
    timeout-minutes: 25
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Apt-get update & install dependencies
        # cspell:ignore libxss libgtk libasound libnss libatk libgbm libx
        run: |
          apt-get update
          apt-get install -y wget gnupg ca-certificates xz-utils fonts-liberation libgtk-3-0 libxss1 libasound2 libnss3 libatk-bridge2.0-0 libx11-xcb1 libgbm1
      - name: Install Chromium (stable)
        # cspell:ignore elif
        run: |
          set -e
          # Use Debian repo for chromium; package name varies by image/repo.
          # chromium-driver is NOT installed: pyppeteer drives chromium directly
          # via CHROME_PATH and does not use WebDriver/chromedriver. Installing
          # chromium-driver would pull in libz3-4 which intermittently fails to
          # download on Debian Bullseye and is not needed for these tests.
          if apt-get install -y chromium; then
            echo "Installed chromium"
          elif apt-get install -y chromium-browser; then
            echo "Installed chromium-browser"
          else
            echo "Failed to install Chromium packages" >&2
            exit 1
          fi

          # Normalize executable path expected by CHROME_PATH.
          if command -v chromium >/dev/null 2>&1; then
            command -v chromium
          elif command -v chromium-browser >/dev/null 2>&1; then
            command -v chromium-browser
            ln -sf "$(command -v chromium-browser)" /usr/bin/chromium
          else
            echo "Chromium executable not found after installation" >&2
            exit 1
          fi
      - name: Install Python test deps
        # cspell:ignore asyncio pyppeteer pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pyppeteer requests
          python -c "from pyppeteer.chromium_downloader import download_chromium; download_chromium()"
      - name: Start server and run pyppeteer tests
        run: |
          python3 aria_web/server.py > /tmp/aria_server.log 2>&1 &
          READY=0
          for _ in $(seq 1 60); do
            if curl -sSf http://127.0.0.1:8080/api/aria/state >/dev/null; then
              READY=1
              break
            fi
            sleep 0.25
          done
          if [ "$READY" -ne 1 ]; then
            echo "Aria server did not become ready in pyppeteer job" >&2
            tail -n 100 /tmp/aria_server.log || true
            exit 1
          fi
          pytest -q tests/test_ui_pyppeteer.py
