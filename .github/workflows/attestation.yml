name: SLSA Provenance Attestation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      artifact_path:
        description: "Path to artifact to attest (e.g., dist/package.whl)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  attest-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Generate artifact hash
        id: artifact
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.artifact_path }}" ]]; then
            ARTIFACT_PATH="${{ github.event.inputs.artifact_path }}"
          elif [[ "${{ github.event_name }}" == "release" && -n "${{ github.event.release.tag_name }}" ]]; then
            ARTIFACT_PATH="dist/${{ github.event.release.tag_name }}.tar.gz"
          else
            ARTIFACT_PATH=""
          fi

          if [[ -n "$ARTIFACT_PATH" && -f "$ARTIFACT_PATH" ]]; then
            HASH="$(sha256sum "$ARTIFACT_PATH" | awk '{print $1}')"
            echo "path=$ARTIFACT_PATH" >> "$GITHUB_OUTPUT"
            echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Artifact not found at '$ARTIFACT_PATH'"
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "hash=" >> "$GITHUB_OUTPUT"
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        if: steps.artifact.outputs.hash != ''
        with:
          subject-path: ${{ steps.artifact.outputs.path }}
          push-to-registry: false

      - name: Generate SLSA provenance JSON
        id: provenance
        shell: bash
        run: |
          cat > provenance.json <<EOF
          {
            "version": 1,
            "attestationType": "https://slsa.dev/provenance/v1",
            "predicateType": "https://slsa.dev/provenance/v1",
            "subject": [
              {
                "name": "${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}",
                "digest": {
                  "sha256": "${{ steps.artifact.outputs.hash }}"
                }
              }
            ],
            "predicate": {
              "buildDefinition": {
                "buildType": "https://github.com/Workflow",
                "externalParameters": {
                  "workflow": "${{ github.workflow }}",
                  "ref": "${{ github.ref }}",
                  "repo": "${{ github.repository }}"
                }
              },
              "runDetails": {
                "builder": {
                  "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                },
                "byproducts": [
                  {
                    "name": "attestation_bundle",
                    "mediaType": "application/vnd.github.attestation+json"
                  }
                ]
              }
            }
          }
          EOF
          echo "provenance_generated=true" >> "$GITHUB_OUTPUT"

      - name: Upload provenance as artifact
        uses: actions/upload-artifact@v4
        if: steps.provenance.outputs.provenance_generated == 'true'
        with:
          name: slsa-provenance
          path: provenance.json
          retention-days: 90

      - name: Attest container image
        if: github.event_name == 'release' && contains(join(github.event.release.assets.*.name, ','), '.tar')
        run: echo "::notice::Container image attestation can be added if images are pushed to a registry"

  verify-attestation:
    needs: attest-release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download provenance
        uses: actions/download-artifact@v4
        with:
          name: slsa-provenance

      - name: Verify provenance format
        shell: bash
        run: |
          if [[ ! -f provenance.json ]]; then
            echo "::error::Provenance file not found"
            exit 1
          fi
          python3 -m json.tool provenance.json > /dev/null
          echo "✓ Valid SLSA provenance generated"
