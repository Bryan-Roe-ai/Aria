name: SLSA Provenance Attestation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      artifact_path:
        description: "Path to artifact to attest (e.g., dist/package.whl, dist/aria.tar.gz)"
        required: false
        type: string
      artifact_type:
        description: "Artifact type for multi-project builds"
        required: false
        type: choice
        options:
          - auto
          - wheel
          - docker
          - archive

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  resolve-artifact:
    runs-on: ubuntu-latest
    outputs:
      artifact_path: ${{ steps.resolve.outputs.artifact_path }}
      artifact_hash: ${{ steps.resolve.outputs.artifact_hash }}
      artifact_type: ${{ steps.resolve.outputs.artifact_type }}
      found: ${{ steps.resolve.outputs.found }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref }}

      - name: Resolve artifact path
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          # Priority: dispatch input > release tag inference > auto-discovery
          if [[ -n "${{ github.event.inputs.artifact_path }}" ]]; then
            ARTIFACT_PATH="${{ github.event.inputs.artifact_path }}"
            ARTIFACT_TYPE="${{ github.event.inputs.artifact_type }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            # Infer artifact type from tag prefix (e.g., quantum-ml-v1.0.0)
            if [[ "$TAG" =~ ^quantum-ml- ]]; then
              ARTIFACT_PATH="dist/quantum-ml/${TAG}.whl"
              ARTIFACT_TYPE="wheel"
            elif [[ "$TAG" =~ ^chat-cli- ]]; then
              ARTIFACT_PATH="dist/chat-cli/${TAG}.whl"
              ARTIFACT_TYPE="wheel"
            elif [[ "$TAG" =~ ^phi- ]]; then
              ARTIFACT_PATH="dist/phi-silica/${TAG}.tar.gz"
              ARTIFACT_TYPE="archive"
            else
              # Default Aria release
              ARTIFACT_PATH="dist/aria-${TAG}.tar.gz"
              ARTIFACT_TYPE="archive"
            fi
          else
            echo "::error::No artifact path provided and not a release event"
            exit 1
          fi

          if [[ ! -f "$ARTIFACT_PATH" ]]; then
            echo "::error::Artifact not found: $ARTIFACT_PATH"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          HASH="$(sha256sum "$ARTIFACT_PATH" | awk '{print $1}')"
          echo "artifact_path=$ARTIFACT_PATH" >> "$GITHUB_OUTPUT"
          echo "artifact_hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "artifact_type=$ARTIFACT_TYPE" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "✓ Resolved artifact: $ARTIFACT_PATH (type: $ARTIFACT_TYPE, sha256: $HASH)"

  attest-release:
    needs: resolve-artifact
    runs-on: ubuntu-latest
    if: needs.resolve-artifact.outputs.found == 'true'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: ${{ needs.resolve-artifact.outputs.artifact_path }}
          push-to-registry: false

      - name: Generate SLSA v1.0 provenance
        id: provenance
        shell: bash
        env:
          ARTIFACT_HASH: ${{ needs.resolve-artifact.outputs.artifact_hash }}
          ARTIFACT_PATH: ${{ needs.resolve-artifact.outputs.artifact_path }}
          ARTIFACT_TYPE: ${{ needs.resolve-artifact.outputs.artifact_type }}
        run: |
          set -euo pipefail

          # Build SLSA v1.0 compliant provenance
          cat > provenance.json <<'EOFPROV'
          {
            "version": 1,
            "attestationType": "https://slsa.dev/provenance/v1",
            "predicateType": "https://slsa.dev/provenance/v1",
            "subject": [
              {
                "name": "${{ needs.resolve-artifact.outputs.artifact_path }}",
                "digest": {
                  "sha256": "${{ needs.resolve-artifact.outputs.artifact_hash }}"
                }
              }
            ],
            "predicate": {
              "buildDefinition": {
                "buildType": "https://github.com/Bryan-Roe/Aria/actions/workflow/attestation.yml",
                "externalParameters": {
                  "workflow": "${{ github.workflow }}",
                  "ref": "${{ github.ref }}",
                  "repo": "${{ github.repository }}",
                  "sourceRepository": "https://github.com/${{ github.repository }}",
                  "artifactType": "${{ env.ARTIFACT_TYPE }}"
                },
                "internalParameters": {
                  "github-actions-sha": "${{ github.sha }}"
                }
              },
              "runDetails": {
                "builder": {
                  "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                },
                "byproducts": [
                  {
                    "name": "github_actions_build_log",
                    "mediaType": "text/plain",
                    "locator": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/logs"
                  }
                ],
                "conclusion": "SUCCESS",
                "duration": "PT${GITHUB_STEP_SUMMARY:0:5}S",
                "completionTime": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              }
            }
          }
          EOFPROV

          echo "provenance_path=provenance.json" >> "$GITHUB_OUTPUT"
          python3 -c "import json; json.load(open('provenance.json')); print('✓ Valid SLSA v1.0 JSON')"

      - name: Verify attestation integrity
        shell: bash
        env:
          ARTIFACT_HASH: ${{ needs.resolve-artifact.outputs.artifact_hash }}
        run: |
          set -euo pipefail

          # Parse and verify provenance matches the artifact
          PROVENANCE_HASH=$(python3 -c "
          import json
          with open('provenance.json') as f:
              data = json.load(f)
              print(data['subject'][0]['digest']['sha256'])
          ")

          if [[ "$PROVENANCE_HASH" != "$ARTIFACT_HASH" ]]; then
            echo "::error::Attestation hash mismatch: $PROVENANCE_HASH != $ARTIFACT_HASH"
            exit 1
          fi

          echo "✓ Attestation integrity verified"

      - name: Upload SLSA provenance
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: slsa-provenance-${{ github.run_id }}
          path: provenance.json
          retention-days: 180
          if-no-files-found: error

      - name: Create attestation release asset
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          RELEASE_ID="${{ github.event.release.id }}"

          # Upload provenance as release asset
          gh release upload "$TAG" provenance.json \
            --clobber \
            --repo "${{ github.repository }}"

  verify-attestation:
    needs: attest-release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Download provenance
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: slsa-provenance-${{ github.run_id }}

      - name: Verify SLSA v1.0 compliance
        shell: bash
        run: |
          set -euo pipefail

          python3 << 'EOFVERIFY'
          import json
          import sys
          from datetime import datetime

          with open('provenance.json') as f:
              prov = json.load(f)

          # SLSA v1.0 required fields
          required_fields = {
              'version': (int, [1]),
              'attestationType': (str, ['https://slsa.dev/provenance/v1']),
              'predicateType': (str, ['https://slsa.dev/provenance/v1']),
              'subject': (list, None),
              'predicate': (dict, None),
          }

          errors = []
          for field, (expected_type, allowed_values) in required_fields.items():
              if field not in prov:
                  errors.append(f"Missing required field: {field}")
              elif not isinstance(prov[field], expected_type):
                  errors.append(f"Invalid type for {field}: {type(prov[field]).__name__}")
              elif allowed_values and prov[field] not in allowed_values:
                  errors.append(f"Invalid value for {field}: {prov[field]}")

          # Verify subject has digest
          if prov.get('subject'):
              for subj in prov['subject']:
                  if 'digest' not in subj or 'sha256' not in subj.get('digest', {}):
                      errors.append("Subject missing sha256 digest")

          # Verify predicate structure
          pred = prov.get('predicate', {})
          if 'buildDefinition' not in pred or 'runDetails' not in pred:
              errors.append("Predicate missing buildDefinition or runDetails")

          if errors:
              print("✗ SLSA v1.0 compliance check failed:")
              for err in errors:
                  print(f"  - {err}")
              sys.exit(1)

          print("✓ SLSA v1.0 provenance verified")
          print(f"  Subjects: {len(prov['subject'])}")
          print(f"  Builder: {pred.get('runDetails', {}).get('builder', {}).get('id', 'N/A')}")
          print(f"  Conclusion: {pred.get('runDetails', {}).get('conclusion', 'N/A')}")
          EOFVERIFY

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: attestation-verification-report
          path: provenance.json
          retention-days: 30
