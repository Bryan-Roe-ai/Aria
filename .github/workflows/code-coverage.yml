name: Code Coverage

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  checks: write

jobs:
  coverage:
    name: Run tests and collect coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Harden the runner (Restrict egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            pypi.org:443
            files.pythonhosted.org:443
            codecov.io:443
            registry.npmjs.org:443
            api.github.com:443

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install root dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Install test and coverage tools
        run: |
          pip install pytest pytest-cov coverage[toml]

      - name: Run tests with coverage (root + shared)
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml:coverage-root.xml \
            --cov-report=term \
            --cov-branch \
            --cov-fail-under=75 \
            -v

      - name: Install and test quantum-ml project
        run: |
          cd ai-projects/quantum-ml
          python -m venv venv-test
          source venv-test/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage[toml]
          pytest tests/ \
            --cov=src \
            --cov-report=xml:../../coverage-quantum-ml.xml \
            --cov-report=term \
            --cov-branch \
            -v
          deactivate

      - name: Install and test chat-cli project
        run: |
          cd ai-projects/chat-cli
          python -m venv venv-test
          source venv-test/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage[toml]
          pytest tests/ \
            --cov=src \
            --cov-report=xml:../../coverage-chat-cli.xml \
            --cov-report=term \
            --cov-branch \
            -v
          deactivate

      - name: Install and test Phi-3.5 project
        run: |
          cd AI/microsoft_phi-silica-3.6_v1
          python -m venv venv-test
          source venv-test/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage[toml]
          pytest tests/ \
            --cov=. \
            --cov-report=xml:../../coverage-phi.xml \
            --cov-report=term \
            --cov-branch \
            -v || echo "Phi tests skipped (GPU/quantization optional)"
          deactivate

      - name: Merge coverage reports
        run: |
          pip install coverage[toml]
          coverage combine
          coverage xml
          coverage report --fail-under=70

      - name: Upload coverage reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-reports-py${{ matrix.python-version }}
          path: coverage*.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: step-security/codecov-action@db5c3605ff3c9dc7f0b2791e6bea84a561bacab8 # v7.0.0
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-py${{ matrix.python-version }}
          fail_ci_if_error: false
          verbose: true

      - name: Comment PR with coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage.xml', 'utf8');
            const match = coverage.match(/lines-valid="(\d+)".*lines-covered="(\d+)"/);
            if (match) {
              const [, total, covered] = match;
              const percent = ((covered / total) * 100).toFixed(2);
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `📊 **Code Coverage**: ${percent}% (${covered}/${total} lines)\n\nFull report: [Codecov](https://codecov.io/github/${context.repo.owner}/${context.repo.repo})`
              });
            }
