name: auto-fix

on:
  schedule:
    - cron: '15 2 * * 2'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  autofix:
    name: Run safe autofixes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python and autofix tooling
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'
          install-requirements: 'false'
          install-dev-requirements: 'false'
          extra-packages: 'ruff==0.11.13 black==25.1.0 pytest==8.3.5 pyyaml' # cspell:ignore pytest pyyaml

      - name: Detect safe Python targets
        id: detect
        shell: bash
        run: |
          set -euo pipefail  # cspell:ignore pipefail

          python <<'PY'
          import os
          from pathlib import Path  # cspell:ignore pathlib

          ignore_dirs = {
              ".git",
              ".venv",
              "venv",  # cspell:ignore venv
              ".tox",
              ".nox",
              "__pycache__",  # cspell:ignore pycache
              "node_modules",
              ".mypy_cache",  # cspell:ignore mypy
              ".pytest_cache",
              ".ruff_cache",
              ".eggs",
              "dist",
              "build",
              "coverage",
              "htmlcov",  # cspell:ignore htmlcov
          }

          candidate_dirs = [
              Path("apps/aria"),
              Path("shared"),
              Path("scripts"),
          ]

          candidate_files = [
              Path("function_app.py"),
          ]

          targets = []

          for directory in candidate_dirs:
              if directory.exists() and any(
                  not ignore_dirs.intersection(path.parts)
                  for path in directory.rglob("*.py")  # cspell:ignore rglob
              ):
                  targets.append(str(directory))

          for file_path in candidate_files:
              if file_path.exists() and file_path.suffix == ".py":
                  targets.append(str(file_path))

          has_python = "true" if targets else "false"

          # Write directly to GITHUB_OUTPUT to avoid creating a stray file
          # that would be unintentionally committed by create-pull-request.
          output_file = os.environ.get("GITHUB_OUTPUT", "")
          if output_file:
              with open(output_file, "a", encoding="utf-8") as f:
                  f.write(f"has_python={has_python}\n")
                  f.write(f"targets={' '.join(targets)}\n")
          PY

      - name: Show detected targets
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Autofix targets: ${{ steps.detect.outputs.targets }}"

      - name: Run Ruff autofixes
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ruff check ${{ steps.detect.outputs.targets }} --fix --exit-zero

      - name: Run Black formatting
        if: steps.detect.outputs.has_python == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          black ${{ steps.detect.outputs.targets }}

      - name: Verify Ruff
        if: steps.detect.outputs.has_python == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          ruff check ${{ steps.detect.outputs.targets }}

      - name: Verify Black
        if: steps.detect.outputs.has_python == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          black ${{ steps.detect.outputs.targets }} --check

      - name: Run targeted pytest
        if: steps.detect.outputs.has_python == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          ran_tests=false

          if [ -d "tests" ]; then
            pytest -q tests
            ran_tests=true
          fi

          if [ -d "apps/aria/tests" ]; then
            pytest -q apps/aria/tests
            ran_tests=true
          fi

          if [ "$ran_tests" = false ]; then
            echo "No supported targeted test directories found; skipping pytest."
          fi

      - name: Rebase autofix changes on latest origin/main
        shell: bash
        run: |
          set -euo pipefail
          # Stash any ruff/black changes, reset to the latest origin/main, then restore.
          # This prevents "refusing to update workflow file without workflows permission"
          # push rejections caused by a race condition: if another commit (e.g., a
          # codeql.yml update) landed on origin/main while this autofix job ran with
          # an older checkout, the pushed branch would contain an older workflow file.
          # Rebasing on the latest origin/main ensures the autofix branch only
          # introduces Python file changes — no workflow file diff.
          #
          # We check both staged/unstaged changes (git diff --quiet) AND untracked
          # files (git ls-files --others) because ruff/black leave modifications in the
          # working tree while detect_output.txt (if any) would be untracked.
          stashed=false
          if ! git diff --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
            git stash push --include-untracked -m "autofix-changes"
            stashed=true
          fi
          git fetch origin main
          # git reset --hard is safe here: all autofix changes were captured in the
          # stash above, so no work is discarded.
          git reset --hard origin/main
          if [ "$stashed" = true ]; then
            git stash pop
          fi

      - name: Revert workflow file changes and remove stray files
        shell: bash
        run: |
          set -euo pipefail
          # Remove stray untracked files that must not be committed.
          # detect_output.txt can appear if a prior run wrote it or if the stash
          # pop restored it from an old workflow version.
          rm -f detect_output.txt
          # Ensure no .github/workflows/ files are modified before we create the
          # PR branch.  GITHUB_TOKEN has contents:write but NOT workflows
          # permission, so pushing any change under .github/workflows/ would be
          # rejected by GitHub with "refusing to update workflow file without
          # workflows permission" — even when the change is accidental (e.g.
          # caused by a race-condition rebase).
          git restore --staged --worktree -- .github/workflows 2>/dev/null || true

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          commit-message: 'ci(chore): apply automated safe autofixes'
          branch: 'fix/autofix-weekly'
          delete-branch: false
          title: 'ci: automated safe autofixes'
          body: |
            ## Summary
            Apply scheduled/manual safe autofixes for scoped Python targets.

            ## What changed
            - Ran `ruff check --fix` on approved Python paths
            - Ran `black` on approved Python paths
            - Verified lint and formatting
            - Ran targeted pytest where supported

            ## Scope
            - `apps/aria/`
            - `shared/`
            - `scripts/`
            - `function_app.py`

            ## Testing
            - Ruff verification
            - Black verification
            - Targeted pytest (when supported)

            ## Risk & Impact
            - Intended to be low risk and non-functional
            - Scoped to approved Python paths only
            - Review recommended before merge
          labels: |
            automation
            maintenance
            autofix
            auto-merge

      - if: steps.changes.outputs.changed != 'true'
        name: No changes to commit
        run: echo "No autofix changes detected."
