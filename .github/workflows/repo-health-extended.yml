name: Extended Repository Health

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - repo-cleanup-automation

permissions:
  contents: read

jobs:
  extended-health:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install analysis tooling
        run: |
          python -m pip install --upgrade pip
          pip install vulture detect-secrets

      - name: Run repository validation
        run: |
          python tools/repo_cleanup/validate_structure.py

      - name: Run autofix cleanup
        run: |
          python tools/repo_cleanup/autofix_cleanup.py

      - name: Detect potential dead code
        run: |
          python tools/repo_cleanup/detect_dead_code.py

      - name: Run Vulture dead code analysis
        run: |
          vulture . --min-confidence 80 || true

      - name: Run secret scan
        run: |
          detect-secrets scan > .secrets.baseline || true

      - name: Generate repository inventory
        run: |
          python tools/repo_cleanup/generate_repo_inventory.py

      - name: Upload repository reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: extended-repo-health
          path: |
            docs/reports/
            .secrets.baseline
