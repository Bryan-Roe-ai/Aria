# =============================================================================
# Merge Gate — Required status check for pull requests targeting main
# =============================================================================
# Purpose: Aggregates all mandatory quality gates into a single named job
#          (`All Gates Passed`) that branch protection rules reference.
#          Every gate job runs concurrently; the fan-in job fails the check
#          if any gate fails or is cancelled.
#
# Trigger:  pull_request → main (opened / synchronize / reopened /
#           ready_for_review).  Draft PRs skip all gate jobs so they don't
#           block development; the fan-in still succeeds (skipped is OK).
#           merge_group is included so the same gates run in GitHub's merge
#           queue.  workflow_dispatch is provided for manual re-runs.
#
# Branch protection:  Add "Merge Gate / All Gates Passed" as the single
#                     required status check on the main branch.
# =============================================================================

name: Merge Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

# Cancel superseded runs for the same PR / merge-queue entry / manual run.
# The fallback to github.ref keeps the group unique when pull_request.number
# is unavailable (merge_group, workflow_dispatch).
concurrency:
  group: >-
    merge-gate-${{
      github.event.pull_request.number
      || github.event.merge_group.head_ref
      || github.ref
    }}
  cancel-in-progress: true

# Least-privilege default; jobs opt-in to more below.
permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Centralised pins so all jobs stay in sync.
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
  DEPENDENCY_REVIEW_SHA: 2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
  GITHUB_SCRIPT_SHA: 60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1

jobs:
  # ---------------------------------------------------------------------------
  # Gate 1 — Unit tests
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          extra-packages: 'pytest pytest-timeout'

      - name: Run unit tests
        uses: ./.github/actions/run-pytest-suite
        with:
          test-path: tests
          marker-expression: 'not slow and not azure and not integration'
          extra-args: '--maxfail=5 -q'
        env:
          CI: 'true'
          PYTHONDONTWRITEBYTECODE: '1'
          PYTHONUNBUFFERED: '1'

  ai-project-tests:
    name: AI Project Tests
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          extra-packages: 'pytest pytest-timeout'

      - name: Run ai-project tests
        run: |
          set -euo pipefail
          python scripts/test_runner.py --ai-projects
        env:
          CI: 'true'
          PYTHONDONTWRITEBYTECODE: '1'
          PYTHONUNBUFFERED: '1'

  # ---------------------------------------------------------------------------
  # Gate 2 — PR structure validation
  # ---------------------------------------------------------------------------
  pr-validation:
    name: PR Validation
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Check for stale gitlinks
        # Stale gitlinks (mode 160000 in the index with no matching .gitmodules
        # entry) cause `actions/checkout` post-job cleanup to fail with:
        #   "fatal: No url found for submodule path '<name>' in .gitmodules"
        # Catch this early so it doesn't silently break other workflows.
        run: |
          set -euo pipefail
          stale_links=$(git ls-files --stage | awk '$1 == "160000" { print $4 }')
          if [[ -z "$stale_links" ]]; then
            echo "No submodule gitlinks in index — OK."
            exit 0
          fi
          stale=()
          while IFS= read -r path; do
            url=$(git config -f .gitmodules "submodule.${path}.url" 2>/dev/null || true)
            if [[ -z "$url" ]]; then
              stale+=("$path")
            fi
          done <<< "$stale_links"
          if (( ${#stale[@]} > 0 )); then
            echo "::error title=Stale gitlinks::The following paths are tracked as " \
              "submodule gitlinks (mode 160000) but have no entry in .gitmodules: ${stale[*]}"
            echo "Remove them with: git rm --cached <path>"
            exit 1
          fi
          echo "All gitlinks have valid .gitmodules entries — OK."

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          extra-packages: 'pyyaml'

      - name: Validate workflow YAML
        uses: ./.github/actions/validate-workflow-yaml
        with:
          workflows-path: .github/workflows
          require-jobs: 'true'

      - name: Validate Azure Function bindings
        uses: ./.github/actions/validate-function-bindings
        with:
          functions-path: functions
          require-http-route: 'true'

      - name: Fast validation
        run: |
          set -euo pipefail
          script="scripts/fast_validate.py"
          if [[ -f "${script}" ]]; then
            python "${script}"
          else
            echo "::notice title=Fast validation skipped::${script} not found"
          fi

  # ---------------------------------------------------------------------------
  # Gate 3 — Dependency security review
  # ---------------------------------------------------------------------------
  security:
    name: Security Review
    # dependency-review-action only supports pull_request / merge_group events.
    if: >-
      github.event.pull_request.draft != true
      && (github.event_name == 'pull_request' || github.event_name == 'merge_group')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write  # required by dependency-review-action to comment
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          comment-summary-in-pr: on-failure
          vulnerability-check: true
          license-check: true

  # ---------------------------------------------------------------------------
  # Gate 4 — Integration contract gate
  # ---------------------------------------------------------------------------
  contract-gate:
    name: Integration Contract Gate
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'
          extra-packages: 'pytest pytest-timeout'

      - name: Validate site bundles
        uses: ./.github/actions/validate-site-bundles
        with:
          strict-metadata: 'true'

      - name: Validate composite actions
        uses: ./.github/actions/validate-composite-actions
        with:
          script-path: scripts/validate_composite_actions.py

      - name: Run contract gate
        uses: ./.github/actions/run-integration-contract-gate

  # ---------------------------------------------------------------------------
  # Gate 5 — Setup verification guardrails
  # ---------------------------------------------------------------------------
  setup-guardrails:
    name: Setup Guardrails
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'

      - name: Verify setup guardrails
        uses: ./.github/actions/run-setup-verify

  # ---------------------------------------------------------------------------
  # Gate 6 — Wait for GitHub's automatic NuGet dependency submission job
  # ---------------------------------------------------------------------------
  dependency-submission:
    name: Dependency Submission
    if: github.event.pull_request.draft != true && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: read
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Wait for submit-nuget check
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CHECK_NAME: submit-nuget
          MAX_ATTEMPTS: '30'
          SLEEP_SECONDS: '10'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { setTimeout: sleep } = require('node:timers/promises');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = process.env.HEAD_SHA;
            const checkName = process.env.CHECK_NAME;
            const maxAttempts = Number(process.env.MAX_ATTEMPTS || '30');
            const sleepSeconds = Number(process.env.SLEEP_SECONDS || '10');

            function pickLatestRun(checkRuns) {
              return [...checkRuns]
                .filter((run) => run.name === checkName)
                .sort((left, right) => {
                  const leftTime = Date.parse(left.started_at || left.completed_at || 0);
                  const rightTime = Date.parse(right.started_at || right.completed_at || 0);
                  return rightTime - leftTime || right.id - left.id;
                })[0];
            }

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const checkRuns = await github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref,
                per_page: 100,
              });
              const latestRun = pickLatestRun(checkRuns);

              if (!latestRun) {
                core.info(
                  `Attempt ${attempt}/${maxAttempts}: check '${checkName}' not visible yet for ${ref}; waiting ${sleepSeconds}s.`,
                );
                await sleep(sleepSeconds * 1000);
                continue;
              }

              core.info(
                `Attempt ${attempt}/${maxAttempts}: '${checkName}' status=${latestRun.status} conclusion=${latestRun.conclusion ?? 'n/a'} (${latestRun.details_url}).`,
              );

              if (latestRun.status !== 'completed') {
                await sleep(sleepSeconds * 1000);
                continue;
              }

              if (['success', 'neutral', 'skipped'].includes(latestRun.conclusion)) {
                core.info(`Dependency submission check '${checkName}' completed successfully.`);
                return;
              }

              core.setFailed(
                `Dependency submission check '${checkName}' concluded with '${latestRun.conclusion}'. See ${latestRun.details_url}.`,
              );
              return;
            }

            core.setFailed(
              `Timed out waiting for dependency submission check '${checkName}' on ${ref}. Merge Gate must not pass before that check completes.`,
            );

  # ---------------------------------------------------------------------------
  # Fan-in — All gates must pass.  This is the single required status check.
  # ---------------------------------------------------------------------------
  gates-passed:
    name: All Gates Passed
    needs: [unit-tests, ai-project-tests, pr-validation, security, contract-gate, setup-guardrails, dependency-submission]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Evaluate gate results
        env:
          UNIT_TESTS: ${{ needs.unit-tests.result }}
          AI_PROJECT_TESTS: ${{ needs.ai-project-tests.result }}
          PR_VALIDATION: ${{ needs.pr-validation.result }}
          SECURITY: ${{ needs.security.result }}
          CONTRACT_GATE: ${{ needs.contract-gate.result }}
          SETUP_GUARDRAILS: ${{ needs.setup-guardrails.result }}
          DEPENDENCY_SUBMISSION: ${{ needs.dependency-submission.result }}
        run: |
          set -euo pipefail

          declare -a FAILED_GATES=()
          declare -a SKIPPED_GATES=()
          declare -a PASSED_GATES=()

          # Map gate display names to their result values.
          # Using parallel arrays keeps the order deterministic.
          GATE_NAMES=("Unit Tests" "AI Project Tests" "PR Validation" "Security Review" "Contract Gate" "Setup Guardrails" "Dependency Submission")
          GATE_RESULTS=("${UNIT_TESTS}" "${AI_PROJECT_TESTS}" "${PR_VALIDATION}" "${SECURITY}" "${CONTRACT_GATE}" "${SETUP_GUARDRAILS}" "${DEPENDENCY_SUBMISSION}")

          status_emoji() {
            case "$1" in
              success)             printf '✅' ;;
              skipped)             printf '⊘'  ;;
              failure)             printf '❌' ;;
              cancelled)           printf '🛑' ;;
              *)                   printf '❓' ;;
            esac
          }

          # Build the run log and step summary in a single pass.
          {
            echo "## Merge Gate Summary"
            echo ""
            echo "| Gate | Result |"
            echo "|------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for i in "${!GATE_NAMES[@]}"; do
            name="${GATE_NAMES[$i]}"
            result="${GATE_RESULTS[$i]:-unknown}"
            emoji="$(status_emoji "$result")"

            printf '%s %s: %s\n' "$emoji" "$name" "$result"
            printf '| %s | %s %s |\n' "$name" "$emoji" "$result" \
              >> "$GITHUB_STEP_SUMMARY"

            case "$result" in
              success)
                PASSED_GATES+=("$name")
                ;;
              skipped)
                SKIPPED_GATES+=("$name")
                ;;
              failure|cancelled)
                FAILED_GATES+=("$name ($result)")
                ;;
              *)
                FAILED_GATES+=("$name (unexpected: $result)")
                ;;
            esac
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if (( ${#FAILED_GATES[@]} > 0 )); then
            {
              echo "### ❌ Merge blocked"
              echo ""
              echo "The following gate(s) did not pass:"
              for g in "${FAILED_GATES[@]}"; do echo "- $g"; done
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::error title=Merge Gate failed::Failing gates: ${FAILED_GATES[*]}"
            exit 1
          fi

          echo "### ✅ All merge gates passed — PR is ready to merge." \
            >> "$GITHUB_STEP_SUMMARY"
          echo "All merge gates passed (${#PASSED_GATES[@]} passed, ${#SKIPPED_GATES[@]} skipped)."
