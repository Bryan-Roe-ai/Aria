name: Autofix

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * 2"

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Run safe autofixes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install autofix and test tooling
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest

      - name: Detect Python paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY' > python_paths.txt
          from pathlib import Path

          ignore_dirs = {
              ".git",
              ".venv",
              "venv",
              "__pycache__",
              "node_modules",
              ".mypy_cache",
              ".pytest_cache",
              "dist",
              "build",
          }

          roots = []
          for path in Path(".").rglob("*.py"):
              parts = set(path.parts)
              if parts & ignore_dirs:
                  continue
              roots.append(str(path))

          print("\n".join(sorted(roots)))
          PY

          if [ -s python_paths.txt ]; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
            {
              echo "python_files<<EOF"
              cat python_paths.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Ruff autofixes
        if: steps.paths.outputs.has_python == 'true'
        shell: bash
        run: |
          printf '%s\n' "${{ steps.paths.outputs.python_files }}" > python_paths.txt
          xargs -a python_paths.txt ruff check --fix

      - name: Run Black formatting
        if: steps.paths.outputs.has_python == 'true'
        shell: bash
        run: |
          printf '%s\n' "${{ steps.paths.outputs.python_files }}" > python_paths.txt
          xargs -a python_paths.txt black

      - name: Verify Ruff
        if: steps.paths.outputs.has_python == 'true'
        shell: bash
        run: |
          printf '%s\n' "${{ steps.paths.outputs.python_files }}" > python_paths.txt
          xargs -a python_paths.txt ruff check

      - name: Verify Black
        if: steps.paths.outputs.has_python == 'true'
        shell: bash
        run: |
          printf '%s\n' "${{ steps.paths.outputs.python_files }}" > python_paths.txt
          xargs -a python_paths.txt black --check

      - name: Run pytest if tests exist
        shell: bash
        run: |
          if [ -d tests ] || [ -f pytest.ini ] || [ -f pyproject.toml ]; then
            pytest -q
          else
            echo "No pytest configuration or tests directory found; skipping tests."
          fi

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "ci(chore): apply automated safe autofixes"
          branch: "fix/autofix-weekly"
          delete-branch: false
          title: "ci: automated safe autofixes"
          body: |
            ## Summary
            Apply scheduled/manual safe autofixes for Python code.

            ## What changed
            - Ran `ruff check --fix`
            - Ran `black`
            - Verified lint and formatting
            - Ran pytest when tests/configuration were present

            ## Testing
            - Ruff verification
            - Black verification
            - Pytest (when available)

            ## Risk & Impact
            - Intended to be low risk and non-functional
            - Review recommended before merge
          labels: |
            automation
            maintenance
