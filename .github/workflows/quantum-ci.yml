name: quantum-ci

on:
  push:
    branches: [main, hardening/quantum-tests-ci]
    paths:
      - '.github/workflows/quantum-ci.yml'
      - '.github/actions/run-quantum-ai-smoke/**'
      - '.github/actions/setup-python-env/**'
      - 'quantum-ai/**'
      - 'ai-projects/quantum-ml/**'
      - 'ai_projects/quantum_ml/**'
      - 'shared/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'constraints.txt'
      - 'pyproject.toml'
      - 'pytest.ini'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/quantum-ci.yml'
      - '.github/actions/run-quantum-ai-smoke/**'
      - '.github/actions/setup-python-env/**'
      - 'quantum-ai/**'
      - 'ai-projects/quantum-ml/**'
      - 'ai_projects/quantum_ml/**'
      - 'shared/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'constraints.txt'
      - 'pyproject.toml'
      - 'pytest.ini'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: quantum-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.2
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  SETUP_PYTHON_SHA: a26af69be951a213d495a4c3e4e4022e16d87065    # v5.6.0
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
  DOWNLOAD_ARTIFACT_SHA: d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.1.7
  GITHUB_SCRIPT_SHA: 60a0d83039c74a4aee543508d2ffcb1c3799cdea     # v7.0.1
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  QUANTUM_COVERAGE_THRESHOLD: "20"

defaults:
  run:
    shell: bash

jobs:
  smoke:
    name: Quantum smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'
          install-requirements: 'false'
          cache-dependency-path: |
            quantum-ai/requirements-smoke.txt
          extra-requirement-files: |
            quantum-ai/requirements-smoke.txt
          pip-check-mode: 'warn'

      - name: Run quantum smoke
        uses: ./.github/actions/run-quantum-ai-smoke
        with:
          backend: classical
          epochs: '1'

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: quantum-smoke-${{ github.run_number }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            quantum-ai/results/

  unit-tests:
    name: Quantum unit tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python and install dependencies
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml
            quantum-ai/requirements-smoke.txt
          install-dev-requirements: 'true'
          extra-requirement-files: |
            quantum-ai/requirements-smoke.txt
          extra-packages: 'pytest pytest-cov'
          pip-check-mode: 'warn'

      - name: Discover quantum unit tests
        id: discover
        run: |
          set -euo pipefail
          TEST_LIST_FILE="${RUNNER_TEMP}/quantum-unit-tests-${{ matrix.python-version }}.txt"
          find tests -type f \( -name '*quantum*.py' -o -name '*azure_quantum*.py' \) \
            ! -path 'tests/integration/*' | sort > "$TEST_LIST_FILE"

          if [[ ! -s "$TEST_LIST_FILE" ]]; then
            echo '::error::No quantum unit tests were found outside tests/integration/.'
            exit 1
          fi

          echo "test_list_file=$TEST_LIST_FILE" >> "$GITHUB_OUTPUT"
          echo "test_count=$(wc -l < \"$TEST_LIST_FILE\")" >> "$GITHUB_OUTPUT"

      - name: Run quantum unit pytest
        id: run-unit
        env:
          CI: "true"
          AZURE_CLIENT_ID: ""
          AZURE_TENANT_ID: ""
          AZURE_CLIENT_SECRET: ""
          OPENAI_API_KEY: ""
        run: |
          set -euo pipefail
          mkdir -p data_out
          mapfile -t quantum_tests < "${{ steps.discover.outputs.test_list_file }}"

          echo "Collected ${#quantum_tests[@]} quantum unit test files:"
          printf ' - %s\n' "${quantum_tests[@]}"

          set +e
          python -m pytest "${quantum_tests[@]}" \
            -q \
            --tb=short \
            --maxfail=1 \
            --durations=15 \
            --junitxml="data_out/junit-quantum-unit-${{ matrix.python-version }}.xml" \
            --cov=ai-projects/quantum-ml/src \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:"data_out/coverage-quantum-unit-${{ matrix.python-version }}.xml" \
            2>&1 | tee "data_out/pytest-quantum-unit-${{ matrix.python-version }}.txt"
          exit_code="${PIPESTATUS[0]}"
          set -e

          echo "exit-code=${exit_code}" >> "$GITHUB_OUTPUT"
          echo "Pytest exit code: ${exit_code}"

      - name: Parse unit JUnit XML
        id: parse-unit
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import xml.etree.ElementTree as ET

          path = "data_out/junit-quantum-unit-${{ matrix.python-version }}.xml"
          passed = failed = skipped = errors = total = 0
          if os.path.exists(path):
              root = ET.parse(path).getroot()
              suites = root.findall(".//testsuite") or [root]
              for suite in suites:
                  total += int(suite.attrib.get("tests", 0))
                  failed += int(suite.attrib.get("failures", 0))
                  errors += int(suite.attrib.get("errors", 0))
                  skipped += int(suite.attrib.get("skipped", 0))
              passed = max(total - failed - errors - skipped, 0)
          print(f"passed={passed}")
          print(f"failed={failed}")
          print(f"errors={errors}")
          print(f"skipped={skipped}")
          print(f"total={total}")
          PY

      - name: Parse unit coverage and enforce threshold
        id: coverage-unit
        if: always()
        env:
          COVERAGE_THRESHOLD: ${{ env.QUANTUM_COVERAGE_THRESHOLD }}
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import xml.etree.ElementTree as ET

          path = "data_out/coverage-quantum-unit-${{ matrix.python-version }}.xml"
          threshold = float(os.environ.get("COVERAGE_THRESHOLD", "0") or "0")
          total = ""
          status = "missing"
          if os.path.exists(path):
              root = ET.parse(path).getroot()
              rate = float(root.attrib.get("line-rate", "0")) * 100
              total = f"{rate:.1f}"
              status = "pass" if rate + 1e-9 >= threshold else "below-threshold"
          print(f"total={total}")
          print(f"status={status}")
          print(f"threshold={threshold:.1f}")
          PY

      - name: Emit unit failure annotations
        if: always() && (steps.parse-unit.outputs.failed != '0' || steps.parse-unit.outputs.errors != '0')
        run: |
          set -euo pipefail
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          path = Path("data_out/junit-quantum-unit-${{ matrix.python-version }}.xml")
          if not path.exists():
              raise SystemExit(0)

          emitted = 0
          limit = 20
          root = ET.parse(path).getroot()
          for case in root.findall('.//testcase'):
              failure = case.find('failure') or case.find('error')
              if failure is None:
                  continue
              title = f"{case.attrib.get('classname', '')}::{case.attrib.get('name', '')}".strip(':')
              message = (failure.attrib.get('message') or (failure.text or 'test failed')).strip().splitlines()[0][:240]
              file_name = case.attrib.get('file', '')
              line = case.attrib.get('line', '')
              prefix = '::error'
              if file_name and line:
                  prefix += f" file={file_name},line={line}"
              print(f"{prefix},title=Quantum unit failure::{title} — {message}")
              emitted += 1
              if emitted >= limit:
                  print('::warning::Additional quantum unit failures omitted from annotations.')
                  break
          PY

      - name: Write unit step summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Quantum unit tests (${{ matrix.python-version }})"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| ✅ Passed | ${{ steps.parse-unit.outputs.passed }} |"
            echo "| ❌ Failed | ${{ steps.parse-unit.outputs.failed }} |"
            echo "| 💥 Errors | ${{ steps.parse-unit.outputs.errors }} |"
            echo "| ⏭️ Skipped | ${{ steps.parse-unit.outputs.skipped }} |"
            echo "| 🧮 Total | ${{ steps.parse-unit.outputs.total }} |"
            echo "| 📊 Coverage | ${{ steps.coverage-unit.outputs.total || 'n/a' }}% |"
            echo "| 🎯 Threshold | ${{ steps.coverage-unit.outputs.threshold }}% |"
            echo "| 🧪 Exit code | ${{ steps.run-unit.outputs.exit-code }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit test artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: quantum-unit-${{ matrix.python-version }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            data_out/junit-quantum-unit-${{ matrix.python-version }}.xml
            data_out/coverage-quantum-unit-${{ matrix.python-version }}.xml
            data_out/pytest-quantum-unit-${{ matrix.python-version }}.txt

      - name: Fail unit job on test or coverage failure
        if: always()
        env:
          EXIT_CODE: ${{ steps.run-unit.outputs.exit-code }}
          COVERAGE_STATUS: ${{ steps.coverage-unit.outputs.status }}
          COVERAGE_TOTAL: ${{ steps.coverage-unit.outputs.total }}
          COVERAGE_THRESHOLD: ${{ steps.coverage-unit.outputs.threshold }}
        run: |
          set -euo pipefail
          if [[ "$EXIT_CODE" != '0' && "$EXIT_CODE" != '5' ]]; then
            echo "::error::Quantum unit pytest exited with code $EXIT_CODE."
            exit 1
          fi

          if [[ "$COVERAGE_STATUS" == 'below-threshold' ]]; then
            echo "::error::Quantum unit coverage ${COVERAGE_TOTAL}% is below threshold ${COVERAGE_THRESHOLD}%."
            exit 1
          fi

          if [[ "$COVERAGE_STATUS" == 'missing' ]]; then
            echo '::error::Quantum unit coverage.xml artifact was not generated.'
            exit 1
          fi

  integration-tests:
    name: Quantum integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: smoke
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python and install dependencies
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml
            quantum-ai/requirements-smoke.txt
          install-dev-requirements: 'true'
          extra-requirement-files: |
            quantum-ai/requirements-smoke.txt
          extra-packages: 'pytest'
          pip-check-mode: 'warn'

      - name: Discover quantum integration tests
        id: discover
        run: |
          set -euo pipefail
          TEST_LIST_FILE="${RUNNER_TEMP}/quantum-integration-tests.txt"
          find tests/integration -type f \( -name '*quantum*.py' -o -name '*azure_quantum*.py' \) | sort > "$TEST_LIST_FILE"

          if [[ ! -s "$TEST_LIST_FILE" ]]; then
            echo '::warning::No quantum integration tests were found under tests/integration/.'
          fi

          echo "test_list_file=$TEST_LIST_FILE" >> "$GITHUB_OUTPUT"

      - name: Run quantum integration pytest
        id: run-integration
        env:
          CI: "true"
          AZURE_CLIENT_ID: ""
          AZURE_TENANT_ID: ""
          AZURE_CLIENT_SECRET: ""
          OPENAI_API_KEY: ""
        run: |
          set -euo pipefail
          mkdir -p data_out
          mapfile -t quantum_tests < "${{ steps.discover.outputs.test_list_file }}"

          if [[ ${#quantum_tests[@]} -eq 0 ]]; then
            echo 'exit-code=0' >> "$GITHUB_OUTPUT"
            echo 'No quantum integration tests selected.'
            exit 0
          fi

          echo "Collected ${#quantum_tests[@]} quantum integration test files:"
          printf ' - %s\n' "${quantum_tests[@]}"

          set +e
          python -m pytest "${quantum_tests[@]}" \
            -q \
            --tb=short \
            --maxfail=1 \
            --durations=15 \
            --junitxml="data_out/junit-quantum-integration.xml" \
            2>&1 | tee "data_out/pytest-quantum-integration.txt"
          exit_code="${PIPESTATUS[0]}"
          set -e

          echo "exit-code=${exit_code}" >> "$GITHUB_OUTPUT"
          echo "Pytest exit code: ${exit_code}"

      - name: Parse integration JUnit XML
        id: parse-integration
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import xml.etree.ElementTree as ET

          path = "data_out/junit-quantum-integration.xml"
          passed = failed = skipped = errors = total = 0
          if os.path.exists(path):
              root = ET.parse(path).getroot()
              suites = root.findall(".//testsuite") or [root]
              for suite in suites:
                  total += int(suite.attrib.get("tests", 0))
                  failed += int(suite.attrib.get("failures", 0))
                  errors += int(suite.attrib.get("errors", 0))
                  skipped += int(suite.attrib.get("skipped", 0))
              passed = max(total - failed - errors - skipped, 0)
          print(f"passed={passed}")
          print(f"failed={failed}")
          print(f"errors={errors}")
          print(f"skipped={skipped}")
          print(f"total={total}")
          PY

      - name: Emit integration failure annotations
        if: always() && (steps.parse-integration.outputs.failed != '0' || steps.parse-integration.outputs.errors != '0')
        run: |
          set -euo pipefail
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          path = Path('data_out/junit-quantum-integration.xml')
          if not path.exists():
              raise SystemExit(0)

          emitted = 0
          limit = 20
          root = ET.parse(path).getroot()
          for case in root.findall('.//testcase'):
              failure = case.find('failure') or case.find('error')
              if failure is None:
                  continue
              title = f"{case.attrib.get('classname', '')}::{case.attrib.get('name', '')}".strip(':')
              message = (failure.attrib.get('message') or (failure.text or 'test failed')).strip().splitlines()[0][:240]
              file_name = case.attrib.get('file', '')
              line = case.attrib.get('line', '')
              prefix = '::error'
              if file_name and line:
                  prefix += f" file={file_name},line={line}"
              print(f"{prefix},title=Quantum integration failure::{title} — {message}")
              emitted += 1
              if emitted >= limit:
                  print('::warning::Additional quantum integration failures omitted from annotations.')
                  break
          PY

      - name: Write integration step summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo '## Quantum integration tests'
            echo ''
            echo '| Metric | Value |'
            echo '|--------|-------|'
            echo '| ✅ Passed | ${{ steps.parse-integration.outputs.passed }} |'
            echo '| ❌ Failed | ${{ steps.parse-integration.outputs.failed }} |'
            echo '| 💥 Errors | ${{ steps.parse-integration.outputs.errors }} |'
            echo '| ⏭️ Skipped | ${{ steps.parse-integration.outputs.skipped }} |'
            echo '| 🧮 Total | ${{ steps.parse-integration.outputs.total }} |'
            echo '| 🧪 Exit code | ${{ steps.run-integration.outputs.exit-code }} |'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration test artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: quantum-integration
          retention-days: 7
          if-no-files-found: warn
          path: |
            data_out/junit-quantum-integration.xml
            data_out/pytest-quantum-integration.txt

      - name: Fail integration job on test failure
        if: always()
        env:
          EXIT_CODE: ${{ steps.run-integration.outputs.exit-code }}
        run: |
          set -euo pipefail
          if [[ "$EXIT_CODE" != '0' && "$EXIT_CODE" != '5' ]]; then
            echo "::error::Quantum integration pytest exited with code $EXIT_CODE."
            exit 1
          fi

  pr-summary:
    name: Quantum PR summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [smoke, unit-tests, integration-tests]
    if: always() && github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Download quantum test artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: quantum-*
          merge-multiple: true
          path: artifacts

      - name: Build PR summary markdown
        id: build-summary
        if: always()
        env:
          SMOKE_RESULT: ${{ needs.smoke.result }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
          COVERAGE_THRESHOLD: ${{ env.QUANTUM_COVERAGE_THRESHOLD }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import os
          import xml.etree.ElementTree as ET

          artifacts = Path('artifacts')
          summary_path = Path(os.environ['RUNNER_TEMP']) / 'quantum-pr-summary.md'
          junit_files = sorted(artifacts.rglob('junit-quantum-*.xml'))
          coverage_files = sorted(artifacts.rglob('coverage-quantum-*.xml'))

          rows = []
          failures = []
          coverage_by_label = {}

          for cov in coverage_files:
              try:
                  root = ET.parse(cov).getroot()
                  coverage_by_label[cov.stem.replace('coverage-', '')] = f"{float(root.attrib.get('line-rate', '0')) * 100:.1f}%"
              except Exception:
                  coverage_by_label[cov.stem.replace('coverage-', '')] = 'parse-error'

          for junit in junit_files:
              label = junit.stem.replace('junit-', '')
              total = failed = errors = skipped = 0
              try:
                  root = ET.parse(junit).getroot()
                  suites = root.findall('.//testsuite') or [root]
                  for suite in suites:
                      total += int(suite.attrib.get('tests', 0))
                      failed += int(suite.attrib.get('failures', 0))
                      errors += int(suite.attrib.get('errors', 0))
                      skipped += int(suite.attrib.get('skipped', 0))
                  passed = max(total - failed - errors - skipped, 0)
                  rows.append((label, passed, failed, errors, skipped, total, coverage_by_label.get(label, '—')))
                  for case in root.findall('.//testcase'):
                      issue = case.find('failure') or case.find('error')
                      if issue is None:
                          continue
                      name = f"{case.attrib.get('classname', '')}::{case.attrib.get('name', '')}".strip(':')
                      message = (issue.attrib.get('message') or (issue.text or 'test failed')).strip().splitlines()[0][:220]
                      failures.append((label, name, message))
              except Exception as exc:
                  rows.append((label, 0, 0, 1, 0, 1, coverage_by_label.get(label, '—')))
                  failures.append((label, 'junit-parse', str(exc)[:220]))

          marker = '<!-- quantum-ci-pr-summary -->'
          smoke = os.environ.get('SMOKE_RESULT', 'unknown')
          unit = os.environ.get('UNIT_RESULT', 'unknown')
          integration = os.environ.get('INTEGRATION_RESULT', 'unknown')
          threshold = os.environ.get('COVERAGE_THRESHOLD', '0')
          overall_ok = smoke == 'success' and unit == 'success' and integration == 'success'
          badge = '✅' if overall_ok else '❌'

          lines = [
              marker,
              f"## {badge} Quantum CI summary",
              '',
              '| Check | Result |',
              '|-------|--------|',
              f'| Smoke | `{smoke}` |',
              f'| Unit tests | `{unit}` |',
              f'| Integration tests | `{integration}` |',
              '',
          ]

          if rows:
              lines.extend([
                  '| Artifact | Passed | Failed | Errors | Skipped | Total | Coverage |',
                  '|----------|--------|--------|--------|---------|-------|----------|',
              ])
              for label, passed, failed, errors, skipped, total, coverage in rows:
                  lines.append(f'| `{label}` | {passed} | {failed} | {errors} | {skipped} | {total} | {coverage} |')
          else:
              lines.append('_No JUnit artifacts were available for quantum test reporting._')

          lines.extend([
              '',
              f'> Quantum unit coverage threshold: **{threshold}%**',
              '',
          ])

          if failures:
              lines.append('### Failed quantum tests')
              for label, name, message in failures[:12]:
                  lines.append(f'- `{label}` → `{name}` — {message}')
              if len(failures) > 12:
                  lines.append(f'- _...and {len(failures) - 12} more failure(s)._')
          else:
              lines.append('No failed quantum tests detected in uploaded JUnit artifacts.')

          summary_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'summary_path={summary_path}\n')
              fh.write(f'has_failures={str(bool(failures)).lower()}\n')
          PY

      - name: Publish PR summary comment
        if: always() && steps.build-summary.outputs.summary_path != ''
        continue-on-error: true
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- quantum-ci-pr-summary -->';
            const body = fs.readFileSync('${{ steps.build-summary.outputs.summary_path }}', 'utf8');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });

              const existing = comments.find(comment =>
                comment.user?.login === 'github-actions[bot]' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (err) {
              core.warning(`Could not post PR summary comment (${err.status ?? err.message}). The step summary still contains the full report.`);
            }

      - name: Write PR summary to step summary
        if: always() && steps.build-summary.outputs.summary_path != ''
        run: cat "${{ steps.build-summary.outputs.summary_path }}" >> "$GITHUB_STEP_SUMMARY"

  quantum-ci-success:
    name: Quantum CI success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [smoke, unit-tests, integration-tests]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        env:
          SMOKE_RESULT: ${{ needs.smoke.result }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
        run: |
          set -euo pipefail
          echo "smoke=$SMOKE_RESULT"
          echo "unit=$UNIT_RESULT"
          echo "integration=$INTEGRATION_RESULT"

          if [[ "$SMOKE_RESULT" != "success" ]]; then
            echo "::error::Quantum smoke job failed."
            exit 1
          fi

          if [[ "$UNIT_RESULT" != "success" ]]; then
            echo "::error::Quantum unit test job failed."
            exit 1
          fi

          if [[ "$INTEGRATION_RESULT" != "success" ]]; then
            echo "::error::Quantum integration test job failed."
            exit 1
          fi

          echo "Quantum CI checks passed."
