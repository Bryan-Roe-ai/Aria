# =============================================================================
# Dependabot Auto-merge
# =============================================================================
# Purpose : Automatically approve and enable auto-merge for Dependabot PRs that
#           contain only minor / patch updates, after required CI checks complete
#           successfully.
# Security: - Major version bumps are never auto-approved; a comment is posted
#             requesting manual review.
#           - Production dependency minor bumps are flagged for manual review.
#           - Workflow runs only for PRs authored by dependabot[bot].
#           - Token permissions are scoped to the minimum required.
# Notes   : - This workflow explicitly waits for PR status checks to pass/fail
#             before enabling auto-merge.
#           - If the target branch uses a merge queue, the built-in GITHUB_TOKEN
#             may be unable to enqueue the PR for auto-merge; use a GitHub App
#             token or PAT stored in GitHub Secrets if needed.
# Triggers: pull_request events (opened / synchronize / reopened / ready_for_review)
# Refs    : https://docs.github.com/en/code-security/tutorials/secure-your-dependencies/automate-dependabot-with-actions
# =============================================================================

name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  automerge:
    name: Auto-merge minor / patch updates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: write
      pull-requests: write

    env:
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WAIT_MAX_ATTEMPTS: "60"
      WAIT_SLEEP_SECONDS: "10"

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Fetch Dependabot metadata
        id: metadata
        uses: step-security/dependabot-fetch-metadata@bf8fb6e0be0a711c669dc236de6e7f7374ba626e # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine if PR is auto-mergeable
        id: gate
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEP_TYPE: ${{ steps.metadata.outputs.dependency-type }}
        run: |
          set -euo pipefail

          # Policy:
          # - Always allow semver patch updates.
          # - Allow semver minor updates only for direct development or indirect dependencies.
          # - Require manual review for direct production dependency minor updates and all majors.
          automerge="false"

          case "${UPDATE_TYPE}" in
            version-update:semver-patch)
              automerge="true"
              ;;
            version-update:semver-minor)
              if [[ "${DEP_TYPE}" == "direct:development" || "${DEP_TYPE}" == "indirect" ]]; then
                automerge="true"
              fi
              ;;
          esac

          echo "automerge=${automerge}" >> "$GITHUB_OUTPUT"
          echo "Decision: automerge=${automerge} (update-type=${UPDATE_TYPE:-unset}, dependency-type=${DEP_TYPE:-unset})"

      - name: Wait for required status checks
        if: steps.gate.outputs.automerge == 'true'
        run: |
          set -euo pipefail

          # Keep in sync with job timeout-minutes (10 minutes = 600 seconds).
          max_wait_seconds=600
          poll_interval_seconds=15
          waited=0

          while true; do
            totals="$(gh pr view "$PR_URL" --json statusCheckRollup --jq '
              # statusCheckRollup can surface check-run conclusions or status-context states.
              # We classify states into pending / failed / successful buckets for gating.
              ["PENDING", "IN_PROGRESS", "QUEUED", "REQUESTED", "WAITING", "EXPECTED"] as $pending_states
              | ["FAILURE", "FAILED", "TIMED_OUT", "CANCELLED", "ACTION_REQUIRED", "STARTUP_FAILURE", "STALE", "ERROR"] as $failed_states
              | ["SUCCESS", "NEUTRAL", "SKIPPED"] as $success_states
              | [(.statusCheckRollup[]? | (.conclusion // .state // .status // "PENDING") | ascii_upcase)] as $states
              | {
                  total: ($states | length),
                  pending: ($states | map(select(. as $state | $pending_states | index($state))) | length),
                  failed: ($states | map(select(. as $state | $failed_states | index($state))) | length),
                  successful: ($states | map(select(. as $state | $success_states | index($state))) | length)
                }')"

            total_checks="$(jq -r '.total' <<<"$totals")"
            pending_checks="$(jq -r '.pending' <<<"$totals")"
            failed_checks="$(jq -r '.failed' <<<"$totals")"
            successful_checks="$(jq -r '.successful' <<<"$totals")"

            echo "Status checks: total=${total_checks}, pending=${pending_checks}, failed=${failed_checks}, successful=${successful_checks} (waited ${waited}s/${max_wait_seconds}s)"

            if [[ "${failed_checks}" -gt 0 ]]; then
              echo "Required status checks failed. Not enabling auto-merge."
              exit 1
            fi

            if [[ "${total_checks}" -gt 0 && "${pending_checks}" -eq 0 && "${successful_checks}" -eq "${total_checks}" ]]; then
              echo "All required status checks passed."
              break
            fi

            if [[ "${total_checks}" -gt 0 && "${pending_checks}" -eq 0 ]]; then
              echo "Status checks reached a non-pending state but not all were successful."
              exit 1
            fi

            if [[ "${waited}" -ge "${max_wait_seconds}" ]]; then
              echo "Timed out waiting for required status checks."
              exit 1
            fi

            sleep "${poll_interval_seconds}"
            waited=$((waited + poll_interval_seconds))
          done

      - name: Read PR state
        if: steps.gate.outputs.automerge == 'true'
        id: pr_state
        run: |
          set -euo pipefail

          auto_merge_enabled="$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest != null')"
          review_state="$(gh pr view "$PR_URL" --json reviews --jq '[.reviews[]? | select(.author.login == "github-actions[bot]" and .state == "APPROVED")] | length > 0')"

          echo "auto_merge_enabled=${auto_merge_enabled}" >> "$GITHUB_OUTPUT"
          echo "already_approved=${review_state}" >> "$GITHUB_OUTPUT"

      - name: Approve PR
        if: steps.gate.outputs.automerge == 'true' && steps.pr_state.outputs.already_approved != 'true'
        run: |
          set -euo pipefail
          gh pr review --approve "$PR_URL"

      - name: Wait for required status checks
        if: steps.gate.outputs.automerge == 'true' && steps.pr_state.outputs.auto_merge_enabled != 'true'
        run: |
          set -euo pipefail

          max_attempts="${WAIT_MAX_ATTEMPTS}"
          sleep_seconds="${WAIT_SLEEP_SECONDS}"
          if [[ ! "${max_attempts}" =~ ^[0-9]+$ || "${max_attempts}" -le 0 ]]; then
            echo "WAIT_MAX_ATTEMPTS must be a positive integer (got '${max_attempts}')."
            exit 1
          fi
          if [[ ! "${sleep_seconds}" =~ ^[0-9]+$ || "${sleep_seconds}" -le 0 ]]; then
            echo "WAIT_SLEEP_SECONDS must be a positive integer (got '${sleep_seconds}')."
            exit 1
          fi

          for attempt in $(seq 1 "${max_attempts}"); do
            checks_json="$(gh pr view "$PR_URL" --json statusCheckRollup --jq '.statusCheckRollup')"

            total_count="$(jq 'length' <<< "$checks_json")"
            failing_count="$(jq '
              [
                .[]?
                | select(
                    (
                      .__typename == "CheckRun" and
                      (
                        ["failure", "cancelled", "timed_out", "action_required", "startup_failure", "stale"]
                        | index((.conclusion // "" | ascii_downcase))
                      ) != null
                    ) or (
                      .__typename == "StatusContext" and
                      (["failure", "error"] | index((.state // "" | ascii_downcase))) != null
                    )
                  )
              ]
              | length
            ' <<< "$checks_json")"
            failing_summary="$(jq -r '
              [
                .[]?
                | select(
                    (
                      .__typename == "CheckRun" and
                      (
                        ["failure", "cancelled", "timed_out", "action_required", "startup_failure", "stale"]
                        | index((.conclusion // "" | ascii_downcase))
                      ) != null
                    ) or (
                      .__typename == "StatusContext" and
                      (["failure", "error"] | index((.state // "" | ascii_downcase))) != null
                    )
                  )
                | if .__typename == "CheckRun"
                  then "\(.name): \(.conclusion // "unknown")"
                  else "\(.context): \(.state // "unknown")"
                  end
              ]
              | join(", ")
            ' <<< "$checks_json")"
            pending_count="$(jq '
              [
                .[]?
                | select(
                    (
                      .__typename == "CheckRun" and
                      ((.status // "" | ascii_downcase) != "completed")
                    ) or (
                      .__typename == "StatusContext" and
                      (["pending", "expected"] | index((.state // "" | ascii_downcase))) != null
                    )
                  )
              ]
              | length
            ' <<< "$checks_json")"

            if [[ "${failing_count}" -gt 0 ]]; then
              echo "One or more required checks failed before merge: ${failing_summary:-unknown checks}."
              exit 1
            fi

            if [[ "${total_count}" -eq 0 || "${pending_count}" -eq 0 ]]; then
              echo "Status checks are complete (total=${total_count}, pending=${pending_count})."
              break
            fi

            if [[ "${attempt}" -eq "${max_attempts}" ]]; then
              echo "Timed out waiting for required status checks (pending=${pending_count})."
              exit 1
            fi

            echo "Waiting for required status checks... attempt ${attempt}/${max_attempts} (pending=${pending_count})"
            sleep "${sleep_seconds}"
          done

      - name: Enable auto-merge (squash)
        if: steps.gate.outputs.automerge == 'true' && steps.pr_state.outputs.auto_merge_enabled != 'true'
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            if gh pr merge --auto --squash --delete-branch "$PR_URL"; then
              echo "Auto-merge enabled on attempt ${attempt}."
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              echo "Auto-merge attempt ${attempt} failed; retrying in 5 seconds..."
              sleep 5
            fi
          done

          echo "Failed to enable auto-merge after 3 attempts."
          exit 1

      - name: Comment on major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          set -euo pipefail

          existing_comments="$(gh pr view "$PR_URL" --json comments --jq '
            [
              .comments[]?
              | select(
                  .author.login == "github-actions[bot]" and
                  (.body | contains("Major version update detected"))
                )
            ]
            | length
          ')"
          if [[ "${existing_comments}" -eq 0 ]]; then
            gh pr comment "$PR_URL" --body "$(cat <<'EOF'
          ⚠️ **Major version update detected — manual review required.**

          This PR will not be auto-merged. Please:
          - Review the package changelog / release notes for breaking changes.
          - Run the full test suite locally if needed.
          - Approve and merge manually once verified.
          EOF
            )"
          fi

      - name: Comment on skipped non-major updates
        if: >-
          steps.gate.outputs.automerge == 'false' &&
          steps.metadata.outputs.update-type != 'version-update:semver-major' &&
          steps.metadata.outputs.update-type != ''
        run: |
          set -euo pipefail

          existing_comments="$(gh pr view "$PR_URL" --json comments --jq '
            [
              .comments[]?
              | select(
                  .author.login == "github-actions[bot]" and
                  (.body | contains("not auto-merged"))
                )
            ]
            | length
          ')"
          if [[ "${existing_comments}" -eq 0 ]]; then
            gh pr comment "$PR_URL" --body "$(cat <<'EOF'
          ℹ️ This Dependabot update was **not auto-merged** (production dependency or non-trivial change). Manual review requested.
          EOF
            )"
          fi

      - name: Job summary
        if: always()
        env:
          PKG: ${{ steps.metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEP_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          PREV: ${{ steps.metadata.outputs.previous-version }}
          NEW: ${{ steps.metadata.outputs.new-version }}
          AUTOMERGE: ${{ steps.gate.outputs.automerge }}
          AUTO_MERGE_ENABLED: ${{ steps.pr_state.outputs.auto_merge_enabled }}
          ALREADY_APPROVED: ${{ steps.pr_state.outputs.already_approved }}
        run: |
          {
            echo "## Dependabot Auto-merge"
            echo ""
            echo "| Field                | Value |"
            echo "|----------------------|-------|"
            echo "| Package(s)           | ${PKG:-_n/a_} |"
            echo "| Update type          | ${UPDATE_TYPE:-_n/a_} |"
            echo "| Dependency type      | ${DEP_TYPE:-_n/a_} |"
            echo "| Previous version     | ${PREV:-_n/a_} |"
            echo "| New version          | ${NEW:-_n/a_} |"
            echo "| Policy auto-merge    | ${AUTOMERGE:-false} |"
            echo "| Auto-merge already on| ${AUTO_MERGE_ENABLED:-false} |"
            echo "| Already approved     | ${ALREADY_APPROVED:-false} |"
            echo "| PR                   | ${PR_URL} |"
          } >> "$GITHUB_STEP_SUMMARY"
