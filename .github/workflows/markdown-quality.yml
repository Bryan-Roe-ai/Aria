name: Markdown Quality

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".markdownlint.jsonc"
      - ".markdownlint.yaml"
      - ".markdownlint-cli2.jsonc"
      - ".markdownlint-cli2.yaml"
      - ".github/workflows/markdown-quality.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".markdownlint.jsonc"
      - ".markdownlint.yaml"
      - ".markdownlint-cli2.jsonc"
      - ".markdownlint-cli2.yaml"
      - ".github/workflows/markdown-quality.yml"
  workflow_dispatch:
    inputs:
      fix:
        description: "Attempt to auto-fix markdown issues and upload patch as artifact"
        type: boolean
        default: false

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: markdown-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege: read-only by default.
permissions:
  contents: read

env:
  # Opt into Node.js 24 for JS actions ahead of June 2026 forced migration.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
  MARKDOWNLINT_ACTION_SHA: 6b51ade7a9e4a75a7ad929842dd298a3804ebe8b

defaults:
  run:
    shell: bash

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # Avoid leaving credentials on disk for subsequent steps.
          persist-credentials: false
          # Full history is required to diff against PR and push base commits.
          fetch-depth: 0

      - name: Select markdown targets
        id: targets
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          FILE_LIST="${RUNNER_TEMP}/markdown_targets.txt"
          NULL_SHA="0000000000000000000000000000000000000000"
          : > "$FILE_LIST"

          is_markdown_target() {
            local file="$1"

            case "$file" in
              *.md) ;;
              *)
                return 1
                ;;
            esac

            case "$file" in
              */node_modules/*|node_modules/*|*/.venv/*|.venv/*|*/venv/*|venv/*|*/.git/*|.git/*|*/dist/*|dist/*|*/build/*|build/*|*/.next/*|.next/*|*/.cache/*|.cache/*|data_out/*|mount/*|*/CHANGELOG.md|CHANGELOG.md)
                return 1
                ;;
            esac

            return 0
          }

          write_targets_from_diff() {
            local base_sha="$1"
            local head_sha="$2"
            local diff_file="${RUNNER_TEMP}/changed_markdown_files.txt"

            if ! git diff --name-only --diff-filter=ACMR -z "$base_sha" "$head_sha" > "$diff_file"; then
              echo "Unable to diff ${base_sha}...${head_sha}; selecting no markdown targets."
              return 1
            fi

            while IFS= read -r -d '' file; do
              [ -f "$file" ] || continue
              is_markdown_target "$file" || continue
              printf '%s\0' "$file" >> "$FILE_LIST"
            done < "$diff_file"
          }

          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_BASE_SHA" ] && [ -n "$PR_HEAD_SHA" ]; then
            write_targets_from_diff "$PR_BASE_SHA" "$PR_HEAD_SHA" || true
          elif [ "$EVENT_NAME" = "push" ] && [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "$NULL_SHA" ]; then
            write_targets_from_diff "$PUSH_BEFORE_SHA" "$HEAD_SHA" || true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            git fetch --no-tags origin "$DEFAULT_BRANCH"
            BASE_SHA="$(git merge-base "origin/$DEFAULT_BRANCH" "$HEAD_SHA")"
            write_targets_from_diff "$BASE_SHA" "$HEAD_SHA" || true
          fi

          echo "file_list=$FILE_LIST" >> "$GITHUB_OUTPUT"

      - name: Lint Markdown files
        id: lint
        run: |
          set -euo pipefail

          FILE_LIST="${{ steps.targets.outputs.file_list }}"

          if [ -z "$FILE_LIST" ] || [ ! -f "$FILE_LIST" ] || [ ! -s "$FILE_LIST" ]; then
            echo "No markdown files selected for linting."
            exit 0
          fi

          mapfile -d '' -t markdown_files < "$FILE_LIST"

          printf 'Linting markdown targets:\n'
          printf ' - %s\n' "${markdown_files[@]}"

          args=()
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${{ inputs.fix }}" = "true" ]; then
            args+=(--fix)
          fi

          npx --yes markdownlint-cli2 "${args[@]}" "${markdown_files[@]}"

      - name: Generate auto-fix patch
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.fix == true }}
        run: |
          set -euo pipefail
          if ! git diff --quiet; then
            git diff > markdownlint-autofix.patch
            echo "Auto-fix patch generated."
          else
            echo "No auto-fix changes were produced." > markdownlint-autofix.patch
          fi

      - name: Upload auto-fix patch
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.fix == true }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: markdownlint-autofix-patch
          path: markdownlint-autofix.patch
          if-no-files-found: ignore
          retention-days: 7

      - name: Summary
        if: always()
        env:
          OUTCOME: ${{ steps.lint.outcome }}
        run: |
          {
            echo "## Markdown Quality"
            echo ""
            echo "Validated Markdown style and structure with **markdownlint-cli2**."
            echo ""
            echo "- Result: \`${OUTCOME}\`"
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo ""
            if [ "${OUTCOME}" != "success" ]; then
              echo "> ❌ Markdown lint failed. Run \`npx markdownlint-cli2 \"**/*.md\"\` locally, or re-run this workflow via \"Run workflow\" with **fix** enabled to download an auto-fix patch."
            else
              echo "> ✅ All Markdown files passed linting."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
