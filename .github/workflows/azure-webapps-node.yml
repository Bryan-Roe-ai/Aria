name: Build and deploy Node app to Azure Web App

on:
  push:
    branches: ["main"]
    paths:
      - "apps/chat/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/azure-webapps-node.yml"
  workflow_dispatch:

concurrency:
  group: azure-webapp-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: your-app-name
  APP_PATH: apps/chat
  NODE_VERSION: "20.x"

jobs:
  build-and-validate:
    name: Build, lint, typecheck, and test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ${{ env.APP_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_PATH }}/package-lock.json

      - name: Install dependencies (deterministic)
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present

      - name: Package deployable artifact
        run: |
          mkdir -p ../_deploy
          rsync -a \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='coverage' \
            --exclude='.github' \
            ./ ../_deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: apps/_deploy
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build-and-validate
    permissions:
      contents: read
      id-token: write # needed only if switching to OIDC login action
    environment:
      name: Development
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      # Preferred: azure/login with federated credentials + webapps-deploy (no publish profile)
      # Fallback shown here: existing publish profile secret
      - name: Deploy
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
