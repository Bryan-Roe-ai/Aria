name: Broken Links Check

# Trigger on PRs and pushes to markdown/docs files
on:
  pull_request:
    branches: [main, dev]
    paths:
      - "**/*.md"
      - "docs/**"
      - ".github/workflows/broken-links.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "docs/**"
      - ".github/workflows/broken-links.yml"
  # Allow manual trigger
  workflow_dispatch:
  # (Optional) Enable periodic checking as reminder/audit
  # schedule:
  #   - cron: "0 7 * * 1"  # Every Monday at 07:00 UTC

concurrency:
  group: "broken-links-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.2
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  LYCHEE_ACTION_REF: 8646ba30535128ac92d33dfc9133794bfdd9b411 # lycheeverse/lychee-action v2.8.0

jobs:
  link-check:
    name: "Link Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: "Checkout repository"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: "Run Lychee link checker"
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --max-concurrency 8
            --max-retries 2
            --retry-wait-time 2
            --accept 200,204,206,301,302,307,308,401,403,429
            --exclude "^https?://(localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0)(:[0-9]+)?(/|$)"
            --exclude "^file:///"
            --exclude "^/"
            --exclude "^https://github\\.com/user-attachments/assets/"
            --exclude "^https://aka\\.ms/"
            --exclude "^https://via\\.placeholder\\.com/"
            --exclude "^https://github\\.com/Bryan-Roe/Aria/settings/pages$"
            --exclude "^https://github\\.com/Bryan-Roe/Aria/releases/tag/v0\\.1\\.0$"
            --exclude "^https://github\\.com/Bryan-Roe/Aria/compare/v0\\.1\\.0\\.\\.\\.HEAD$"
            --exclude "^https://github\\.com/Azure-Samples/blazor-cosmos-wasm$"
            --exclude "^https://www\\.aicpa\\.org/interestareas/informationsystemsaudit/assuranceadvisoryservices/aicpasoc2report\\.html$"
            --exclude "^https://learn\\.microsoft\\.com/azure/quantum/provider-support$"
            --exclude "^https://learn\\.microsoft\\.com/azure/quantum/provider-qio$"
            --exclude "^https://quantum\\.microsoft\\.com/community$"
            --exclude "^https://github\\.com/microsoft/qsharp/discussions$"
            --exclude "^https://quantum-ai-workspace\\.eastus\\.quantum\\.azure\\.com/$"
            --exclude "^https://marketplace\\.visualstudio\\.com/items\\?itemName=ms-azuretools\\.azure-ai-foundry$"
            --exclude "^https://azure\\.microsoft\\.com/pricing/details/quantum/$"
            --exclude "^https://azure\\.microsoft\\.com/en-us/services/quantum$"
            --exclude "^https://pennylane\\.ai/qml/glossary/quantum_differentiable_programming\\.html$"
            "**/*.md"
            "docs/**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # continue-on-error: true  # Uncomment to make workflow pass but report errors

      - name: "Summary"
        if: always()
        run: |
          set -euo pipefail
          # Safely write the step summary in a single redirection to avoid multiple appends (ShellCheck SC2129)
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "## 🔗 Broken Links Check"
              echo ""
              echo "Scanned markdown and docs links with [Lychee](https://github.com/lycheeverse/lychee-action)."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          # Note: lychee-action auto uploads artifacts if it finds broken links

      - name: "Show Failures"
        if: failure()
        run: |
          set -euo pipefail
          echo "❌ One or more broken links detected!"
          exit 1
