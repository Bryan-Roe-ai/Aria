name: Workflow Validation

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

jobs:
  validate-workflows:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'
          extra-packages: 'pyyaml jsonschema'

      - name: Validate workflow YAML structure
        uses: ./.github/actions/validate-workflow-yaml
        with:
          workflows-path: .github/workflows
          require-jobs: 'true'

      - name: Validate local composite actions
        uses: ./.github/actions/validate-composite-actions
        with:
          script-path: scripts/validate_composite_actions.py

      - name: Validate Azure Function bindings
        uses: ./.github/actions/validate-function-bindings
        with:
          functions-path: functions
          require-http-route: 'true'

      - name: Validate generated site bundles contract
        uses: ./.github/actions/validate-site-bundles
        with:
          strict-metadata: 'true'

      - name: Check for common issues
        run: |
          echo "Checking for common workflow issues..."

          # Check for deprecated actions
          if grep -r "actions/checkout@v[12]" .github/workflows/; then
            echo "⚠️  Warning: Found deprecated checkout action versions (v1/v2). Consider upgrading to v4."
          fi

          if grep -r "actions/setup-python@v[1-4]" .github/workflows/; then
            echo "⚠️  Warning: Found old setup-python action versions. Consider upgrading to v5."
          fi

          # Check for hardcoded secrets
          if grep -r "ghp_\|github_pat_" .github/workflows/ 2>/dev/null; then
            echo "❌ ERROR: Found hardcoded GitHub tokens!"
            exit 1
          fi

          echo "✅ Common issues check completed"

      - name: Validate action references
        uses: ./.github/actions/validate-action-references
        with:
          workflows-path: .github/workflows

  test-workflows:
    name: Test Workflow Execution
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: validate-workflows
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test workflow can be triggered
        run: |
          echo "Workflow validation and test completed successfully"
          echo "All workflows are syntactically correct and ready to use"
