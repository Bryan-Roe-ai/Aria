name: PR test summary comment

on:
  workflow_run:
    workflows: ["AGI smoke"]
    types: [completed]

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.2
  GITHUB_SCRIPT_SHA: 60a0d83039c74a4aee5435082ffcb1c3799cdea    # v7.0.1

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@${{ env.HARDEN_RUNNER_SHA }}
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Post PR test summary comment
        uses: actions/github-script@${{ env.GITHUB_SCRIPT_SHA }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;
            if (!run) return;
            const conclusion = run.conclusion;
            const url = run.html_url;
            const prs = run.pull_requests || [];
            // Try to enumerate artifacts (best-effort)
            let artifacts = [];
            try {
              const res = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id
              });
              artifacts = (res.data.artifacts || []).map(a => `- ${a.name} (id: ${a.id})`);
            } catch (e) {
              // ignore
            }

            for (const pr of prs) {
              const body = `Automated test summary: **${conclusion}**\n\nWorkflow run: ${url}\n\nArtifacts:\n${artifacts.length ? artifacts.join('\n') : '- (none)'}\n\nIf you want to auto-merge this PR on success, add label \`auto-merge\`.`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body
              });
            }
