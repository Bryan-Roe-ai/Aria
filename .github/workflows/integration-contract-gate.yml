name: Integration Contract Gate

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - '.devcontainer/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - '.devcontainer/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      strict:
        description: 'Run in strict-endpoints mode (all 8 endpoint checks)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # Keep this aligned with your actual setup-node version below.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.11'
  PYTHONUNBUFFERED: '1'
  PYTHONDONTWRITEBYTECODE: '1'
  FORCE_COLOR: '1'
  INTEGRATION_AI_STATUS_ENDPOINT: 'http://127.0.0.1:7071/api/ai/status'
  RETRY_COUNT: '30'
  RETRY_INTERVAL: '1'

defaults:
  run:
    shell: bash

jobs:
  contract-gate:
    name: API Contract Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: false

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Determine gate mode
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DISPATCH_STRICT: ${{ github.event.inputs.strict }}
        run: |
          set -euo pipefail
          strict='false'
          mode_label='standard (PR)'

          if [[ "${EVENT_NAME}" == "push" && "${REF}" == "refs/heads/main" ]]; then
            strict='true'
            mode_label='strict (push to main)'
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" && "${DISPATCH_STRICT}" == "true" ]]; then
            strict='true'
            mode_label='strict (manual dispatch)'
          fi

          {
            echo "strict=${strict}"
            echo "mode_label=${mode_label}"
          } >> "${GITHUB_OUTPUT}"

          echo "::notice title=Contract Gate Mode::${mode_label}"

      - name: Detect contract-relevant changes
        id: changes
        uses: step-security/paths-filter@5c5241b8233e77b55b9046daf88f1cb7560281de # v4.0.1
        with:
          filters: |
            contract:
              - 'function_app.py'
              - 'shared/**'
              - 'ai-projects/**'
              - 'apps/**'
              - 'scripts/integration_contract_gate.sh'
              - '.github/actions/run-integration-contract-gate/**'
              - '.github/actions/validate-composite-actions/**'
              - '.github/actions/validate-site-bundles/**'
              - '.github/workflows/integration-contract-gate.yml'

      - name: Skip notice (no relevant changes)
        if: steps.mode.outputs.strict == 'false' && steps.changes.outputs.contract != 'true'
        run: |
          echo "::notice title=Contract Gate::No contract-relevant changes detected; skipping gate."

      - name: Setup Python
        if: steps.mode.outputs.strict == 'true' || steps.changes.outputs.contract == 'true'
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          extra-packages: 'pytest pytest-timeout openai'

      - name: Validate generated site bundles (strict metadata)
        if: steps.mode.outputs.strict == 'true' || steps.changes.outputs.contract == 'true'
        uses: ./.github/actions/validate-site-bundles
        with:
          strict-metadata: 'true'

      - name: Validate local composite actions
        if: steps.mode.outputs.strict == 'true' || steps.changes.outputs.contract == 'true'
        uses: ./.github/actions/validate-composite-actions
        with:
          script-path: scripts/validate_composite_actions.py

      - name: Setup Node.js
        if: steps.mode.outputs.strict == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'

      - name: Cache npm
        if: steps.mode.outputs.strict == 'true'
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Start local Functions host (for endpoint checks)
        id: start-func
        if: runner.os == 'Linux' && steps.mode.outputs.strict == 'true'
        env:
          INTEGRATION_AI_STATUS_ENDPOINT: ${{ env.INTEGRATION_AI_STATUS_ENDPOINT }}
          RETRY_COUNT: ${{ env.RETRY_COUNT }}
          RETRY_INTERVAL: ${{ env.RETRY_INTERVAL }}
        run: |
          set -euo pipefail
          echo "INTEGRATION_AI_STATUS_ENDPOINT=${INTEGRATION_AI_STATUS_ENDPOINT}"

          adapter_log="${RUNNER_TEMP:-/tmp}/local_dev_adapter.log"
          pid_file="${RUNNER_TEMP:-/tmp}/local_dev_adapter.pid"
          echo "Adapter log: ${adapter_log}"

          endpoint_port="7071"

          echo "Starting local_dev_adapter on port ${endpoint_port}"
          nohup python local_dev_adapter.py --port "${endpoint_port}" &>"${adapter_log}" &
          echo "$!" > "${pid_file}"

          echo "Waiting for endpoint to become available: ${INTEGRATION_AI_STATUS_ENDPOINT}"
          i=0
          while (( i < RETRY_COUNT )); do
            if curl --silent --fail --max-time 5 "${INTEGRATION_AI_STATUS_ENDPOINT}" -o /dev/null; then
              echo "AI status endpoint reachable: ${INTEGRATION_AI_STATUS_ENDPOINT}"
              exit 0
            fi
            i=$((i + 1))
            echo "Attempt ${i}/${RETRY_COUNT} — endpoint not ready yet; sleeping ${RETRY_INTERVAL}s"
            sleep "${RETRY_INTERVAL}"
          done

          echo "AI status endpoint not reachable after ${RETRY_COUNT} attempts: ${INTEGRATION_AI_STATUS_ENDPOINT}" >&2
          echo "Check adapter logs: ${adapter_log}"

          if [[ -f "${adapter_log}" ]]; then
            echo "--- Last lines from ${adapter_log} ---"
            tail -n 200 "${adapter_log}" || true
          fi

          echo "--- Diagnostics: listening ports ---"
          if command -v ss >/dev/null 2>&1; then
            ss -ltnp || true
          elif command -v netstat >/dev/null 2>&1; then
            netstat -ltnp || true
          else
            echo "(ss/netstat not available)"
          fi

          echo "--- Curl verbose attempt ---"
          curl --verbose --max-time 10 "${INTEGRATION_AI_STATUS_ENDPOINT}" || true

          exit 1

      - name: Run contract gate (standard)
        if: steps.mode.outputs.strict == 'false' && steps.changes.outputs.contract == 'true'
        uses: ./.github/actions/run-integration-contract-gate

      - name: Run contract gate (strict)
        if: steps.mode.outputs.strict == 'true'
        uses: ./.github/actions/run-integration-contract-gate
        with:
          strict-endpoints: 'true'

      - name: Cleanup local adapter
        if: always() && steps.mode.outputs.strict == 'true'
        run: |
          set -euo pipefail
          pid_file="${RUNNER_TEMP:-/tmp}/local_dev_adapter.pid"
          if [[ -f "${pid_file}" ]]; then
            pid="$(cat "${pid_file}" || true)"
            if [[ -n "${pid}" ]] && kill -0 "${pid}" 2>/dev/null; then
              kill "${pid}" || true
            fi
          fi

      - name: Upload contract results
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: contract-gate-results-${{ github.run_number }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: warn
          compression-level: 9
          path: |
            data_out/integration_smoke/
            data_out/ci_orchestrator/ci_results.json

      - name: Generate summary
        if: always()
        env:
          MODE_LABEL: ${{ steps.mode.outputs.mode_label }}
          JOB_STATUS: ${{ job.status }}
          CHANGED: ${{ steps.changes.outputs.contract }}
        run: |
          set -euo pipefail
          status_file='data_out/ci_orchestrator/ci_results.json'
          short_sha="${GITHUB_SHA::7}"

          {
            echo "## Integration Contract Gate"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| **Mode** | ${MODE_LABEL} |"
            echo "| **Job status** | ${JOB_STATUS} |"
            echo "| **Contract-relevant changes** | ${CHANGED:-n/a} |"
            echo "| **Run** | [#${GITHUB_RUN_NUMBER} (attempt ${GITHUB_RUN_ATTEMPT})](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |"
            echo "| **Commit** | <code>${short_sha}</code> |"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ -s "${status_file}" ]]; then
            {
              echo "### Orchestrator Status"
              echo ""
              echo '```json'
              if command -v jq >/dev/null 2>&1; then
                jq '.' "${status_file}" || cat "${status_file}"
              else
                cat "${status_file}"
              fi
              echo ''
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "_No orchestrator results file produced (<code>${status_file}</code> missing or empty)._" \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
