name: Auto-assign reviewers

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}

env:
  GITHUB_SCRIPT_SHA: 9c1e0d3d5f2a8b7b6a6f0b2d6d5a4d0e9f8c7b6a # replace with the exact pinned SHA for actions/github-script v8
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.2

jobs:
  assign:
    if: >-
      github.event.pull_request.draft == false &&
      !endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Auto-assign reviewers from CODEOWNERS
        uses: actions/github-script@9c1e0d3d5f2a8b7b6a6f0b2d6d5a4d0e9f8c7b6a
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            if (pr.draft) {
              core.info('PR is draft; skipping.');
              return;
            }

            const author = (pr.user?.login || '').toLowerCase();
            if (author.endsWith('[bot]')) {
              core.info(`Bot-authored PR by ${author}; skipping.`);
              return;
            }

            async function withRetries(fn, retries = 3, baseDelayMs = 1000) {
              for (let attempt = 0; attempt <= retries; attempt++) {
                try {
                  return await fn();
                } catch (err) {
                  const status = err?.status ?? null;
                  const isLast = attempt === retries;
                  const retryable =
                    status === 429 || status === 403 || (status && status >= 500);
                  if (isLast || !retryable) throw err;
                  const delay = baseDelayMs * (attempt + 1);
                  core.info(`Retrying after transient error status=${status} in ${delay}ms.`);
                  await new Promise((resolve) => setTimeout(resolve, delay));
                }
              }
            }

            function escapeRegex(value) {
              return value.replace(/[|\\{}()[\]^$+?.]/g, '\\$&');
            }

            function codeownersPatternToRegex(pattern) {
              let normalized = pattern.trim();

              if (!normalized) return null;

              if (normalized.startsWith('/')) {
                normalized = normalized.slice(1);
              }

              const directoryOnly = normalized.endsWith('/');
              if (directoryOnly) {
                normalized = normalized.slice(0, -1);
              }

              let regex = '';
              for (let i = 0; i < normalized.length; i++) {
                const char = normalized[i];
                const next = normalized[i + 1];

                if (char === '*') {
                  if (next === '*') {
                    regex += '.*';
                    i++;
                  } else {
                    regex += '[^/]*';
                  }
                } else if (char === '?') {
                  regex += '[^/]';
                } else if (char === '/') {
                  regex += '/';
                } else {
                  regex += escapeRegex(char);
                }
              }

              if (directoryOnly) {
                return new RegExp(`(^|.*/)${regex}/.*$`);
              }

              if (pattern.startsWith('/')) {
                return new RegExp(`^${regex}$`);
              }

              return new RegExp(`(^|.*/)${regex}$`);
            }

            function parseCodeowners(text) {
              const rules = [];

              for (const rawLine of text.split(/\r?\n/)) {
                const trimmed = rawLine.trim();
                if (!trimmed || trimmed.startsWith('#')) continue;

                const tokens = trimmed
                  .replace(/\s+#.*$/, '')
                  .split(/\s+/)
                  .filter(Boolean);

                if (tokens.length < 2) continue;

                const pattern = tokens[0];
                const owners = tokens.slice(1).filter((token) => token.startsWith('@'));
                if (owners.length === 0) continue;

                const regex = codeownersPatternToRegex(pattern);
                if (!regex) continue;

                rules.push({ pattern, regex, owners });
              }

              return rules;
            }

            function isBotCandidate(login, denylistedReviewers) {
              return (
                login.endsWith('[bot]') ||
                login.endsWith('-bot') ||
                login.includes('dependabot') ||
                login.includes('bors') ||
                denylistedReviewers.has(login)
              );
            }

            async function getAllChangedFiles() {
              const files = [];
              let page = 1;

              while (true) {
                const response = await withRetries(() =>
                  github.rest.pulls.listFiles({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    per_page: 100,
                    page,
                  })
                );

                const pageFiles = response.data || [];
                files.push(...pageFiles.map((file) => file.filename));

                if (pageFiles.length < 100) break;
                page++;
              }

              return files;
            }

            const repoOwner = context.repo.owner.toLowerCase();
            const denylistedReviewers = new Set([
              'github-actions[bot]',
            ]);

            const candidatePaths = ['.github/CODEOWNERS', 'CODEOWNERS', 'docs/CODEOWNERS'];
            let codeownersText = null;
            let codeownersPath = null;

            for (const path of candidatePaths) {
              try {
                const res = await withRetries(() =>
                  github.rest.repos.getContent({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    path,
                    ref: pr.base.ref,
                  })
                );

                const raw = res?.data?.content;
                if (raw) {
                  codeownersText = Buffer.from(raw, res.data.encoding).toString('utf8');
                  codeownersPath = path;
                  core.info(`Loaded CODEOWNERS from ${path} at base ref ${pr.base.ref}`);
                  break;
                }
              } catch (e) {
                core.info(`No CODEOWNERS at ${path} on ${pr.base.ref}: ${e?.status || e?.message || e}`);
              }
            }

            if (!codeownersText) {
              core.info(`No CODEOWNERS found on base ref ${pr.base.ref}; skipping assignment.`);
              return;
            }

            const rules = parseCodeowners(codeownersText);
            if (rules.length === 0) {
              core.info(`No valid CODEOWNERS rules parsed from ${codeownersPath}; skipping assignment.`);
              return;
            }

            const changedFiles = await getAllChangedFiles();
            if (changedFiles.length === 0) {
              core.info('No changed files found; skipping assignment.');
              return;
            }

            core.info(`Changed files: ${changedFiles.join(', ')}`);

            const users = new Set();
            const teams = new Set();

            for (const file of changedFiles) {
              let matchedOwners = [];

              for (const rule of rules) {
                if (rule.regex.test(file)) {
                  matchedOwners = rule.owners;
                }
              }

              if (matchedOwners.length === 0) continue;

              core.info(`Matched ${file} -> ${matchedOwners.join(', ')}`);

              for (const ownerToken of matchedOwners) {
                const token = ownerToken.slice(1);
                if (token.includes('/')) {
                  const [org, team] = token.split('/', 2);
                  if (org && team) {
                    teams.add(`${org.toLowerCase()}/${team.toLowerCase()}`);
                  }
                } else {
                  users.add(token.toLowerCase());
                }
              }
            }

            const selectedUsers = [...users]
              .filter((user) => user && user !== author && !isBotCandidate(user, denylistedReviewers))
              .slice(0, 3);

            const selectedTeamSlugs = [...teams]
              .filter((full) => full.startsWith(`${repoOwner}/`))
              .map((full) => full.split('/')[1])
              .slice(0, 2);

            if (selectedUsers.length === 0 && selectedTeamSlugs.length === 0) {
              core.info('No valid reviewers after CODEOWNERS matching and filtering; skipping.');
              return;
            }

            const current = await withRetries(() =>
              github.rest.pulls.listRequestedReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              })
            );

            const alreadyUsers = new Set(
              (current.data?.users || []).map((user) => user.login.toLowerCase())
            );
            const alreadyTeams = new Set(
              (current.data?.teams || []).map((team) => team.slug.toLowerCase())
            );

            const finalUsers = selectedUsers.filter((user) => !alreadyUsers.has(user));
            const finalTeams = selectedTeamSlugs.filter((team) => !alreadyTeams.has(team));

            if (finalUsers.length === 0 && finalTeams.length === 0) {
              core.info('All selected reviewers already requested.');
              return;
            }

            await withRetries(() =>
              github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: finalUsers,
                team_reviewers: finalTeams,
              })
            );

            core.info(
              `Requested reviewers from ${codeownersPath}: users=[${finalUsers.join(', ')}] teams=[${finalTeams.join(', ')}]`
            );
