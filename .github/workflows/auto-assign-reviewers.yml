name: Auto-assign reviewers
on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: auto-assign-reviewers-${{ github.event.pull_request.number }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GITHUB_SCRIPT_SHA: 60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.2

jobs:
  assign:
    if: >-
      github.event.pull_request.draft == false &&
      !endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Auto-assign reviewers (CODEOWNERS fallback)
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            if (pr.draft) {
              core.info('PR is draft; skipping.');
              return;
            }

            const author = (pr.user?.login || '').toLowerCase();
            if (author.endsWith('[bot]')) {
              core.info(`Bot-authored PR by ${author}; skipping.`);
              return;
            }

            async function withRetries(fn, retries = 3, baseDelayMs = 1000) {
              for (let attempt = 0; attempt <= retries; attempt++) {
                try {
                  return await fn();
                } catch (err) {
                  const status = err?.status ?? null;
                  const isLast = attempt === retries;
                  const retryable =
                    status === 429 || status === 403 || (status && status >= 500);
                  if (isLast || !retryable) throw err;
                  const delay = baseDelayMs * (attempt + 1);
                  core.info(`Retrying after transient error status=${status} in ${delay}ms.`);
                  await new Promise(r => setTimeout(r, delay));
                }
              }
            }

            const repoOwner = context.repo.owner.toLowerCase();
            const users = new Set();
            const teams = new Set(); // store as {org}/{team}

            // Hard denylist for bot/service accounts that must never be review-requested.
            const denylistedReviewers = new Set([
              'github-actions[bot]',
            ]);

            const candidatePaths = ['.github/CODEOWNERS', 'CODEOWNERS', 'docs/CODEOWNERS'];
            let codeownersText = null;
            for (const path of candidatePaths) {
              try {
                const res = await withRetries(() =>
                  github.rest.repos.getContent({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    path,
                  })
                );
                const raw = res?.data?.content;
                if (raw) {
                  codeownersText = Buffer.from(raw, res.data.encoding).toString('utf8');
                  core.info(`Loaded CODEOWNERS from ${path}`);
                  break;
                }
              } catch (e) {
                core.info(`No CODEOWNERS at ${path}: ${e?.status || e?.message || e}`);
              }
            }

            if (!codeownersText) {
              core.info('No CODEOWNERS found; skipping assignment.');
              return;
            }

            for (const rawLine of codeownersText.split(/\r?\n/)) {
              const line = rawLine.trim();
              if (!line || line.startsWith('#')) continue;
              const owners = line.split(/\s+/).slice(1);
              for (const ownerToken of owners) {
                if (!ownerToken?.startsWith('@')) continue;
                const token = ownerToken.slice(1);
                if (token.includes('/')) {
                  const [org, team] = token.split('/', 2);
                  if (org && team) teams.add(`${org.toLowerCase()}/${team.toLowerCase()}`);
                } else {
                  users.add(token.toLowerCase());
                }
              }
            }

            function isBotCandidate(login) {
              return (
                login.endsWith('[bot]') ||
                login.endsWith('-bot') ||
                login.includes('dependabot') ||
                login.includes('bors') ||
                denylistedReviewers.has(login)
              );
            }

            const selectedUsers = [...users]
              .filter(u => u && u !== author && !isBotCandidate(u))
              .slice(0, 3);

            // Only request teams from the same org as the repository owner/org.
            const selectedTeamSlugs = [...teams]
              .filter(full => full.startsWith(`${repoOwner}/`))
              .map(full => full.split('/')[1])
              .slice(0, 2);

            if (selectedUsers.length === 0 && selectedTeamSlugs.length === 0) {
              core.info('No valid reviewers after filtering; skipping.');
              return;
            }

            const current = await withRetries(() =>
              github.rest.pulls.listRequestedReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              })
            );

            const alreadyUsers = new Set((current.data?.users || []).map(u => u.login.toLowerCase()));
            const alreadyTeams = new Set((current.data?.teams || []).map(t => t.slug.toLowerCase()));

            const finalUsers = selectedUsers.filter(u => !alreadyUsers.has(u));
            const finalTeams = selectedTeamSlugs.filter(t => !alreadyTeams.has(t));

            if (finalUsers.length === 0 && finalTeams.length === 0) {
              core.info('All selected reviewers already requested.');
              return;
            }

            await withRetries(() =>
              github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: finalUsers,
                team_reviewers: finalTeams,
              })
            );

            core.info(`Requested users=[${finalUsers.join(', ')}] teams=[${finalTeams.join(', ')}]`);
