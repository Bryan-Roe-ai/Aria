# Dependabot configuration for Aria
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

_defaults: &defaults
  schedule:
    interval: "daily"
    time: "04:00"
    timezone: "UTC"
  labels:
    - "dependencies"
    - "autofix"
  assignees:
    - "Bryan-Roe"
  allow:
    - dependency-type: "direct"
    - dependency-type: "indirect"
  rebase-strategy: "auto"
  open-pull-requests-limit: 5
  # Optional: uncomment if you want to slow repeat PRs
  # cooldown:
  #   default-days: 2
  #   semver-major-days: 7
  #   semver-minor-days: 3
  #   semver-patch-days: 1

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    <<: *defaults
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(actions)"
    groups:
      github-actions:
        patterns:
          - "*"

  # Dev containers
  - package-ecosystem: "devcontainers"
    directory: "/"
    <<: *defaults
    commit-message:
      prefix: "deps(devcontainer)"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    <<: *defaults
    commit-message:
      prefix: "deps(docker-root)"
    groups:
      docker-root:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    <<: *defaults
    commit-message:
      prefix: "deps(docker-devcontainer)"
    groups:
      docker-devcontainer:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/apps/aria"
    <<: *defaults
    commit-message:
      prefix: "deps(docker-aria)"
    groups:
      docker-aria:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/ai-projects/quantum-ml/production"
    <<: *defaults
    commit-message:
      prefix: "deps(docker-quantum-prod)"
    groups:
      docker-quantum-prod:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/ai-projects/email-spam-workflow"
    <<: *defaults
